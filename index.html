<!DOCTYPE html>
<html lang="zh-TW">

<meta charset="UTF-8">

<style>
:root { --gold: #D4AF37; --gold-light: #F0D060; --bg-deep: #0A0A0C; --bg-card: #111115; --text-primary: #F0E8D0; --text-secondary: #A09070; --green: #2ECC71; --yellow: #F1C40F; --red: #E74C3C; --blue: #3498DB; --border: rgba(212,175,55,0.2); --radius: 12px; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-deep); color: var(--text-primary); font-family: 'Noto Serif TC', serif; overflow-x: hidden; min-height: 100vh; }
/* 🔴 鋼琴鍵浮水印 body::before 已在此處徹底移除，解決手機卡頓 */
body::after { content: ''; position: fixed; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); z-index: 1000; }
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: block; }
#loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 50% 30%, rgba(212,175,55,0.08) 0%, transparent 60%); }
.login-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 400px; max-width: 95vw; box-shadow: 0 0 20px rgba(212,175,55,0.15); }
.login-tabs { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 25px; }
.login-tab { flex: 1; padding: 10px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; transition: 0.2s; }
.login-tab.active { background: var(--gold); color: #000; font-weight: bold; }
.topbar { position: sticky; top: 0; z-index: 100; background: rgba(10,10,12,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; height: 60px; gap: 15px; }
.nav-tabs { display: flex; background: var(--bg-card); border-bottom: 1px solid var(--border); overflow-x: auto; }
.nav-tab { padding: 14px 20px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; }
.nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.student-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; }
@media (max-width: 768px) { .student-grid { grid-template-columns: repeat(2, 1fr); } }
.student-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; cursor: pointer; position: relative; }
.status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
.出 { background: rgba(46,204,113,0.2); color: var(--green); } .遲 { background: rgba(241,196,15,0.2); color: var(--yellow); } .缺 { background: rgba(231,76,60,0.2); color: var(--red); } .假 { background: rgba(52,152,219,0.2); color: var(--blue); }
body.batch-mode .batch-check { display: flex; }
.batch-check { position: absolute; top: 8px; left: 8px; width: 20px; height: 20px; border-radius: 50%; background: var(--gold); color: #000; display: none; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
#detailPanel { position: fixed; top: 0; right: -520px; width: 520px; height: 100vh; background: var(--bg-panel); border-left: 1px solid var(--border); z-index: 500; transition: 0.3s; padding: 25px; overflow-y: auto; box-shadow: -10px 0 40px #000; }
#detailPanel.open { right: 0; }
.point-cell { aspect-ratio: 1; border-radius: 8px; border: 1.5px solid rgba(212,175,55,0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.point-cell.filled { background: var(--gold); }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--bg-panel); border: 1px solid var(--gold); padding: 12px 24px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 10000; color: #fff; }
.toast.show { opacity: 1; }
</style>
</head>

<div id="loginScreen" class="screen active">

    <h2 style="color:var(--gold); text-align:center;">莊敬高職音樂科</h2>

    </div>

</div>

<div id="appScreen" class="screen">

    <button class="nav-tab" onclick="switchTab('apply')">🚪 申請 <span id="badge" style="background:red; color:white; border-radius:10px; padding:1px 6px; font-size:10px; display:none;">0</span></button>
    <button class="nav-tab" onclick="switchTab('report')">📊 報表</button>
    <button class="nav-tab" id="mgrTab" style="display:none;" onclick="switchTab('mgr')">⚙️ 管理</button>
  </div>
  <div class="content-area" style="padding:20px;">
    <div id="clsBtns" style="display:flex; gap:10px; overflow-x:auto; margin-bottom:15px;"></div>
    <div id="toolbar" style="margin-bottom:15px; display:flex; gap:10px;">

      <button class="btn-sm" onclick="toggleBatch()">☑️ 批次模式</button>

    <div id="batchBar" style="display:none; background:var(--bg-card); padding:15px; border:1px solid var(--gold); border-radius:10px; margin-bottom:15px; gap:10px;">

    <div id="sGrid" class="student-grid"></div>
    <div id="applyArea" style="display:none;"></div>
    <div id="reportArea" style="display:none;"></div>
    <div id="mgrArea" style="display:none;"></div>
  </div>
</div>

<div id="studentScreen" class="screen">

</div>

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
let role='', currentUser=null, curSid=null, curGrp='音三莊', isBatch=false, localProfiles={}, pendingAtt={};

// ===== 核心驗證邏輯修復 =====
function switchLogin(type) {
  document.querySelectorAll('.login-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(type==='teacher'?'btnT':'btnS').classList.add('active');
  document.getElementById('tForm').style.display = type==='teacher'?'block':'none';
  document.getElementById('sForm').style.display = type==='student'?'block':'none';
}

async function doLogin() {
  const acc = document.getElementById('tName').value.trim();
  const pw = document.getElementById('tPass').value.trim();
  if(acc === MASTER.name && pw === MASTER.pass) { role='admin'; currentUser=MASTER; startApp(); return; }
  
  showToast("驗證中...");
  db.ref(`${DB_ROOT}/teachers`).once('value', sn => {
    const ts = sn.val();
    let found = false;
    for(let k in ts) { if(ts[k].name===acc && ts[k].pass===pw) { role='admin'; currentUser=ts[k]; found=true; break; } }
    if(found) startApp(); else showToast("帳號密碼錯誤", "red");
  });
}

async function doStudentLogin() {
  const name = document.getElementById('sName').value.trim();
  const pw = document.getElementById('sPass').value.trim();
  const stu = STUDENT_DATA.find(s=>s.name===name);
  if(!stu) return showToast("查無此學生", "red");
  
  db.ref(`${DB_ROOT}/students/${stu.id}`).once('value', sn => {
    const d = sn.val() || {password:'0000'};
    if(pw === d.password) { role='student'; curSid=stu.id; currentUser={name:stu.name}; startStudentApp(); }
    else showToast("密碼錯誤", "red");
  });
}

function startApp() {
  document.getElementById('loginScreen').remove(); // 💡 物理移除登入畫面
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('uName').innerText = currentUser.name;
  if(currentUser.name === MASTER.name) document.getElementById('mgrTab').style.display='block';
  renderClsBtns();
  loadCloud();
}

function startStudentApp() {
  document.getElementById('loginScreen').remove();
  document.getElementById('studentScreen').classList.add('active');
  loadStudentData();
}

// ===== 行政管理邏輯修復 (包含批次) =====
function renderClsBtns() {
  const div = document.getElementById('clsBtns');
  CLASSES.forEach(c => {
    const b = document.createElement('button');
    b.className = `btn-sm ${c===curGrp?'gold':''}`;
    b.innerText = c;
    b.onclick = () => { curGrp=c; renderClsBtns(); renderGrid(); };
    div.appendChild(b);
  });
}

function loadCloud() {
  db.ref(`${DB_ROOT}/profiles`).on('value', sn => { localProfiles = sn.val() || {}; renderGrid(); });
  db.ref(`${DB_ROOT}/leaves`).on('value', sn => {
    const pending = Object.values(sn.val()||{}).filter(l=>l.status==='pending').length;
    const b = document.getElementById('badge');
    b.innerText = pending; b.style.display = pending>0?'inline-block':'none';
  });
}

function renderGrid() {
  const grid = document.getElementById('sGrid');
  grid.innerHTML = '';
  STUDENT_DATA.filter(s=>s.cls===curGrp).forEach(s => {
    const p = localProfiles[s.id] || {points:0};
    const att = pendingAtt[s.id] || '未';
    const div = document.createElement('div');
    div.className = `student-card ${isBatch && pendingAtt[s.id]==='selected'?'batch-selected':''}`;
    div.innerHTML = `
      <div class="batch-check" style="display:${isBatch?'flex':'none'}">✓</div>
      <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
        <span style="font-size:10px; color:#666;">${s.id}</span>
        <span class="status-badge ${att}" onclick="cycleAtt(event, '${s.id}')">${att}</span>
      </div>
      <div style="font-weight:bold; font-size:18px; text-align:center;" onclick="openDetail('${s.id}')">${s.name}</div>
      <div style="text-align:center; color:var(--gold); font-size:12px; margin-top:5px;">⭐ ${p.points}</div>
    `;
    div.onclick = () => { if(isBatch) toggleSelect(s.id); };
    grid.appendChild(div);
  });
}

function cycleAtt(e, id) {
  e.stopPropagation();
  const seq = ['出','遲','缺','假'];
  let cur = pendingAtt[id] || '出';
  pendingAtt[id] = seq[(seq.indexOf(cur)+1)%4];
  renderGrid();
}

async function saveAttendance() {
  const today = new Date().toLocaleDateString('zh-TW');
  const updates = {};
  for(let id in pendingAtt) {
    if(pendingAtt[id] === 'selected') continue;
    updates[`attendance/${today}/${id}`] = pendingAtt[id];
    if(pendingAtt[id]==='遲') {
      const curP = localProfiles[id]?.points || 0;
      updates[`profiles/${id}/points`] = Math.max(0, curP - 1);
    }
  }
  db.ref(DB_ROOT).update(updates).then(() => { pendingAtt={}; showToast("儲存成功"); });
}

// 🔴 批次加點邏輯
function toggleBatch() {
  isBatch = !isBatch;
  document.getElementById('batchBar').style.display = isBatch?'flex':'none';
  renderGrid();
}

function toggleSelect(id) {
  pendingAtt[id] = pendingAtt[id] === 'selected' ? '未' : 'selected';
  const count = Object.values(pendingAtt).filter(v=>v==='selected').length;
  document.getElementById('bCount').innerText = count;
  renderGrid();
}

function batchAdd(v) {
  const updates = {};
  for(let id in pendingAtt) {
    if(pendingAtt[id]==='selected') {
      const curP = localProfiles[id]?.points || 0;
      updates[`profiles/${id}/points`] = Math.max(0, curP + v);
    }
  }
  db.ref(DB_ROOT).update(updates).then(() => { pendingAtt={}; toggleBatch(); showToast("批次更新成功"); });
}

// 🟢 詳細面板與集點卡
function openDetail(id) {
  curSid = id;
  const s = STUDENT_DATA.find(x=>x.id===id);
  const p = localProfiles[id] || {points:0, medals:0, logs:[]};
  document.getElementById('dName').innerText = s.name;
  document.getElementById('ptsNum').innerText = p.points;
  const grid = document.getElementById('ptsGrid');
  grid.innerHTML = '';
  for(let i=0; i<10; i++) grid.innerHTML += `<div class="point-cell ${i<p.points?'filled':''}">${i<p.points?'⭐':''}</div>`;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }

function showToast(m, c="var(--gold)") {
  const t = document.getElementById('toast');
  t.innerText = m; t.style.borderColor = c; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// Excel 匯出 ( SheetJS )
function exportExcel() {
  const data = STUDENT_DATA.map(s => ({ "學號":s.id, "姓名":s.name, "班級":s.cls, "點數":localProfiles[s.id]?.points||0 }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "點數報表");
  XLSX.writeFile(wb, `音樂科報表_${new Date().toLocaleDateString()}.xlsx`);
}
