    <style>
        :root { --primary: #FFD700; --bg: #FFF9C4; --text: #333; --accent: #FF4500; --danger: #ff4d4f; }
        body { background: var(--bg); color: var(--text); font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; }
        
        #gate-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--primary), #FFB300); }
        .gate-card { background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); width: 85%; max-width: 380px; text-align: center; }

        #app-screen { display: none; padding: 10px; min-height: 100vh; }
        header { text-align: center; background: var(--primary); padding: 20px; border-radius: 0 0 40px 40px; margin: -10px -10px 15px -10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .s-box { background: #fff; border-radius: 18px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        
        .s-dot { 
            width: 55px; height: 55px; border-radius: 15px; margin: 0 auto 10px; 
            border: 3px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .s-points { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #fff; font-size: 0.75rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        .stamp-card { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; background: #fdf2e9; padding: 15px; border-radius: 20px; border: 2px solid #FFB74D; margin-top: 10px; }
        .stamp-slot { width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,0.1); border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.3s; }
        .stamp-active { background: #fff; border: 2px solid var(--primary); transform: scale(1.1); box-shadow: 0 0 10px var(--primary); }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 450px; background: #fff; border-radius: 30px; padding: 25px; z-index: 1001; box-shadow: 0 25px 70px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; box-sizing: border-box; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; }
        
        .btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-save { background: #000; color: var(--primary); position: sticky; bottom: 15px; z-index: 100; border: 2px solid var(--primary); }
        .btn-gold { background: var(--primary); color: #000; }
        .btn-mini { padding: 5px 10px; font-size: 0.8rem; margin: 0; border-radius: 8px; width: auto; }

        .bg-present { background:#2ecc71; } .bg-late { background:#f1c40f; } .bg-absent { background:#e74c3c; } .bg-leave { background:#3498db; }
        .section-title { font-size: 1.1rem; font-weight: bold; border-left: 5px solid var(--primary); padding-left: 10px; margin: 15px 0 10px 0; display: block; text-align: left; }
        .progress-bar { height: 12px; background: #ddd; border-radius: 6px; margin-top: 5px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); transition: 0.5s; }
        .task-item { background: #fefefe; padding: 12px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; position: relative; }

            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('target-date').value = new Date().toISOString().split('T')[0];
            if (role === 'admin') { document.getElementById('admin-panel').style.display = 'block'; initTabs(); }
            else { document.getElementById('student-home-view').style.display = 'block'; openDetail(curStudent.id); }
            loadCloud();
        }

        function initTabs() {
            const tb = document.getElementById('tabs'); tb.innerHTML = "";
            classNames.forEach(g => {
                const b = document.createElement('button');
                b.style.cssText = "white-space:nowrap; padding:10px 20px; border-radius:20px; border:2px solid #FFD700; background:#fff; font-weight:bold; font-size:1rem;";
                if(g === currentGrp) b.style.background = "#FFD700";
                b.innerText = g; b.onclick = () => { currentGrp = g; initTabs(); renderGrid(); };
                tb.appendChild(b);
            });
        }

        function loadCloud() {
            db.ref('jjvs_v13_cloud').on('value', snap => {
                window.master = snap.val() || {};
                const selDate = document.getElementById('target-date').value;
                localAtt = {...(window.master.attendance && window.master.attendance[selDate])};
                renderGrid();
                if(curDetailSid) refreshModalUI(curDetailSid);
                document.getElementById('login-info').innerText = role === 'admin' ? "管理員模式 (雲端連線中)" : "學生："+curStudent.name;
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid'); grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles && window.master.profiles[s.id] && window.master.profiles[s.id].points) || 0;
                const div = document.createElement('div'); div.className = "s-box";
                div.innerHTML = `<div class="s-points">${pts}P</div><div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div><div style="font-weight:bold; font-size:1.1rem;" onclick="openDetail('${s.id}')">${s.name}</div>`;
                grid.appendChild(div);
            });
        }

        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let next = statusColors[(statusColors.indexOf(cur) + 1) % statusColors.length];
            localAtt[sid] = next; const dot = document.getElementById(`dot-${sid}`);
            dot.className = `s-dot ${next}`; dot.innerText = statusNames[next];
            document.getElementById('save-btn').style.background = "#FF4500";
        }

        function syncCloud() {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v13_cloud/attendance/${sd}`).set(localAtt).then(() => {
                alert("已存雲端"); document.getElementById('save-btn').style.background = "#000";
            });
        }

        function resetToday() {
            if(!confirm("全體出席？")) return;
            students.filter(s => s.group === currentGrp).forEach(s => localAtt[s.id] = 'bg-present');
            renderGrid(); document.getElementById('save-btn').style.background = "#FF4500";
        }

        function openDetail(sid) {
            curDetailSid = sid; document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            if (window.master) refreshModalUI(sid);
        }

        function refreshModalUI(sid) {
            const s = students.find(x => x.id === sid);
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無", tasks: [] };
            document.getElementById('m-name').innerText = s.name;
            document.getElementById('m-medals').innerText = prof.medals || 0;
            document.getElementById('m-msg').innerText = prof.msg || "無訊息";
            
            const pts = prof.points || 0; const sb = document.getElementById('stamp-card'); sb.innerHTML = "";
            for(let i=0; i<5; i++) {
                const sl = document.createElement('div');
                sl.className = `stamp-slot ${i < pts ? 'stamp-active' : ''}`; sl.innerText = i < pts ? '⭐' : '';
                sb.appendChild(sl);
            }
            
            const tl = document.getElementById('m-task-list'); tl.innerHTML = "";
            if(prof.tasks && prof.tasks.length > 0) {
                prof.tasks.forEach((t, i) => {
                    const p = Math.round((t.cur/t.max)*100);
                    tl.innerHTML += `
                        <div class="task-item">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <strong onclick="incTask('${sid}', ${i})">${t.name} (${t.cur}/${t.max})</strong>
                                ${role === 'admin' ? `<button class="btn btn-mini" style="background:var(--danger); color:#fff;" onclick="deleteTask(${i})">🗑️ 刪除</button>` : ''}
                            </div>
                            <div class="progress-bar" onclick="incTask('${sid}', ${i})"><div class="progress-fill" style="width:${p}%"></div></div>
                        </div>`;
                });
            } else { tl.innerHTML = "目前無罰抄任務"; }

            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            const att = window.master.attendance || {};
            Object.keys(att).sort().reverse().forEach(d => {
                if(att[d][sid]) hBox.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #ddd;"><span>📅 ${d}</span><span class="${att[d][sid]}" style="color:#fff; padding:2px 8px; border-radius:5px;">${statusNames[att[d][sid]]}</span></div>`;
            });
            if (role === 'admin') document.getElementById('admin-tools').style.display = 'block';
        }

        function adjustPoints(v) {
            const cur = parseInt(window.master.profiles?.[curDetailSid]?.points || 0);
            db.ref(`jjvs_v13_cloud/profiles/${curDetailSid}/points`).set(cur + v);
        }

        function adjustMedals(v) {
            const cur = parseInt(window.master.profiles?.[curDetailSid]?.medals || 0);
            const next = Math.max(0, cur + v);
            db.ref(`jjvs_v13_cloud/profiles/${curDetailSid}/medals`).set(next);
        }

        function addNewTask() {
            const n = document.getElementById('t-name').value; const m = document.getElementById('t-max').value;
            if(!n || !m) return;
            const ts = (window.master.profiles?.[curDetailSid]?.tasks) || [];
            ts.push({ name: n, max: m, cur: 0 }); db.ref(`jjvs_v13_cloud/profiles/${curDetailSid}/tasks`).set(ts);
            document.getElementById('t-name').value = ""; document.getElementById('t-max').value = "";
        }

        function incTask(sid, idx) {
            if(role !== 'admin') return; const ts = window.master.profiles[sid].tasks;
            if(ts[idx].cur < ts[idx].max) { ts[idx].cur = parseInt(ts[idx].cur) + 1; db.ref(`jjvs_v13_cloud/profiles/${sid}/tasks`).set(ts); }
        }

        function deleteTask(idx) {
            if(!confirm("確定刪除此罰抄任務？")) return;
            const ts = window.master.profiles[curDetailSid].tasks;
            ts.splice(idx, 1);
            db.ref(`jjvs_v13_cloud/profiles/${curDetailSid}/tasks`).set(ts);
        }

        function updateInfo() {
            const msg = document.getElementById('t-msg').value;
            db.ref(`jjvs_v13_cloud/profiles/${curDetailSid}/msg`).set(msg); alert("已送出");
        }

        function redeem() {
            const p = parseInt(window.master.profiles?.[curDetailSid]?.points || 0);
            const m = parseInt(window.master.profiles?.[curDetailSid]?.medals || 0);
            if(p >= 5) { db.ref(`jjvs_v13_cloud/profiles/${curDetailSid}`).update({ points: p-5, medals: m+1 }); alert("兌換成功！"); }
            else { alert("星星還不夠喔！"); }
        }

        function closeModal() { if(role === 'student') return; curDetailSid = null; document.getElementById('overlay').style.display='none'; document.getElementById('modal').style.display='none'; }

        function exportExcel() {
            const exp = []; const att = window.master.attendance || {}; const profs = window.master.profiles || {};
            Object.keys(att).sort().reverse().forEach(d => {
                students.forEach(s => {
                    const st = att[d][s.id];
                    if (st) {
                        const p = profs[s.id] || {};
                        exp.push({ "日期": d, "班級": s.group, "姓名": s.name, "出席": statusNames[st], "點數": p.points || 0, "金牌": p.medals || 0, "私訊": p.msg || "" });
                    }
                });
            });
            const ws = XLSX.utils.json_to_sheet(exp); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "學習紀錄"); XLSX.writeFile(wb, `莊敬音樂科報表.xlsx`);
        }
    </script>
</body>
</html>
