<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>莊敬音樂科—皇家行政總部 V38</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --black: #0A0A0A; --safe: #27AE60; --late: #F1C40F; --danger: #E74C3C; --blue: #2980B9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--black); color: #333; margin: 0; font-family: "PingFang TC", sans-serif; min-height: 100vh; overflow-x: hidden; }
        header { background: #000; color: var(--gold); padding: 25px 10px; text-align: center; border-radius: 0 0 40px 40px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gold); }
        #loginScreen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: #fff; padding: 40px; border-radius: 40px; width: 90%; max-width: 380px; text-align: center; border: 4px solid var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; width: 100%; }
        .s-box { background: #fff; border-radius: 25px; padding: 20px 5px; text-align: center; position: relative; border: 1.5px solid rgba(212,175,55,0.3); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .s-dot { aspect-ratio: 1/1; width: 80%; max-width: 65px; margin: 0 auto 10px; border-radius: 20px; border: 4px solid #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; color: #fff; }
        .s-name { font-weight: 900; font-size: 1.1rem; color: #000; }
        .s-points { position: absolute; top: -8px; right: -8px; background: #FF4500; color: #fff; font-size: 0.75rem; padding: 4px 10px; border-radius: 15px; font-weight: bold; border: 2px solid #fff; }
        .batch-check { position: absolute; top: 10px; left: 10px; width: 22px; height: 22px; display: none; }
        #batchBar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; padding: 20px; border-radius: 35px 35px 0 0; display: none; z-index: 5000; border-top: 3px solid var(--gold); }
        .notif-dot { width: 12px; height: 12px; background: red; border-radius: 50%; display: inline-block; border: 2px solid white; margin-left: 5px; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 500px; background: #fff; border-radius: 45px; padding: 25px; z-index: 10005; max-height: 90vh; overflow-y: auto; box-shadow: 0 50px 150px rgba(0,0,0,0.9); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10001; backdrop-filter: blur(8px); }
        .btn { width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37, #B8860B); color: #fff; }
        .btn-dark { background: #000; color: #fff; border: 1.5px solid var(--gold); }
        .btn-sm { padding: 8px 15px; border-radius: 15px; border: 1.5px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-size: 0.8rem; }
        .tab-btn { white-space: nowrap; padding: 12px 22px; border-radius: 30px; border: none; background: #fff; font-weight: bold; margin-right: 10px; }
        .tab-btn.active { background: var(--gold); color: #fff; }
        input, textarea, select { width: 100%; padding: 15px; border-radius: 18px; border: 1.5px solid #ddd; margin-bottom: 12px; font-size: 1rem; }
        .log-row { background: #f9f9f9; border-radius: 20px; padding: 15px; margin-bottom: 10px; font-size: 0.9rem; border-left: 6px solid var(--gold); }
        .bg-present { background: var(--safe); } .bg-late { background: var(--late); } .bg-absent { background: var(--danger); } .bg-leave { background: var(--blue); }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1 style="margin:0; font-size:2.5rem;">莊敬音樂科</h1>
            <p style="color:var(--gold); font-weight:bold; margin-bottom: 30px;">ROYAL ADMIN PORTAL</p>
            <input type="text" id="lAcc" placeholder="管理帳號 或 學生姓名">
            <input type="password" id="lPw" placeholder="密碼 (初始 0000)">
            <button class="btn btn-gold" onclick="doAuth()">登入管理系統</button>
        </div>
    </div>

    <div id="appScreen" style="display:none;">
        <header>
            <h2 style="margin:0; letter-spacing: 2px;">🏛️ 行政總部</h2>
            <div id="lInfo" style="font-size:0.9rem; margin:8px 0;">同步中...</div>
            <div style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
                <button class="btn-sm" onclick="toggleBatch()">🛠️ 批次模式</button>
                <button id="setupBtn" class="btn-sm" style="display:none;" onclick="openSetup()">⚙️ 教師</button>
                <button id="mgrBtn" class="btn-sm" style="display:none;" onclick="openMgr()">👤 學員管理</button>
                <button id="resetAllBtn" class="btn-sm" style="display:none; color:red; border-color:red;" onclick="resetAll()">🚨 重置</button>
                <button class="btn-sm" onclick="location.reload()">登出</button>
            </div>
        </header>
        <div style="padding:15px;">
            <div style="background:#fff; border-radius:30px; margin: 15px; text-align:center; padding:15px;">
                📅 <input type="date" id="tDate" onchange="loadCloud()" style="width: auto; border:none; background:#f0f0f0; padding:10px; border-radius:10px;">
            </div>
            <div id="tabs" style="display:flex; overflow-x:auto; margin:0 15px 10px;"></div>
            <div id="sGrid" class="grid"></div>
            <button class="btn btn-gold" style="background:#000; border:2px solid var(--gold); margin: 0 15px;" onclick="saveAtt()">💾 儲存點名紀錄</button>
            <div id="lList" style="background:#fff; margin:25px 15px; padding:20px; border-radius:35px;">
                <b>外出申請 </b><span id="lRedDot" class="notif-dot" style="display:none;"></span>
                <div id="lListContent">尚未有申請</div>
            </div>
        </div>
    </div>

    <div id="studentScreen" style="display:none; text-align:center; padding: 60px 20px;">
        <div style="font-size:6rem;">🎼</div><h1 id="welcome">學員</h1>
        <div id="sCard" style="background:#fff; border-radius:40px; padding:30px; margin-bottom:20px; color:#333;">載入中...</div>
        <button class="btn btn-gold" style="position:relative;" onclick="openD(curS.id)">我的個人看板 <span id="mRedDot" class="notif-dot" style="display:none;"></span></button>
        <button class="btn btn-dark" style="margin-top:20px;" onclick="applyLeave()">📝 申請第八節外出證</button>
    </div>

    <div id="batchBar">
        <div style="color:#fff; margin-bottom:10px; font-weight:bold;">已勾選學生，請選擇：</div>
        <div style="display:flex; gap:10px;"><button class="btn btn-gold" onclick="batchAdj(1)">＋1 點 ⭐</button><button class="btn btn-gold" onclick="batchAdj(-1)">－1 點 ➖</button><button class="btn btn-dark" onclick="toggleBatch()">取消</button></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="modal">
        <h2 id="mName" style="text-align:center; font-size:2rem; color:#000;">姓名</h2>
        <div id="adminOnly" style="display:none; background:#FFFDE7; padding:15px; border-radius:25px; margin-bottom:20px; border:2px solid var(--gold); text-align:center;">
            🔐 學生密碼：<span id="mPw" style="font-weight:bold; font-size:1.5rem;">----</span>
        </div>
        <div id="sCardSlots" style="display:flex; flex-wrap:wrap; justify-content:center; margin-bottom:15px;"></div>
        <div id="ptsTools" style="display:none; text-align:center;">
            <button class="btn-sm" onclick="adj('p',1)">＋</button><button class="btn-sm" onclick="adj('p',-1)">－</button><button class="btn-sm" onclick="redeem()">🎟️ 換牌</button>
        </div>
        <div id="mMedals" style="font-size:28px; text-align:center; margin:15px 0;"></div>
        <div id="mLog" style="max-height:200px; overflow-y:auto; background:#f9f9f9; padding:15px; border-radius:25px; font-size:0.9rem;"></div>
        <div id="adminTools" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
            <textarea id="tMsg" placeholder="發送私訊..."></textarea><button class="btn btn-gold" onclick="sendMsg()">發送</button>
            <button class="btn btn-sm" style="margin-top:15px; color:red; border-color:red;" onclick="resetOne()">⚠️ 重置此生</button>
        </div>
        <button class="btn btn-dark" style="margin-top:20px;" onclick="closeModal()">返回</button>
    </div>

    <div id="mgr-modal" class="modal">
        <h2 style="text-align:center;">學員與班級管理</h2>
        <div style="background:#f9f9f9; padding:20px; border-radius:25px; margin-bottom:20px;">
            <b>新增學員</b><input type="text" id="ns-id" placeholder="學號 (如 1A01)"><input type="text" id="ns-n" placeholder="姓名"><input type="text" id="ns-g" placeholder="班級 (如 音三莊)"><button class="btn btn-gold" onclick="addS()">新增</button>
        </div>
        <button class="btn btn-dark" style="background:#555;" onclick="importInitial()">一鍵匯入 133 位初始名單</button>
        <div id="sList" style="margin-top:20px; max-height:200px; overflow-y:auto; color:#000;"></div>
        <button class="btn btn-dark" onclick="closeModal()">關閉</button>
    </div>

    <div id="setup-modal" class="modal">
        <h2 style="text-align:center;">教師權限設定</h2>
        <input type="text" id="nt-n" placeholder="姓名"><input type="text" id="nt-a" placeholder="帳號"><input type="text" id="nt-p" placeholder="密碼">
        <select id="nt-c"><option value="ALL">全系管理</option><option value="音三莊">音三莊</option><option value="演三莊">演三莊</option><option value="音二莊">音二莊</option><option value="演二樸">演二樸</option><option value="音一莊">音一莊</option></select>
        <button class="btn btn-gold" onclick="addT()">開通</button>
        <div id="tList" style="margin-top:20px; color:#000;"></div>
    </div>

    <script>
        const M_N = "蕭旭成", M_P = "0902", DB = "jjvs_v_final_cloud";
        firebase.initializeApp(FIREBASE_CONFIG); const db = firebase.database();
        let role='', curS=null, curSid=null, adm={n:'', cls:'ALL'}, localAtt={}, currentGrp='音三莊', isBatch=false, pendingAtt={}, students=[];

        function doAuth() {
            const acc=document.getElementById('lAcc').value.trim(), pw=document.getElementById('lPw').value.trim();
            if(acc===M_N && pw===M_P) { role='admin'; adm={n:M_N, cls:'ALL'}; start(); document.getElementById('loginScreen').remove(); return; }
            const pwH=CryptoJS.SHA256(pw).toString();
            db.ref(`${DB}/admins/${acc}`).once('value', sn => {
                const d=sn.val(); if(d && pwH===d.p) { role='admin'; adm={n:d.n, cls:d.cls}; start(); document.getElementById('loginScreen').remove(); }
                else {
                    const f=students.find(s=>s.name===acc);
                    if(f) { db.ref(`${DB}/auth/${f.id}`).once('value', s2=>{ const ad=s2.val()||{p:'0000'}; if(pw===ad.p){ if(pw==='0000'){const np=prompt("改密碼:"); if(np&&np!=='0000'){db.ref(`${DB}/auth/${f.id}`).set({p:np});alert("成功");}}else{curS=f;role='student';start();document.getElementById('loginScreen').remove();}} else alert("密碼錯"); }); }
                    else alert("查無此人");
                }
            });
        }

        function start() {
            if(role==='admin'){
                document.getElementById('appScreen').style.display='block';
                document.getElementById('tDate').value = new Date().toISOString().split('T')[0];
                if(adm.n===M_N){ ['setupBtn','mgrBtn','resetAllBtn'].forEach(id=>document.getElementById(id).style.display='inline-block'); }
            } else { document.getElementById('studentScreen').style.display='block'; loadS(); }
            loadCloud();
        }

        function loadCloud() {
            db.ref(DB).on('value', sn => {
                const data = sn.val() || {}; window.mData = data;
                students = Object.values(data.students || {});
                localAtt = {...(data.attendance && data.attendance[document.getElementById('tDate').value])};
                renderT(); renderG(); renderL(); if(curSid) refresh(curSid);
                if(role === 'student') checkNotif();
                document.getElementById('lInfo').innerText = role==='admin' ? adm.n+" 老師" : "學員："+curS.name;
            });
        }

        function renderT() {
            const tb=document.getElementById('tabs'); tb.innerHTML="";
            const gs=adm.cls==='ALL' ? [...new Set(students.map(s=>s.group))] : [adm.cls];
            gs.sort().forEach((g,i)=>{ const b=document.createElement('button'); b.innerText=g; b.className=`tab-btn ${g===currentGrp?'active':''}`; b.onclick=()=>{currentGrp=g; renderG();}; tb.appendChild(b); });
        }

        function renderG() {
            const grid=document.getElementById('sGrid'); grid.innerHTML=""; if(role!=='admin')return;
            const sm={'未':'#666','出':'var(--safe)','遲':'var(--late)','缺':'var(--danger)','假':'var(--blue)'};
            students.filter(s=>s.group===currentGrp).forEach(s => {
                const d=window.mData.profiles?.[s.id]||{points:0}; const st=pendingAtt[s.id]||localAtt[s.id]||'未';
                const div=document.createElement('div'); div.className="s-box";
                div.innerHTML=`<input type="checkbox" class="batch-check" value="${s.id}" style="display:${isBatch?'block':'none'}"><div class="s-points">${d.points}P</div><div class="s-dot" style="background:${sm[st]}" onclick="tSt('${s.id}')">${st}</div><div class="s-name" onclick="openD('${s.id}')">${s.name}</div>`;
                grid.appendChild(div);
            });
        }

        function tSt(id){ const cy=['出','遲','缺','假']; let c=pendingAtt[id]||localAtt[id]||'出'; pendingAtt[id]=cy[(cy.indexOf(c)+1)%4]; renderG(); }
        function saveAtt(){
            const sd=document.getElementById('tDate').value, up={};
            for(let id in pendingAtt){ 
                up[`attendance/${sd}/${id}`]=pendingAtt[id];
                if(pendingAtt[id]==='遲'){ 
                    const cp=window.mData.profiles?.[id]?.points||0; up[`profiles/${id}/points`]=Math.max(0, cp-1);
                    const logs=window.mData.profiles?.[id]?.logs||[]; logs.push({time:new Date().toLocaleString(),act:"💀 遲到扣點",reason:"結算處分",admin:adm.n}); up[`profiles/${id}/logs`]=logs;
                }
            }
            db.ref(DB).update(up).then(()=>{pendingAtt={};alert("存檔成功");});
        }

        function toggleBatch(){ isBatch=!isBatch; document.getElementById('batchBar').style.display=isBatch?'block':'none'; renderG(); }
        function batchAdj(v){
            const r=prompt("原因:"); if(!r)return; const ids=Array.from(document.querySelectorAll('.batch-check:checked')).map(c=>c.value);
            if(!ids.length)return alert("未選"); const up={};
            ids.forEach(id=>{
                const cp=window.mData.profiles?.[id]?.points||0; up[`profiles/${id}/points`]=Math.max(0, cp+v);
                const logs=window.mData.profiles?.[id]?.logs||[]; logs.push({time:new Date().toLocaleString(),act:(v>0?"➕批次獎勵 ":"➖批次處分 ")+Math.abs(v),reason:r,admin:adm.n}); up[`profiles/${id}/logs`]=logs;
                up[`profiles/${id}/msgTime`]=Date.now();
            });
            db.ref(DB).update(up).then(()=>{alert("批次完成"); toggleBatch();});
        }

        function openD(id){ curSid=id; document.getElementById('overlay').style.display='block'; document.getElementById('modal').style.display='block'; refresh(id); if(role==='student') localStorage.setItem('lr_'+id, Date.now()); }
        function refresh(id) {
            const s=students.find(x=>x.id===id), p=window.mData.profiles?.[id]||{points:0,medals:0,logs:[]};
            document.getElementById('mName').innerText=s.name;
            const sc=document.getElementById('sCardSlots'); sc.innerHTML=""; for(let i=0;i<10;i++) sc.innerHTML+=`<div class="slot ${i<p.points?'slot-active':''}">${i<p.points?'⭐':''}</div>`;
            document.getElementById('mMedals').innerText="🏅".repeat(p.medals||0);
            const lb=document.getElementById('mLog'); lb.innerHTML=""; (p.logs||[]).reverse().forEach(l=>{ lb.innerHTML+=`<div class="log-row">🕒 ${l.time}<br><b>${l.act}</b><br>原因：${l.reason} <span style="float:right;color:#999;">by ${l.admin||''}</span></div>`; });
            if(role==='admin'){ ['ptsTools','adminOnly','adminTools'].forEach(id=>document.getElementById(id).style.display='block'); db.ref(`${DB}/auth/${id}/p`).once('value', sn=>document.getElementById('mPw').innerText=sn.val()||'0000'); }
        }

        function adj(t,v){ 
            const r=prompt("原因:"); if(!r)return; const cp=parseInt(window.mData.profiles?.[curSid]?.[t==='p'?'points':'medals']||0);
            db.ref(`${DB}/profiles/${curSid}/${t==='p'?'points':'medals'}`).set(Math.max(0,cp+v));
            addLog(curSid,(t==='p'?'點數':'金牌')+(v>0?'➕':'➖')+Math.abs(v),r); db.ref(`${DB}/profiles/${curSid}/msgTime`).set(Date.now());
        }

        function sendMsg(){ const m=document.getElementById('tMsg').value; if(!m)return; db.ref(`${DB}/profiles/${curSid}/msg`).set(m); db.ref(`${DB}/profiles/${curSid}/msgTime`).set(Date.now()); addLog(curSid,"💬 留言",m); document.getElementById('tMsg').value=""; alert("已送出"); }
        function resetOne(){ if(confirm("重置數據？")) db.ref(`${DB}/profiles/${curSid}`).remove(); }
        function resetAll(){ if(confirm("🚨 全校數據歸零？")) db.ref(`${DB}/profiles`).remove(); }
        function addLog(id,act,reason){ const logs=window.mData.profiles?.[id]?.logs||[]; logs.push({time:new Date().toLocaleString(),act,reason,admin:adm.n}); db.ref(`${DB}/profiles/${id}/logs`).set(logs); }
        function redeem(){ const p=window.mData.profiles?.[curSid]?.points||0; if(p>=5){ db.ref(`${DB}/profiles/${curSid}`).update({points:p-5,medals:(window.mData.profiles?.[curSid]?.medals||0)+1}); addLog(curSid,"🎟️ 換牌","自動"); } }
        function closeModal(){ curSid=null; document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); document.getElementById('overlay').style.display='none'; }
        
        function openMgr(){ document.getElementById('overlay').style.display='block'; document.getElementById('mgr-modal').style.display='block'; renderSList(); }
        function addS(){ const id=document.getElementById('ns-id').value, n=document.getElementById('ns-n').value, g=document.getElementById('ns-g').value; if(!id||!n||!g)return; db.ref(`${DB}/students/${id}`).set({id,name:n,group:g}).then(()=>alert("新增成功")); }
        function renderSList(){ const b=document.getElementById('sList'); b.innerHTML=""; students.forEach(s=>{ b.innerHTML+=`<div style="padding:5px; border-bottom:1px solid #eee;">${s.group} ${s.name} <button onclick="delS('${s.id}')" style="float:right;color:red;">[刪除]</button></div>`; }); }
        function delS(id){ if(confirm("刪除學生？")) db.ref(`${DB}/students/${id}`).remove(); }
        
        function openSetup(){ document.getElementById('overlay').style.display='block'; document.getElementById('setup-modal').style.display='block'; renderAL(); }
        function addT(){ const n=document.getElementById('nt-n').value, a=document.getElementById('nt-a').value, p=document.getElementById('nt-p').value, c=document.getElementById('nt-c').value; if(!n||!a||!p)return; db.ref(`${DB}/admins/${a}`).set({n,p:CryptoJS.SHA256(p).toString(),cls:c}).then(()=>renderAL()); }
        function renderAL(){ const b=document.getElementById('tList'); b.innerHTML=""; db.ref(`${DB}/admins`).once('value', sn=>{ const d=sn.val(); for(let a in d) b.innerHTML+=`<div style="padding:8px; border-bottom:1px solid #eee;">${d[a].n} (${d[a].cls}) <button onclick="delT('${a}')" style="float:right;color:red;">[刪]</button></div>`; }); }
        function delT(a){ if(confirm("刪除老師？")) db.ref(`${DB}/admins/${a}`).remove().then(()=>renderAL()); }

        function applyLeave(){ const r=prompt("原因:"); if(!r)return; db.ref(`${DB}/leaves/${new Date().toISOString().split('T')[0]}_${curS.id}`).set({name:curS.name, reason:r, status:'pending'}); alert("已申請"); }
        function renderL(){
            const box=document.getElementById('lListContent'); box.innerHTML=""; const lv=window.mData.leaves||{}, sd=document.getElementById('tDate').value;
            let c=0; Object.keys(lv).forEach(k=>{ if(k.startsWith(sd)&&lv[k].status==='pending'){ c++; box.innerHTML+=`<div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span><b>${lv[k].name}</b>: ${lv[k].reason}</span><button class="btn-sm" style="color:green;border-color:green;" onclick="apprL('${k}')">核可</button></div>`; } }); document.getElementById('lRedDot').style.display=c>0?'inline-block':'none';
        }
        function apprL(k){ db.ref(`${DB}/leaves/${k}`).update({status:'approved', admin:adm.n}); }
        function loadS(){ db.ref(`${DB}/profiles/${curS.id}`).on('value', sn => { const d=sn.val()||{points:0,medals:0,msg:"無"}; document.getElementById('sCard').innerHTML=`<h2 style="margin:0; color:var(--gold);">${curS.name}</h2><div style="font-size:24px; margin:15px 0;">⭐ ${d.points} | 🏅 ${d.medals}</div><div style="background:#FFF9C4; padding:15px; border-radius:15px; font-weight:bold;">老師訊息：${d.msg}</div>`; }); }
        function checkNotif(){ const lr=localStorage.getItem('lr_'+curS.id)||0, mt=window.mData.profiles?.[curS.id]?.msgTime||0; document.getElementById('mRedDot').style.display=mt>lr?'inline-block':'none'; }
        
        function importInitial(){
            if(!confirm("確定要匯入 133 位初始學生名單嗎？這會覆蓋現有名單。")) return;
