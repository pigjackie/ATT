    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-steel: #2C3E50;
            --bg-glass: #F8F9FA;
            --present: #27AE60;
            --late: #F39C12;
            --absent: #C0392B;
            --leave: #2980B9;
            --accent: #E67E22;
        }

        body { 
            background: #E0E0E0; 
            color: #333; 
            font-family: -apple-system, "Noto Sans TC", sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; 
        }

        /* 磨砂玻璃質感門禁 */
        #gate-screen { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
        }
        .gate-card { 
            background: rgba(255, 255, 255, 0.95); padding: 40px 30px; border-radius: 35px;
            width: 85%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 質感頂部 */
        header { 
            background: var(--dark-steel); color: var(--primary-gold); 
            padding: 25px 15px; text-align: center; border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100;
        }

        /* 絕對對齊 1x3 網格 */
        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 12px; padding: 15px; margin-top: 10px;
        }
        .s-box { 
            background: #fff; border-radius: 22px; padding: 15px 5px; 
            text-align: center; box-shadow: 0 8px 15px rgba(0,0,0,0.05); 
            border: 1px solid rgba(0,0,0,0.03); position: relative;
            transition: 0.3s;
        }
        .s-dot { 
            aspect-ratio: 1/1; width: 80%; max-width: 60px; margin: 0 auto 10px;
            border-radius: 18px; border: 4px solid #fff; box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 900; color: #fff;
        }
        .s-name { font-weight: bold; font-size: 0.95rem; color: var(--dark-steel); }
        .s-points { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #fff; font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; font-weight: bold; }

        /* 質感彈窗 */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 92%; max-width: 480px; background: #fff; border-radius: 35px; padding: 25px; 
            z-index: 1001; box-shadow: 0 30px 100px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto;
        }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; backdrop-filter: blur(5px); }

        /* 外出核可證 (絕美全屏) */
        #pass-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--present); z-index: 5000; text-align: center; color: #fff;
        }

        .btn { 
            width: 100%; padding: 16px; margin-top: 12px; border-radius: 18px; 
            border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        .btn-gold { background: var(--primary-gold); color: #fff; box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        .btn-dark { background: var(--dark-steel); color: #fff; }
        
        .section-title { font-size: 1.1rem; font-weight: bold; color: var(--dark-steel); border-left: 6px solid var(--primary-gold); padding-left: 12px; margin: 20px 0 10px 0; text-align: left; }
        .log-row { background: #f1f3f5; border-radius: 15px; padding: 12px; margin-bottom: 8px; font-size: 0.85rem; border-left: 4px solid var(--primary-gold); position: relative; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #ddd; margin-bottom: 10px; font-size: 1rem; box-sizing: border-box; }
        .tab-btn { white-space: nowrap; padding: 12px 20px; border-radius: 20px; border: none; background: #fff; font-weight: bold; color: var(--dark-steel); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tab-btn.active { background: var(--primary-gold); color: #fff; }
    </style>
</head>

        let role = ''; let currentGrp = "音三莊"; let curStudent = null; let curDetailSid = null;
        let adminInfo = { n: '', cls: 'ALL' }; let localAtt = {};
        const statusColors = ['bg-present', 'bg-late', 'bg-absent', 'bg-leave'];
        const statusNames = { 'bg-present':'出', 'bg-late':'遲', 'bg-absent':'缺', 'bg-leave':'假' };

        // 🟢 執行登入判定
        function doAuth() {
            const acc = document.getElementById('login-acc').value;
            const pw = document.getElementById('login-pw').value;
            const pwHash = CryptoJS.SHA256(pw).toString();

            if(acc === MASTER_ACC && pwHash === MASTER_PW_HASH) {
                role = 'admin'; adminInfo = { n: '蕭旭成', cls: 'ALL' };
                setStorage('admin', null, '蕭旭成', 'ALL'); start();
            } else {
                db.ref(`jjvs_v22_admins/${acc}`).once('value', sn => {
                    const data = sn.val();
                    if(data && pwHash === data.p) {
                        role = 'admin'; adminInfo = { n: data.n, cls: data.cls };
                        setStorage('admin', null, data.n, data.cls); start();
                    } else {
                        const f = students.find(s => s.name.includes(acc));
                        if(f) {
                            db.ref(`jjvs_v22_auth/${f.id}`).once('value', sn2 => {
                                const d = sn2.val() || {p: '0000'};
                                if(pw === d.p) {
                                    if(pw === '0000') {
                                        const np = prompt("安全考量：請將預設密碼 0000 修改為自訂密碼");
                                        if(!np || np === '0000') return alert("修改失敗");
                                        db.ref(`jjvs_v22_auth/${f.id}`).set({p: np});
                                        alert("密碼已修改，請用新密碼重新登入");
                                    } else {
                                        curStudent = f; role = 'student'; setStorage('student', f.id); start();
                                    }
                                } else alert("密碼錯誤");
                            });
                        } else alert("查無此帳號或姓名");
                    }
                });
            }
        }

        function setStorage(r, sid, n, cls) {
            localStorage.setItem('jjvs_role', r); localStorage.setItem('jjvs_sid', sid);
            localStorage.setItem('jjvs_admin_name', n); localStorage.setItem('jjvs_admin_cls', cls);
        }

        window.onload = () => {
            const r = localStorage.getItem('jjvs_role');
            if(r === 'admin') {
                role = 'admin'; adminInfo = { n: localStorage.getItem('jjvs_admin_name'), cls: localStorage.getItem('jjvs_admin_cls') };
                start();
            } else if(r === 'student') {
                curStudent = students.find(s => s.id === localStorage.getItem('jjvs_sid'));
                role = 'student'; start();
            }
        };

        function logout() { localStorage.clear(); location.reload(); }

        function start() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('target-date').value = new Date().toISOString().split('T')[0];
            if(role === 'admin') {
                document.getElementById('admin-view').style.display = 'block';
                if(adminInfo.n === '蕭旭成') document.getElementById('admin-setup-btn').style.display = 'inline-block';
                initTabs();
            } else {
                document.getElementById('student-view').style.display = 'block';
                openDetail(curStudent.id);
            }
            loadCloud();
        }

        function initTabs() {
            const tb = document.getElementById('tabs'); tb.innerHTML = "";
            const grps = adminInfo.cls === 'ALL' ? ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"] : [adminInfo.cls];
            currentGrp = grps[0];
            grps.forEach(g => {
                const b = document.createElement('button'); b.innerText = g;
                b.className = `tab-btn ${g === currentGrp ? 'active' : ''}`;
                b.onclick = () => { currentGrp = g; Array.from(tb.children).forEach(c=>c.classList.remove('active')); b.classList.add('active'); renderGrid(); };
                tb.appendChild(b);
            });
        }

        function loadCloud() {
            db.ref('jjvs_v22_cloud').on('value', snap => {
                window.master = snap.val() || {};
                const sd = document.getElementById('target-date').value;
                localAtt = {...(window.master.attendance && window.master.attendance[sd])};
                renderGrid(); renderLeaves();
                if(curDetailSid) refreshModalUI(curDetailSid);
                document.getElementById('login-info').innerText = role === 'admin' ? `${adminInfo.n} 老師 (加密同步中)` : "學員："+curStudent.name;
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid'); grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles?.[s.id]?.points) || 0;
                const div = document.createElement('div'); div.className = "s-box";
                div.innerHTML = `<div class="s-points">${pts}P</div><div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div><div class="s-name" onclick="openDetail('${s.id}')">${s.name}</div>`;
                grid.appendChild(div);
            });
        }

        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let nextIndex = (statusColors.indexOf(cur) + 1) % statusColors.length;
            let next = statusColors[nextIndex]; localAtt[sid] = next;
            const dot = document.getElementById(`dot-${sid}`);
            dot.className = `s-dot ${next}`; dot.innerText = statusNames[next];
            if(next === 'bg-late') {
                const curP = window.master.profiles?.[sid]?.points || 0;
                db.ref(`jjvs_v22_cloud/profiles/${sid}/points`).set(Math.max(0, curP - 1));
                addLog(sid, "💀 遲到自動扣點", `[${adminInfo.n}] 點名處分`);
            }
        }

        function syncCloud() {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v22_cloud/attendance/${sd}`).set(localAtt).then(() => alert("點名紀錄已存至雲端"));
        }

        function openDetail(sid) {
            curDetailSid = sid; document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            if (window.master) refreshModalUI(sid);
        }

        function refreshModalUI(sid) {
            const s = students.find(x => x.id === sid);
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無訊息", logs: [] };
            document.getElementById('m-name').innerText = s.name;
            document.getElementById('m-msg').innerText = prof.msg || "目前無訊息";
            
            // 渲染10格星
            const pts = prof.points || 0; const sb = document.getElementById('stamp-card'); sb.innerHTML = "";
            for(let i=0; i<10; i++) sb.innerHTML += `<div class="slot ${i < pts ? 'slot-active' : ''}">${i < pts ? '⭐' : ''}</div>`;
            
            // 渲染金牌
            const med = prof.medals || 0; const mb = document.getElementById('medal-card'); mb.innerHTML = "";
            for(let i=0; i<Math.max(med, 5); i++) mb.innerHTML += `<div class="slot ${i < med ? 'slot-active' : ''}">${i < med ? '🏅' : ''}</div>`;
            
            // 渲染日誌
            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            const combinedLogs = [...(prof.logs || [])];
            const att = window.master.attendance || {};
            Object.keys(att).forEach(d => { if(att[d][sid]) combinedLogs.push({ time: d+" 00:00", act: "出席登記: "+statusNames[att[d][sid]], reason: "系統存檔", admin: "SYSTEM" }); });
            combinedLogs.sort((a,b) => b.time.localeCompare(a.time)).forEach(l => {
                hBox.innerHTML += `<div class="log-row">📅 ${l.time}<br><b>${l.act}</b><br>原因：${l.reason} <span style="float:right; color:#999;">${l.admin || ''}</span></div>`;
            });

            if(role === 'admin') {
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('admin-pts-tool').style.display = 'block';
                document.getElementById('admin-med-tool').style.display = 'block';
                document.getElementById('admin-msg-zone').style.display = 'block';
                document.getElementById('admin-only-info').style.display = 'block';
                db.ref(`jjvs_v22_auth/${sid}/p`).once('value', sn => document.getElementById('m-pw').innerText = sn.val() || '0000');
            }
            
            const sd = document.getElementById('target-date').value;
            const leave = window.master.leaves?.[sd + "_" + sid];
            if(role === 'student' && leave === 'APPROVED') {
                document.getElementById('student-leave-status').innerHTML = `<button class="btn" style="background:var(--safe); color:#fff;" onclick="showGuardPass('${s.name}', '${sd}')">🎫 出示外出查驗證</button>`;
            }
        }

        function showGuardPass(n, d) {
            document.getElementById('pass-name').innerText = n;
            document.getElementById('pass-date').innerText = d;
            document.getElementById('pass-admin').innerText = adminInfo.n;
            document.getElementById('pass-screen').style.display = 'block';
        }

        function applyLeave() {
            const r = prompt("請說明外出具體原因："); if(!r) return;
            const lKey = document.getElementById('target-date').value + "_" + curStudent.id;
            db.ref(`jjvs_v22_cloud/leaves/${lKey}`).set("PENDING");
            db.ref(`jjvs_v22_cloud/profiles/${curStudent.id}/msg`).set(`🚶 提出外出申請：${r}`);
            alert("已成功送出申請，請等候核可。");
        }

        function renderLeaves() {
            const box = document.getElementById('leave-list'); box.innerHTML = "";
            const leaves = window.master.leaves || {};
            const sd = document.getElementById('target-date').value;
            let count = 0;
            students.filter(s => s.group === currentGrp || adminInfo.cls === 'ALL').forEach(s => {
                if(leaves[sd+"_"+s.id] === 'PENDING') {
                    count++;
                    box.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>🚶 ${s.name} 申請外出</span><button class="btn" style="width:60px; height:30px; padding:0; background:var(--safe); color:#fff;" onclick="approveLeave('${s.id}')">核可</button></div>`;
                }
            });
            if(count === 0) box.innerText = "今日目前無外出申請。";
        }

        function approveLeave(sid) {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v22_cloud/leaves/${sd+"_"+sid}`).set("APPROVED");
            addLog(sid, "✅ 核可第八節外出", `核可人：${adminInfo.n}`);
        }

        function adj(type, v) {
            const r = prompt("請註明變更原因(日期已自動記錄)："); if(!r) return;
            const path = type === 'p' ? 'points' : 'medals';
            const cur = parseInt(window.master.profiles?.[curDetailSid]?.[path] || 0);
            db.ref(`jjvs_v22_cloud/profiles/${curDetailSid}/${path}`).set(Math.max(0, cur + v));
            addLog(curDetailSid, (type==='p'?'點數':'金牌')+(v>0?'➕加':'➖扣')+Math.abs(v), r);
        }

        function addLog(sid, act, reason) {
            const time = new Date().toISOString().split('T')[0] + " " + new Date().toTimeString().slice(0,5);
            const logs = window.master.profiles?.[sid]?.logs || [];
            logs.push({ time, act, reason, admin: adminInfo.n });
            db.ref(`jjvs_v22_cloud/profiles/${sid}/logs`).set(logs);
        }

        function openSetup() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('setup-modal').style.display = 'block';
            renderAdminList();
        }

        function addTeacher() {
            const n = document.getElementById('new-t-name').value;
            const a = document.getElementById('new-t-acc').value;
            const p = document.getElementById('new-t-pw').value;
            const c = document.getElementById('new-t-class').value;
            if(!n || !a || !p) return alert("請完整填寫");
            db.ref(`jjvs_v22_admins/${a}`).set({ n: n, p: CryptoJS.SHA256(p).toString(), cls: c }).then(() => {
                alert("已成功建立教師帳號"); renderAdminList();
            });
        }

        function renderAdminList() {
            const box = document.getElementById('teacher-list'); box.innerHTML = "";
            db.ref('jjvs_v22_admins').once('value', sn => {
                const data = sn.val();
                for(let acc in data) {
                    box.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px;">${data[acc].n} | 管理:${data[acc].cls} <button onclick="delAdmin('${acc}')" style="float:right; color:red;">刪除</button></div>`;
                }
            });
        }
        function delAdmin(acc) { if(confirm("確定刪除此帳號？")) db.ref(`jjvs_v22_admins/${acc}`).remove().then(renderAdminList); }

        function redeem() {
            const p = window.master.profiles?.[curDetailSid]?.points || 0;
            if(p >= 5) {
                const m = window.master.profiles?.[curDetailSid]?.medals || 0;
                db.ref(`jjvs_v22_cloud/profiles/${curDetailSid}`).update({ points: p-5, medals: m+1 });
                addLog(curDetailSid, "🎟️ 集點兌換金牌", "自動兌換 (消耗5星)");
            } else alert("集點不足，還差 "+(5-p)+" 點");
        }

        function updateMsg() { db.ref(`jjvs_v22_cloud/profiles/${curDetailSid}/msg`).set(document.getElementById('t-msg').value); alert("訊息已送出"); }
        function closeModal() { curDetailSid = null; document.getElementById('overlay').style.display='none'; document.getElementById('modal').style.display='none'; document.getElementById('setup-modal').style.display='none'; }
    </script>
</body>
</html>
