                            const ad=sn2.val()||{p:'0000'};
                            if(pw===ad.p) {
                                if(pw==='0000') { const np=prompt("請修改預設密碼："); if(np && np!=='0000') { db.ref(`jjvs_v28_auth/${f.id}`).set({p:np}); alert("已修改，請重登"); } }
                                else { curStudent=f; role='student'; setS('student',f.id); start(); }
                            } else alert("密碼錯");
                        });
                    } else alert("無此帳號");
                }
            });
        }
        function setS(r,sid,n,c) { localStorage.setItem('jjvs_r',r); localStorage.setItem('jjvs_id',sid); localStorage.setItem('jjvs_an',n); localStorage.setItem('jjvs_ac',c); }
        window.onload=() => { const r=localStorage.getItem('jjvs_r'); if(r==='admin'){ role='admin'; adminInfo={n:localStorage.getItem('jjvs_an'),cls:localStorage.getItem('jjvs_ac')}; start(); } else if(r==='student'){ curStudent=students.find(s=>s.id===localStorage.getItem('jjvs_id')); role='student'; start(); } };
        function logout() { localStorage.clear(); location.reload(); }
        function start() { document.getElementById('gate-screen').style.display='none'; document.getElementById('app-screen').style.display='block'; document.getElementById('target-date').value=new Date().toISOString().split('T')[0]; if(role==='admin'){ document.getElementById('admin-view').style.display='block'; if(adminInfo.n==='蕭旭成') document.getElementById('admin-setup-btn').style.display='inline-block'; initT(); } else { document.getElementById('student-view').style.display='block'; openDetail(curStudent.id); } loadC(); }
        function initT() {
            const tb=document.getElementById('tabs'); tb.innerHTML=""; const gs=adminInfo.cls==='ALL'?["音三莊","演三莊","音二莊","演二樸","音一莊"]:[adminInfo.cls];
            gs.forEach((g,i)=>{ const b=document.createElement('button'); b.innerText=g; b.className=`tab-btn ${i===0?'active':''}`; if(i===0) currentGrp=g; b.onclick=()=>{ currentGrp=g; Array.from(tb.children).forEach(c=>c.classList.remove('active')); b.classList.add('active'); renderG(); }; tb.appendChild(b); }); renderG();
        }
        function loadC() { db.ref('jjvs_v28_cloud').on('value', sn => { window.master=sn.val()||{}; localAtt={...(window.master.attendance && window.master.attendance[document.getElementById('target-date').value])}; renderG(); renderL(); if(curDetailSid) refreshM(curDetailSid); document.getElementById('login-info').innerText=role==='admin'?`${adminInfo.n} 老師 (皇家連線)`:"皇家："+curStudent.name; }); }
        function renderG() { if(role!=='admin') return; const grid=document.getElementById('student-grid'); grid.innerHTML=""; students.filter(s=>s.group===currentGrp).forEach(s=>{ const st=localAtt[s.id]||'bg-present', pts=(window.master.profiles?.[s.id]?.points)||0; const div=document.createElement('div'); div.className="s-box"; div.innerHTML=`<div class="s-points">${pts}P</div><div class="s-dot ${st}" id="dot-${s.id}" onclick="toggle('${s.id}')">${statusNames[st]}</div><div class="s-name" onclick="openDetail('${s.id}')">${s.name}</div>`; grid.appendChild(div); }); }
        function toggle(sid) { let cur=localAtt[sid]||'bg-present', next=statusColors[(statusColors.indexOf(cur)+1)%statusColors.length]; localAtt[sid]=next; document.getElementById(`dot-${sid}`).className=`s-dot ${next}`; document.getElementById(`dot-${sid}`).innerText=statusNames[next]; if(next==='bg-late'){ const cp=window.master.profiles?.[sid]?.points||0; db.ref(`jjvs_v28_cloud/profiles/${sid}/points`).set(Math.max(0,cp-1)); addLog(sid,"💀 遲到扣1點",`系統自動 [${adminInfo.n}]`); } }
        function syncCloud() { db.ref(`jjvs_v28_cloud/attendance/${document.getElementById('target-date').value}`).set(localAtt).then(()=>alert("同步完成")); }
        function openDetail(sid) { curDetailSid=sid; document.getElementById('overlay').style.display='block'; document.getElementById('modal').style.display='block'; if(window.master) refreshM(sid); }
        function refreshM(sid) {
            const s=students.find(x=>x.id===sid), prof=(window.master.profiles && window.master.profiles[sid])||{points:0,medals:0,msg:"無",logs:[]}; document.getElementById('m-name').innerText=s.name; document.getElementById('m-msg').innerText=prof.msg||"無師長訊息";
            const pts=prof.points||0, sb=document.getElementById('stamp-card'); sb.innerHTML=""; for(let i=0;i<10;i++) sb.innerHTML+=`<div class="slot ${i<pts?'slot-active':''}">${i<pts?'⭐':''}</div>`;
            const med=prof.medals||0, mb=document.getElementById('medal-card'); mb.innerHTML=""; for(let i=0;i<Math.max(med,3);i++) mb.innerHTML+=`<div class="slot ${i<med?'slot-active':''}">${i<med?'🏅':''}</div>`;
            const hBox=document.getElementById('m-history'); hBox.innerHTML=""; const combined=[...(prof.logs||[])]; const att=window.master.attendance||{};
            Object.keys(att).forEach(d=>{ if(att[d][sid]) combined.push({time:d+" 00:00",act:"出席: "+statusNames[att[d][sid]],reason:"點名",admin:"系統"}); });
            combined.sort((a,b)=>b.time.localeCompare(a.time)).forEach(l=>{ hBox.innerHTML+=`<div class="log-row">🕒 ${l.time}<br><b>${l.act}</b><br>原因：${l.reason} <span style="float:right;color:#999;">by ${l.admin||''}</span></div>`; });
            if(role==='admin'){ document.getElementById('admin-pts-tool').style.display='block'; document.getElementById('admin-med-tool').style.display='block'; document.getElementById('admin-msg-zone').style.display='block'; document.getElementById('admin-only-info').style.display='block'; db.ref(`jjvs_v28_auth/${sid}/p`).once('value',sn=>document.getElementById('m-pw').innerText=sn.val()||'0000'); }
            if(role==='student' && window.master.leaves?.[document.getElementById('target-date').value+"_"+sid]==='APPROVED') document.getElementById('student-leave-status').innerHTML=`<button class="btn btn-gold" onclick="showPass('${s.name}')">🎟️ 出示准予外出證</button>`;
        }
        function showPass(n) { document.getElementById('pass-name').innerText=n; document.getElementById('pass-date').innerText=document.getElementById('target-date').value; document.getElementById('pass-admin').innerText=adminInfo.n; document.getElementById('pass-screen').style.display='block'; }
        function applyLeave() { const r=prompt("原因："); if(!r) return; db.ref(`jjvs_v28_cloud/leaves/${document.getElementById('target-date').value+"_"+curStudent.id}`).set("PENDING"); alert("已送出"); }
        function renderL() { const box=document.getElementById('leave-list'); box.innerHTML=""; const leaves=window.master.leaves||{}, sd=document.getElementById('target-date').value; students.filter(s=>s.group===currentGrp||adminInfo.cls==='ALL').forEach(s=>{ if(leaves[sd+"_"+s.id]==='PENDING') box.innerHTML+=`<div style="display:flex;justify-content:space-between;margin-bottom:12px;"><span>🚶 <b>${s.name}</b> 申請外出</span><button class="btn" style="width:70px;height:35px;padding:0;background:var(--present);color:#fff;" onclick="appr('${s.id}')">核可</button></div>`; }); }
        function appr(sid) { db.ref(`jjvs_v28_cloud/leaves/${document.getElementById('target-date').value+"_"+sid}`).set("APPROVED"); addLog(sid,"✅ 核可外出",adminInfo.n); }
        function adj(t,v) { const r=prompt("原因："); if(!r) return; const path=t==='p'?'points':'medals', cur=parseInt(window.master.profiles?.[curDetailSid]?.[path]||0); db.ref(`jjvs_v28_cloud/profiles/${curDetailSid}/${path}`).set(Math.max(0,cur+v)); addLog(curDetailSid,(t==='p'?'點':'金')+(v>0?'➕':'➖')+Math.abs(v),r); }
        function addLog(sid,act,reason) { const t=new Date().toISOString().split('T')[0]+" "+new Date().toTimeString().slice(0,5), logs=window.master.profiles?.[sid]?.logs||[]; logs.push({time:t,act:act,reason:reason,admin:adminInfo.n}); db.ref(`jjvs_v28_cloud/profiles/${sid}/logs`).set(logs); }
        function openSetup() { document.getElementById('overlay').style.display='block'; document.getElementById('setup-modal').style.display='block'; renderAdminL(); }
        function addTeacher() { const n=document.getElementById('new-t-name').value, a=document.getElementById('new-t-acc').value, p=document.getElementById('new-t-pw').value, c=document.getElementById('new-t-class').value; if(!n||!a||!p) return alert("必填"); db.ref(`jjvs_v28_admins/${a}`).set({n:n,p:CryptoJS.SHA256(p).toString(),cls:c}).then(()=>{ alert("已開通"); renderAdminL(); }); }
        function renderAdminL() { const box=document.getElementById('teacher-list'); box.innerHTML=""; db.ref('jjvs_v28_admins').once('value',sn=>{ const d=sn.val(); for(let acc in d) box.innerHTML+=`<div style="border-bottom:1px solid #ddd;padding:8px;"><b>${d[acc].n}</b>管轄:${d[acc].cls} <button onclick="delA('${acc}')" style="float:right;color:red;">[刪]</button></div>`; }); }
        function delA(acc) { if(confirm("刪？")) db.ref(`jjvs_v28_admins/${acc}`).remove().then(renderAdminL); }
        function redeem() { const p=window.master.profiles?.[curDetailSid]?.points||0; if(p>=5) { db.ref(`jjvs_v28_cloud/profiles/${curDetailSid}`).update({points:p-5,medals:(window.master.profiles?.[curDetailSid]?.medals||0)+1}); addLog(curDetailSid,"🎟️ 兌換金牌","自動"); } else alert("不夠"); }
        function updateMsg() { db.ref(`jjvs_v28_cloud/profiles/${curDetailSid}/msg`).set(document.getElementById('t-msg').value); alert("送出"); }
        function closeModal() { curDetailSid=null; document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    </script>
</body>
</html>
