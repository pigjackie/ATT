<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>莊敬音樂科—皇家行政管理系統</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root {
            --royal-gold: #D4AF37;
            --deep-black: #1A1A1B;
            --hall-white: #FDFDFD;
            --present: #27AE60;
            --late: #F39C12;
            --absent: #C0392B;
            --leave: #2980B9;
        }

        body { 
            background-color: #f0f0f0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-family='serif' font-size='20' fill='%23d4af37' opacity='0.08'%3E𝄞%3C/text%3E%3Ctext x='50' y='80' font-family='serif' font-size='15' fill='%23d4af37' opacity='0.08'%3E♫%3C/text%3E%3Ctext x='80' y='40' font-family='serif' font-size='18' fill='%23d4af37' opacity='0.08'%3E♬%3C/text%3E%3Ctext x='30' y='90' font-family='serif' font-size='25' fill='%23d4af37' opacity='0.05'%3E🎹%3C/text%3E%3C/svg%3E");
            color: #333; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
        }

        /* 皇家全版門禁 */
        #gate-screen { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #2c3e50 0%, #000 100%);
            position: relative; overflow: hidden;
        }
        #gate-screen::before {
            content: "🎻 🎺 🎷 🎸 🎹"; font-size: 5rem; opacity: 0.1; position: absolute; top: 10%; width: 100%; text-align: center; color: var(--royal-gold);
        }

        .gate-card { 
            background: rgba(255, 255, 255, 0.95); padding: 50px 30px; border-radius: 40px;
            width: 88%; max-width: 400px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 3px solid var(--royal-gold); z-index: 10;
        }

        /* 滿版主介面 */
        #app-screen { display: none; width: 100%; min-height: 100vh; }
        
        header { 
            background: linear-gradient(to bottom, #222, #000); color: var(--royal-gold); 
            padding: 30px 20px; text-align: center; border-radius: 0 0 50px 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 100;
        }

        /* 專業 1x3 網格 */
        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 15px; padding: 20px; box-sizing: border-box; width: 100%;
        }
        .s-box { 
            background: #fff; border-radius: 25px; padding: 20px 10px; 
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.08); 
            border: 1px solid rgba(212,175,55,0.2); position: relative;
        }
        .s-dot { 
            aspect-ratio: 1/1; width: 65px; margin: 0 auto 12px;
            border-radius: 20px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: 900; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .s-name { font-weight: bold; font-size: 1rem; color: #1a1a1a; }
        .s-points { position: absolute; top: -8px; right: -8px; background: var(--accent); color: #fff; font-size: 0.8rem; padding: 4px 10px; border-radius: 15px; font-weight: bold; border: 2px solid #fff; }

        /* 質感彈窗 */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 95%; max-width: 500px; background: #fff; border-radius: 40px; padding: 30px; 
            z-index: 1001; box-shadow: 0 40px 120px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto;
        }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; backdrop-filter: blur(8px); }

        /* 外出通行證 */
        #pass-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--present); z-index: 5000; text-align: center; color: #fff;
        }

        .btn { width: 100%; padding: 18px; margin-top: 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); color: #fff; box-shadow: 0 10px 20px rgba(212,175,55,0.4); }
        .btn-dark { background: #000; color: #fff; border: 2px solid var(--royal-gold); }
        
        .section-title { font-size: 1.2rem; font-weight: bold; color: #000; border-left: 8px solid var(--royal-gold); padding-left: 15px; margin: 25px 0 15px 0; text-align: left; }
        .log-row { background: #f8f9fa; border-radius: 18px; padding: 15px; margin-bottom: 10px; font-size: 0.9rem; border-left: 5px solid var(--royal-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        
        /* 集點星星樣式 */
        .slot { width: 35px; height: 35px; border-radius: 50%; background: #eee; display: inline-flex; align-items: center; justify-content: center; margin: 4px; border: 1px dashed #ccc; font-size: 1.2rem; }
        .slot-active { background: #fff; border: 2.5px solid var(--royal-gold); box-shadow: 0 0 15px rgba(212,175,55,0.5); }

        input { width: 100%; padding: 15px; border-radius: 15px; border: 1.5px solid #ddd; margin-bottom: 15px; font-size: 1.1rem; box-sizing: border-box; outline: none; }
        .tab-btn { white-space: nowrap; padding: 15px 25px; border-radius: 25px; border: none; background: #fff; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tab-btn.active { background: var(--royal-gold); color: #fff; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="pass-screen" onclick="this.style.display='none'">
        <div style="margin-top: 15vh; font-size: 8rem;">📯</div>
        <h1 style="font-size: 3.5rem; letter-spacing: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3);">准予外出</h1>
        <div style="background:#fff; color:#000; margin: 30px; padding: 50px 30px; border-radius: 50px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);">
            <h1 id="pass-name" style="font-size: 3rem; margin:0;">學生姓名</h1>
            <p style="font-size: 1.4rem; color:#666; margin: 10px 0;">第八節請假審核通過</p>
            <hr style="border: 1px solid #f0f0f0; margin: 20px 0;">
            <h2 id="pass-date" style="color:var(--absent); font-size: 2.5rem; margin: 10px 0;">2026-03-31</h2>
            <p style="font-size:1.2rem;">核可人員：<span id="pass-admin" style="font-weight:bold; border-bottom: 2px solid #000;">蕭老師</span></p>
        </div>
        <p style="font-size: 1.2rem; opacity: 0.8;">請將此畫面出示給校門警衛查驗</p>
    </div>

    <div id="gate-screen">
        <div class="gate-card">
            <h1 style="margin:0; font-size:2.5rem; color:var(--deep-black); letter-spacing:2px;">莊敬音樂科</h1>
            <p style="color:var(--royal-gold); font-weight:bold; font-size: 1.1rem; margin: 5px 0 30px 0;">ROYAL ADMIN SYSTEM</p>
            <input type="text" id="login-acc" placeholder="您的帳號或姓名">
            <input type="password" id="login-pw" placeholder="您的密碼">
            <button class="btn btn-gold" onclick="doAuth()">登入管理中心</button>
            <p style="font-size:0.8rem; color:#aaa; margin-top:25px;">Music is the shorthand of emotion.</p>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <h2 style="margin:0; letter-spacing: 3px;">🏛️ 莊敬音樂科教務總部</h2>
            <div id="login-info" style="font-size:0.95rem; margin-top:10px; font-weight:bold; letter-spacing:1px;">連線中...</div>
            <div style="display:flex; justify-content:center; gap:12px; margin-top:20px;">
                <button id="admin-setup-btn" class="btn" style="display:none; width:auto; padding:8px 20px; background:var(--royal-gold); color:#000; font-size:0.85rem;" onclick="openSetup()">⚙️ 教師權限設定</button>
                <button onclick="logout()" style="background:rgba(255,255,255,0.1); border:1.5px solid #fff; color:#fff; width:auto; padding:8px 20px; border-radius:15px; font-size:0.85rem;">安全登出系統</button>
            </div>
        </header>

        <div id="admin-view" style="display:none; padding-bottom: 100px;">
            <div style="background:#fff; padding:20px; border-radius:30px; margin: 15px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
                📅 <input type="date" id="target-date" onchange="loadCloud()" style="width: auto; border:none; background: #f8f8f8; padding: 10px; border-radius: 10px;">
            </div>
            <div id="tabs" style="display:flex; overflow-x:auto; gap:12px; margin: 0 15px 15px 15px; padding-bottom:8px;"></div>
            <div id="student-grid" class="grid"></div>
            
            <div style="padding: 0 20px;">
                <button class="btn btn-dark" style="border:2.5px solid var(--royal-gold);" onclick="syncCloud()">💾 儲存今日點名紀錄</button>
            </div>
            
            <div class="section-title" style="margin: 30px 20px 15px 20px;">🚶 即時外出申請審核</div>
            <div id="leave-list" style="background:#fff; margin: 0 20px; padding:20px; border-radius:30px; font-size:1rem;">尚無待處理申請</div>
        </div>

        <div id="student-view" style="display:none; text-align:center; padding: 50px 20px;">
            <div style="font-size:5rem; margin-bottom: 20px;">🎼</div>
            <h1 id="welcome-name" style="color:var(--deep-black);">同學您好</h1>
            <button class="btn btn-gold" onclick="openDetail(curStudent.id)">打開我的個人看板</button>
            <button class="btn btn-dark" style="margin-top:20px;" onclick="applyLeave()">📝 申請第八節外出證</button>
            <div id="student-leave-status" style="margin-top:30px;"></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    <div class="modal" id="modal">
        <h2 id="m-name" style="margin-top:0; color:var(--deep-black); text-align:center; font-size:2rem; letter-spacing:2px;">學生姓名</h2>
        
        <div id="admin-only-info" style="display:none; text-align:center; background:#FFFDE7; padding:15px; border-radius:25px; margin-bottom:20px; border: 1px solid var(--royal-gold);">
            🔐 學生即時查詢密碼：<span id="m-pw" style="font-weight:bold; font-size:1.5rem; letter-spacing:3px;">----</span>
        </div>

        <div class="section-title">⭐ 好寶寶集點 (10格)</div>
        <div class="icon-box" id="stamp-card"></div>
        <div id="admin-pts-tool" style="display:none; text-align:center; margin-top:10px;">
            <button class="btn btn-gold" style="width:65px; height:55px; margin:5px; border-radius:15px;" onclick="adj('p', 1)">➕</button>
            <button class="btn" style="width:65px; height:55px; margin:5px; border-radius:15px; background:#eee" onclick="adj('p', -1)">➖</button>
        </div>

        <div class="section-title">🏅 榮譽金牌庫存</div>
        <div class="icon-box" id="medal-card"></div>
        <div id="admin-med-tool" style="display:none; text-align:center; margin-top:10px;">
            <button class="btn btn-gold" style="width:65px; height:55px; margin:5px; border-radius:15px;" onclick="adj('m', 1)">➕</button>
            <button class="btn" style="width:65px; height:55px; margin:5px; border-radius:15px; background:var(--absent); color:#fff;" onclick="adj('m', -1)">➖</button>
        </div>
        <button id="redeem-btn" class="btn btn-gold" style="margin-top:20px;" onclick="redeem()">🎟️ 兌換金牌 (消耗 5 點星星)</button>

        <div class="section-title">📜 獎懲異動與缺曠日誌</div>
        <div id="m-history" style="max-height:300px; overflow-y:auto; background:#f9f9f9; padding:20px; border-radius:25px;"></div>

        <div id="admin-msg-zone" style="display:none; margin-top:25px; border-top:2px solid #eee; padding-top:20px;">
            <textarea id="t-msg" placeholder="在此輸入給學生的訊息或評語..." style="height:80px;"></textarea>
            <button class="btn btn-dark" onclick="updateMsg()">確認發送私訊</button>
        </div>
        <button class="btn btn-dark" style="margin-top:30px;" onclick="closeModal()">返回列表</button>
    </div>

    <div id="setup-modal" class="modal">
        <h2 style="text-align:center;">系所教師帳號管理</h2>
        <div style="background:#f9f9f9; padding:25px; border-radius:30px; border: 1px solid #ddd;">
            <input type="text" id="new-t-name" placeholder="老師顯示姓名 (如:林老師)">
            <input type="text" id="new-t-acc" placeholder="登入帳號">
            <input type="text" id="new-t-pw" placeholder="登入密碼">
            <select id="new-t-class">
                <option value="ALL">管理全系 (最高權限)</option>
                <option value="音三莊">音三莊</option><option value="演三莊">演三莊</option>
                <option value="音二莊">音二莊</option><option value="演二樸">演二樸</option><option value="音一莊">音一莊</option>
            </select>
            <button class="btn btn-gold" onclick="addTeacher()">建立並開通帳號</button>
        </div>
        <div id="teacher-list" style="margin-top:20px; max-height:250px; overflow-y:auto;"></div>
        <button class="btn btn-dark" onclick="document.getElementById('setup-modal').style.display='none'; document.getElementById('overlay').style.display='none'">關閉管理視窗</button>
    </div>

    <script>
        // 🔴 最高權限核心邏輯
        const MASTER_NAME = "蕭旭成";
        const MASTER_PIN = "0902";
        
        let role = ''; let currentGrp = "音三莊"; let curStudent = null; let curDetailSid = null;
        let adminInfo = { n: '', cls: 'ALL' }; let localAtt = {};
        const statusColors = ['bg-present', 'bg-late', 'bg-absent', 'bg-leave'];
        const statusNames = { 'bg-present':'出', 'bg-late':'遲', 'bg-absent':'缺', 'bg-leave':'假' };

        // 🟢 登入執行
        function doAuth() {
            const acc = document.getElementById('login-acc').value;
            const pw = document.getElementById('login-pw').value;

            // 1. 先判斷是否為最高權限蕭老師
            if(acc === MASTER_NAME && pw === MASTER_PIN) {
                role = 'admin'; adminInfo = { n: '蕭旭成', cls: 'ALL' };
                setStore('admin', null, '蕭旭成', 'ALL'); start();
                return;
            }

            // 2. 判斷是否為其他老師帳號
            const pwHash = CryptoJS.SHA256(pw).toString();
            db.ref(`jjvs_v23_admins/${acc}`).once('value', sn => {
                const data = sn.val();
                if(data && pwHash === data.p) {
                    role = 'admin'; adminInfo = { n: data.n, cls: data.cls };
                    setStore('admin', null, data.n, data.cls); start();
                } else {
                    // 3. 判斷是否為學生
                    const f = students.find(s => s.name.includes(acc));
                    if(f) {
                        db.ref(`jjvs_v23_auth/${f.id}`).once('value', sn2 => {
                            const d = sn2.val() || {p: '0000'};
                            if(pw === d.p) {
                                if(pw === '0000') {
                                    const np = prompt("安全考量：請修改您的預設密碼");
                                    if(!np || np === '0000') return alert("修改失敗");
                                    db.ref(`jjvs_v23_auth/${f.id}`).set({p: np});
                                    alert("修改成功，請重新登入");
                                } else {
                                    curStudent = f; role = 'student'; setStore('student', f.id); start();
                                }
                            } else alert("密碼錯誤");
                        });
                    } else alert("查無此帳號或姓名");
                }
            });
        }

        function setStore(r, sid, n, cls) {
            localStorage.setItem('jjvs_role', r); localStorage.setItem('jjvs_sid', sid);
            localStorage.setItem('jjvs_admin_name', n); localStorage.setItem('jjvs_admin_cls', cls);
        }

        window.onload = () => {
            const r = localStorage.getItem('jjvs_role');
            if(r === 'admin') {
                role = 'admin'; adminInfo = { n: localStorage.getItem('jjvs_admin_name'), cls: localStorage.getItem('jjvs_admin_cls') };
                start();
            } else if(r === 'student') {
                curStudent = students.find(s => s.id === localStorage.getItem('jjvs_sid'));
                role = 'student'; start();
            }
        };

        function logout() { localStorage.clear(); location.reload(); }

        function start() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('target-date').value = new Date().toISOString().split('T')[0];
            if(role === 'admin') {
                document.getElementById('admin-view').style.display = 'block';
                if(adminInfo.n === '蕭旭成') document.getElementById('admin-setup-btn').style.display = 'inline-block';
                initTabs();
            } else {
                document.getElementById('student-view').style.display = 'block';
                document.getElementById('welcome-name').innerText = curStudent.name + " 同學";
                openDetail(curStudent.id);
            }
            loadCloud();
        }

        function initTabs() {
            const tb = document.getElementById('tabs'); tb.innerHTML = "";
            const grps = adminInfo.cls === 'ALL' ? ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"] : [adminInfo.cls];
            currentGrp = grps[0];
            grps.forEach(g => {
                const b = document.createElement('button'); b.innerText = g;
                b.className = `tab-btn ${g === currentGrp ? 'active' : ''}`;
                b.onclick = () => { currentGrp = g; Array.from(tb.children).forEach(c=>c.classList.remove('active')); b.classList.add('active'); renderGrid(); };
                tb.appendChild(b);
            });
        }

        function loadCloud() {
            db.ref('jjvs_v23_cloud').on('value', snap => {
                window.master = snap.val() || {};
                const sd = document.getElementById('target-date').value;
                localAtt = {...(window.master.attendance && window.master.attendance[sd])};
                renderGrid(); renderLeaves();
                if(curDetailSid) refreshModalUI(curDetailSid);
                document.getElementById('login-info').innerText = role === 'admin' ? `${adminInfo.n} 老師 (加密連線)` : "皇家學員："+curStudent.name;
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid'); grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles?.[s.id]?.points) || 0;
                const div = document.createElement('div'); div.className = "s-box";
                div.innerHTML = `<div class="s-points">${pts}P</div><div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div><div class="s-name" onclick="openDetail('${s.id}')">${s.name}</div>`;
                grid.appendChild(div);
            });
        }

        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let nextIndex = (statusColors.indexOf(cur) + 1) % statusColors.length;
            let next = statusColors[nextIndex]; localAtt[sid] = next;
            const dot = document.getElementById(`dot-${sid}`);
            dot.className = `s-dot ${next}`; dot.innerText = statusNames[next];
            if(next === 'bg-late') {
                const curP = window.master.profiles?.[sid]?.points || 0;
                db.ref(`jjvs_v23_cloud/profiles/${sid}/points`).set(Math.max(0, curP - 1));
                addLog(sid, "💀 遲到扣 1 點", `系統自動處置 [${adminInfo.n}]`);
            }
        }

        function syncCloud() {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v23_cloud/attendance/${sd}`).set(localAtt).then(() => alert("點名紀錄已成功同步至雲端"));
        }

        function openDetail(sid) {
            curDetailSid = sid; document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            if (window.master) refreshModalUI(sid);
        }

        function refreshModalUI(sid) {
            const s = students.find(x => x.id === sid);
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無", logs: [] };
            document.getElementById('m-name').innerText = s.name;
            document.getElementById('m-msg').innerText = prof.msg || "目前無訊息";
            
            // 10格星星
            const pts = prof.points || 0; const sb = document.getElementById('stamp-card'); sb.innerHTML = "";
            for(let i=0; i<10; i++) sb.innerHTML += `<div class="slot ${i < pts ? 'slot-active' : ''}">${i < pts ? '⭐' : ''}</div>`;
            
            // 金牌
            const med = prof.medals || 0; const mb = document.getElementById('medal-card'); mb.innerHTML = "";
            for(let i=0; i<Math.max(med, 5); i++) mb.innerHTML += `<div class="slot ${i < med ? 'slot-active' : ''}">${i < med ? '🏅' : ''}</div>`;
            
            // 日誌
            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            const combinedLogs = [...(prof.logs || [])];
            const att = window.master.attendance || {};
            Object.keys(att).forEach(d => { if(att[d][sid]) combinedLogs.push({ time: d+" 00:00", act: "出席登記: "+statusNames[att[d][sid]], reason: "點名登記", admin: "系統" }); });
            combinedLogs.sort((a,b) => b.time.localeCompare(a.time)).forEach(l => {
                hBox.innerHTML += `<div class="log-row">📅 ${l.time}<br><b>${l.act}</b><br>原因：${l.reason} <span style="float:right; color:#999;">${l.admin || ''}</span></div>`;
            });

            if(role === 'admin') {
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('admin-pts-tool').style.display = 'block';
                document.getElementById('admin-med-tool').style.display = 'block';
                document.getElementById('admin-msg-zone').style.display = 'block';
                document.getElementById('admin-only-info').style.display = 'block';
                db.ref(`jjvs_v23_auth/${sid}/p`).once('value', sn => document.getElementById('m-pw').innerText = sn.val() || '0000');
            }
            
            const sd = document.getElementById('target-date').value;
            const leave = window.master.leaves?.[sd + "_" + sid];
            if(role === 'student' && leave === 'APPROVED') {
                document.getElementById('student-leave-status').innerHTML = `<button class="btn btn-gold" onclick="showPass('${s.name}', '${sd}')">🎟️ 點此出示准予外出證</button>`;
            }
        }

        function showPass(n, d) {
            document.getElementById('pass-name').innerText = n;
            document.getElementById('pass-date').innerText = d;
            document.getElementById('pass-admin').innerText = adminInfo.n;
            document.getElementById('pass-screen').style.display = 'block';
        }

        function applyLeave() {
            const r = prompt("請說明外出原因(例如：術科補課)："); if(!r) return;
            const lKey = document.getElementById('target-date').value + "_" + curStudent.id;
            db.ref(`jjvs_v23_cloud/leaves/${lKey}`).set("PENDING");
            db.ref(`jjvs_v23_cloud/profiles/${curStudent.id}/msg`).set(`🚶 提出外出申請：${r}`);
            alert("申請已送出，請等候導師核可");
        }

        function renderLeaves() {
            const box = document.getElementById('leave-list'); box.innerHTML = "";
            const leaves = window.master.leaves || {};
            const sd = document.getElementById('target-date').value;
            let count = 0;
            students.filter(s => s.group === currentGrp || adminInfo.cls === 'ALL').forEach(s => {
                if(leaves[sd+"_"+s.id] === 'PENDING') {
                    count++;
                    box.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:5px;"><span>🚶 ${s.name} 申請外出</span><button class="btn btn-mini" style="width:70px; height:35px; padding:0; background:var(--present); color:#fff; border-radius:10px;" onclick="approveLeave('${s.id}')">核可</button></div>`;
                }
            });
            if(count === 0) box.innerText = "今日無外出申請紀錄";
        }

        function approveLeave(sid) {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v23_cloud/leaves/${sd+"_"+sid}`).set("APPROVED");
            addLog(sid, "✅ 核可第八節外出", `核可人：${adminInfo.n}`);
        }

        function adj(type, v) {
            const r = prompt("請填寫異動原因(日期已自動記錄)："); if(!r) return;
            const path = type === 'p' ? 'points' : 'medals';
            const cur = parseInt(window.master.profiles?.[curDetailSid]?.[path] || 0);
            db.ref(`jjvs_v23_cloud/profiles/${curDetailSid}/${path}`).set(Math.max(0, cur + v));
            addLog(curDetailSid, (type==='p'?'點數':'金牌')+(v>0?'➕加':'➖扣')+Math.abs(v), r);
        }

        function addLog(sid, act, reason) {
            const time = new Date().toISOString().split('T')[0] + " " + new Date().toTimeString().slice(0,5);
            const logs = window.master.profiles?.[sid]?.logs || [];
            logs.push({ time, act, reason, admin: adminInfo.n });
            db.ref(`jjvs_v23_cloud/profiles/${sid}/logs`).set(logs);
        }

        function openSetup() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('setup-modal').style.display = 'block';
            renderAdminList();
        }

        function addTeacher() {
            const n = document.getElementById('new-t-name').value;
            const a = document.getElementById('new-t-acc').value;
            const p = document.getElementById('new-t-pw').value;
            const c = document.getElementById('new-t-class').value;
            if(!n || !a || !p) return alert("請填寫完整");
            db.ref(`jjvs_v23_admins/${a}`).set({ n: n, p: CryptoJS.SHA256(p).toString(), cls: c }).then(() => {
                alert("教師帳號已開通"); renderAdminList();
            });
        }

        function renderAdminList() {
            const box = document.getElementById('teacher-list'); box.innerHTML = "";
            db.ref('jjvs_v23_admins').once('value', sn => {
                const data = sn.val();
                for(let acc in data) {
                    box.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px;">${data[acc].n} | 管理:${data[acc].cls} <button onclick="delAdmin('${acc}')" style="float:right; color:red; border:none; background:none; font-weight:bold;">[刪除]</button></div>`;
                }
            });
        }
        function delAdmin(acc) { if(confirm("確定撤銷此帳號？")) db.ref(`jjvs_v23_admins/${acc}`).remove().then(renderAdminList); }

        function redeem() {
            const p = window.master.profiles?.[curDetailSid]?.points || 0;
            if(p >= 5) {
                const m = window.master.profiles?.[curDetailSid]?.medals || 0;
                db.ref(`jjvs_v23_cloud/profiles/${curDetailSid}`).update({ points: p-5, medals: m+1 });
                addLog(curDetailSid, "🎟️ 集點兌換金牌", "自動兌換 (消耗5星)");
            } else alert("星星不足 5 點");
        }

        function updateMsg() { db.ref(`jjvs_v23_cloud/profiles/${curDetailSid}/msg`).set(document.getElementById('t-msg').value); alert("已發送至學員看板"); }
        function closeModal() { curDetailSid = null; document.getElementById('overlay').style.display='none'; document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    </script>
</body>
</html>
