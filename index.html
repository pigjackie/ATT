    <style>
        :root { --primary: #FFD700; --bg: #FFF9C4; --text: #333; --accent: #FF4500; }
        body { background: var(--bg); color: var(--text); font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; }
        
        /* 門禁畫面 */
        #gate-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--primary), #FFB300); }
        .gate-card { background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); width: 85%; max-width: 380px; text-align: center; }

        /* 主程式畫面 */
        #app-screen { display: none; padding: 10px; }
        header { text-align: center; background: var(--primary); padding: 20px; border-radius: 0 0 40px 40px; margin: -10px -10px 15px -10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* 說明區塊 */
        .manual-section { background: #fff; padding: 15px; border-radius: 15px; border: 2px dashed #FFD700; margin-bottom: 15px; font-size: 0.9rem; display: none; }

        /* 網格系統：一排三個 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .s-box { background: #fff; border-radius: 18px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        .s-dot { width: 50px; height: 50px; border-radius: 15px; margin: 0 auto 10px; border: 3px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .s-points { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        /* 學生個人面板 */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 450px; background: #fff; border-radius: 30px; padding: 25px; z-index: 1001; box-shadow: 0 25px 70px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; }

        /* 商店樣式 */
        .shop-card { background: #FFF3E0; border: 2px solid #FFB74D; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: center; }
        .medal-badge { font-size: 2rem; }

        /* 通用按鈕 */
        .btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-save { background: #000; color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: sticky; bottom: 15px; z-index: 100; }
        .btn-gold { background: var(--primary); color: #000; }

        .bg-present { background:#2ecc71; } .bg-late { background:#f1c40f; } .bg-late-1 { background:#e67e22; } .bg-absent { background:#e74c3c; } .bg-leave { background:#3498db; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    </style>
</head>

        // 3. 安全驗證
        function auth(type) {
            if (type === 'admin') {
                const p = prompt("授權碼：");
                if (btoa(p) === "MDkwMg==") { role = 'admin'; enter(); }
                else { alert("拒絕存取"); }
            } else {
                const name = prompt("姓名：");
                const f = students.find(s => s.name.includes(name));
                if (!f) return alert("無此學生");
                db.ref(`jjvs_v8_auth/${f.id}`).once('value', snap => {
                    const d = snap.val();
                    if (!d) {
                        const np = prompt("設定密碼：");
                        db.ref(`jjvs_v8_auth/${f.id}`).set({ p: btoa(np) });
                        curStudent = f; role = 'student'; enter();
                    } else {
                        const cp = prompt("輸入密碼：");
                        if (btoa(cp) === d.p) { curStudent = f; role = 'student'; enter(); }
                        else { alert("密碼錯誤"); }
                    }
                });
            }
        }

        function enter() {
            document.getElementById('gate-screen').style.display = 'none';

            document.getElementById('target-date').value = selDate;

                document.getElementById('admin-panel').style.display = 'block';
                initTabs();
            } else {
                openDetail(curStudent.id);
            }
            loadData();
        }

        function initTabs() {
            const tabBox = document.getElementById('tabs');
            tabBox.innerHTML = "";
            classNames.forEach(g => {
                const b = document.createElement('button');
                b.style.cssText = "white-space:nowrap; padding:10px 20px; border-radius:20px; border:2px solid #FFD700; background:#fff; font-weight:bold;";
                if(g === currentGrp) b.style.background = "#FFD700";
                b.innerText = g;
                b.onclick = () => { currentGrp = g; initTabs(); renderGrid(); };
                tabBox.appendChild(b);
            });
        }

        function loadData() {
            selDate = document.getElementById('target-date').value;
            db.ref('jjvs_v8_cloud').on('value', snap => {
                window.master = snap.val() || {};
                localAtt = {...(window.master.attendance && window.master.attendance[selDate])};
                renderGrid();
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid');
            grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles && window.master.profiles[s.id] && window.master.profiles[s.id].points) || 0;
                const div = document.createElement('div');
                div.className = "s-box";
                div.innerHTML = `
                    <div class="s-points">${pts}P</div>
                    <div class="s-dot ${st}" id="dot-${s.id}" onclick="localCycle('${s.id}')"></div>
                    <div class="s-name" onclick="openDetail('${s.id}')">${s.name}</div>
                `;
                grid.appendChild(div);
            });
        }

        function localCycle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let next = statusColors[(statusColors.indexOf(cur) + 1) % statusColors.length];
            localAtt[sid] = next;
            document.getElementById(`dot-${sid}`).className = `s-dot ${next}`;
            document.getElementById('save-btn').style.background = "#FF4500";
            document.getElementById('save-btn').innerText = "💾 點名已變更，請按此儲存";
        }

        function saveToCloud() {
            db.ref(`jjvs_v8_cloud/attendance/${selDate}`).set(localAtt).then(() => {
                alert("存檔成功！");
                document.getElementById('save-btn').style.background = "#000";
                document.getElementById('save-btn').innerText = "💾 確認儲存今日紀錄";
            });
        }

        function openDetail(sid) {
            const s = students.find(x => x.id === sid);
            document.getElementById('m-name').innerText = s.name;
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無訊息" };
            
            document.getElementById('m-points').innerText = prof.points || 0;
            document.getElementById('m-medals').innerText = prof.medals || 0;
            document.getElementById('m-msg').innerText = prof.msg || "目前無訊息";
            
            // 歷史紀錄
            const hBox = document.getElementById('m-history');
            hBox.innerHTML = "";
            const att = window.master.attendance || {};
            Object.keys(att).sort().reverse().forEach(d => {
                if(att[d][sid]) {
                    hBox.innerHTML += `<div class="history-item"><span>📅 ${d}</span><span class="${att[d][sid]}" style="color:#fff; padding:2px 5px; border-radius:5px;">${statusNames[att[d][sid]]}</span></div>`;
                }
            });

            document.getElementById('admin-tools').style.display = role === 'admin' ? 'block' : 'none';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
        }

        function changePoints(val) {
            const sid = students.find(x => x.name === document.getElementById('m-name').innerText).id;
            const cur = parseInt(document.getElementById('m-points').innerText);
            db.ref(`jjvs_v8_cloud/profiles/${sid}/points`).set(cur + val);
        }

        function saveMsg() {
            const msg = document.getElementById('input-msg').value;
            const sid = students.find(x => x.name === document.getElementById('m-name').innerText).id;
            db.ref(`jjvs_v8_cloud/profiles/${sid}/msg`).set(msg);
            alert("訊息已更新");
        }

        function redeemMedal() {
            const sid = students.find(x => x.name === document.getElementById('m-name').innerText).id;
            const pts = parseInt(document.getElementById('m-points').innerText);
            const med = parseInt(document.getElementById('m-medals').innerText);
            if(pts >= 5) {
                db.ref(`jjvs_v8_cloud/profiles/${sid}`).update({
                    points: pts - 5,
                    medals: med + 1
                }).then(() => alert("兌換成功！免死金牌已入庫。"));
            } else {
                alert("點數不足，還差 " + (5-pts) + " 點！");
            }
        }

        function toggleManual() {
            const m = document.getElementById('manual');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }

        function closeModal() {
            if(role === 'student') return;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
        }

        function exportExcel() {
            const exp = [];
            Object.keys(window.master.attendance || {}).forEach(d => {
                students.forEach(s => {
                    const st = window.master.attendance[d][s.id];
                    if(st) exp.push({ "日期": d, "班級": s.group, "姓名": s.name, "狀態": statusNames[st] });
                });
            });
            const ws = XLSX.utils.json_to_sheet(exp);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "紀錄");
            XLSX.writeFile(wb, `莊敬音樂科報表.xlsx`);
        }
    </script>
</body>
</html>
