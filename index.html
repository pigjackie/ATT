        body { background: var(--bg); color: var(--text); font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; }
        
        #gate-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--primary), #FFB300); }
        .gate-card { background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); width: 85%; max-width: 380px; text-align: center; }

        #app-screen { display: none; padding: 10px; min-height: 100vh; }
        header { text-align: center; background: var(--primary); padding: 20px; border-radius: 0 0 40px 40px; margin: -10px -10px 15px -10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
        
        /* 1x3 網格 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .s-box { background: #fff; border-radius: 18px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        .s-dot { width: 55px; height: 55px; border-radius: 15px; margin: 0 auto 10px; border: 3px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; color: #fff; }
        .s-points { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #fff; font-size: 0.75rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        
        /* 批次模式 */
        .batch-check { position: absolute; top: 5px; left: 5px; width: 22px; height: 22px; display: none; z-index: 5; }

        /* 圖示盒 */
        .icon-box { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; background: #fdf2e9; padding: 12px; border-radius: 20px; border: 2px solid #FFB74D; margin-top: 5px; }
        .slot { width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.08); border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .slot-active { background: #fff; border: 2px solid var(--primary); transform: scale(1.05); }

        #batch-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #222; padding: 15px; z-index: 2000; border-radius: 20px 20px 0 0; color: #fff; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 450px; background: #fff; border-radius: 30px; padding: 20px; z-index: 1001; box-shadow: 0 25px 70px rgba(0,0,0,0.5); max-height: 88vh; overflow-y: auto; box-sizing: border-box; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; }
        
        .btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: #000; color: var(--primary); border: 2px solid var(--primary); }
        .btn-gold { background: var(--primary); color: #000; }
        .btn-adj { width: 50px; height: 50px; margin: 5px; border-radius: 12px; font-size: 1.2rem; }

        .bg-present { background:#2ecc71; } .bg-late { background:#f1c40f; } .bg-absent { background:#e74c3c; } .bg-leave { background:#3498db; }
        .section-title { font-size: 1.1rem; font-weight: bold; border-left: 5px solid var(--primary); padding-left: 10px; margin: 18px 0 8px 0; text-align: left; }
        .log-row { background: #f9f9f9; border-radius: 10px; padding: 8px; margin-bottom: 5px; font-size: 0.85rem; border-left: 4px solid #ddd; }
        .log-reason { color: var(--accent); font-weight: bold; margin-top: 3px; display: block; }
        .pw-tag { background: #000; color: #FFD700; padding: 3px 8px; border-radius: 5px; font-weight: bold; font-family: monospace; }

        </div>

                    if (!d) {
                        const np = prompt("首入設密碼："); db.ref(`jjvs_v17_auth/${f.id}`).set({ p: np });
                        curStudent = f; role = 'student'; localStorage.setItem('jjvs_role', 'student'); localStorage.setItem('jjvs_sid', f.id); start();
                    } else {
                        const cp = prompt("輸入密碼："); if (cp === d.p) { curStudent = f; role = 'student'; localStorage.setItem('jjvs_role', 'student'); localStorage.setItem('jjvs_sid', f.id); start(); }
                    }
                });
            }
        }

        function clearLogin() { localStorage.clear(); location.reload(); }
        function start() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('target-date').value = new Date().toISOString().split('T')[0];
            loadCloud();
            if (role === 'admin') { document.getElementById('admin-panel').style.display = 'block'; initTabs(); }
            else { document.getElementById('student-home-view').style.display = 'block'; openDetail(curStudent.id); }
        }

        function initTabs() {
            const tb = document.getElementById('tabs'); tb.innerHTML = "";
            ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"].forEach(g => {
                const b = document.createElement('button');
                b.style.cssText = "white-space:nowrap; padding:10px 15px; border-radius:15px; border:2px solid #FFD700; background:#fff; font-weight:bold;";
                if(g === currentGrp) b.style.background = "#FFD700";
                b.innerText = g; b.onclick = () => { currentGrp = g; initTabs(); renderGrid(); };
                tb.appendChild(b);
            });
        }

        function loadCloud() {
            db.ref('jjvs_v17_cloud').on('value', snap => {
                window.master = snap.val() || {};
                const sd = document.getElementById('target-date').value;
                localAtt = {...(window.master.attendance && window.master.attendance[sd])};
                renderGrid();
                if(curDetailSid) refreshModalUI(curDetailSid);
                document.getElementById('login-info').innerText = role === 'admin' ? "管理模式 (同步中)" : "學生："+curStudent.name;
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid'); grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles?.[s.id]?.points) || 0;
                const div = document.createElement('div'); div.className = "s-box";
                div.innerHTML = `
                    <input type="checkbox" class="batch-check" value="${s.id}" style="display:${isBatch ? 'block':'none'}">
                    <div class="s-points">${pts}P</div>
                    <div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div>
                    <div style="font-weight:bold; font-size:1rem;" onclick="openDetail('${s.id}')">${s.name}</div>
                `;
                grid.appendChild(div);
            });
        }

        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let next = statusColors[(statusColors.indexOf(cur) + 1) % statusColors.length];
            localAtt[sid] = next;
            document.getElementById(`dot-${sid}`).className = `s-dot ${next}`;
            document.getElementById(`dot-${sid}`).innerText = statusNames[next];
            document.getElementById('save-btn').style.background = "#FF4500";
            
            // 🔴 遲到自動扣點
            if(next === 'bg-late') {
                const curP = window.master.profiles?.[sid]?.points || 0;
                db.ref(`jjvs_v17_cloud/profiles/${sid}/points`).set(Math.max(0, curP - 1));
                addLog(sid, "💀 遲到自動扣點", "遲到處分 (自動)");
            }
        }

        function toggleBatch() {
            isBatch = !isBatch;
            document.getElementById('batch-bar').style.display = isBatch ? 'block':'none';
            renderGrid();
        }

        function batchDo(type, val) {
            const sids = Array.from(document.querySelectorAll('.batch-check:checked')).map(c => c.value);
            if(sids.length === 0) return alert("請勾選");
            const r = prompt("請輸入批次操作備註(原因)："); if(!r) return;
            sids.forEach(sid => {
                if(type === 'points') {
                    const cur = window.master.profiles?.[sid]?.points || 0;
                    db.ref(`jjvs_v17_cloud/profiles/${sid}/points`).set(cur + val);
                    addLog(sid, "➕ 批次獎勵加點", r);
                }
                if(type === 'present') localAtt[sid] = 'bg-present';
                if(type === 'msg') db.ref(`jjvs_v17_cloud/profiles/${sid}/msg`).set(r);
            });
            if(type === 'present') renderGrid();
            alert("批次完成"); toggleBatch();
        }

        function syncCloud() {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v17_cloud/attendance/${sd}`).set(localAtt).then(() => {
                alert("已存檔"); document.getElementById('save-btn').style.background = "#000";
            });
        }

        function resetToday() {
            if(!confirm("重設？")) return;
            students.filter(s => s.group === currentGrp).forEach(s => localAtt[s.id] = 'bg-present');
            renderGrid(); document.getElementById('save-btn').style.background = "#FF4500";
        }

        function openDetail(sid) {
            curDetailSid = sid; document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            if (window.master) refreshModalUI(sid);
        }

        function refreshModalUI(sid) {
            const s = students.find(x => x.id === sid);
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無", tasks: [], logs: [] };
            document.getElementById('m-name').innerText = s.name;
            document.getElementById('m-msg').innerText = prof.msg || "無訊息";
            
            // 星星集點 (10格)
            const pts = prof.points || 0; const sb = document.getElementById('stamp-card'); sb.innerHTML = "";
            for(let i=0; i<10; i++) sb.innerHTML += `<div class="slot ${i < pts ? 'slot-active' : ''}">${i < pts ? '⭐' : ''}</div>`;
            
            // 金牌庫存
            const med = prof.medals || 0; const mb = document.getElementById('medal-card'); mb.innerHTML = "";
            for(let i=0; i<Math.max(med, 5); i++) mb.innerHTML += `<div class="slot ${i < med ? 'slot-active' : ''}">${i < med ? '🏅' : ''}</div>`;
            
            const tl = document.getElementById('m-task-list'); tl.innerHTML = "";
            if(prof.tasks) {
                prof.tasks.forEach((t, i) => {
                    const p = Math.round((t.cur/t.max)*100);
                    tl.innerHTML += `<div style="background:#eee; padding:10px; border-radius:10px; margin-bottom:5px;"><strong onclick="incTask('${sid}', ${i})">${t.name} (${t.cur}/${t.max})</strong><button class="btn btn-mini" style="float:right; width:30px; padding:0;" onclick="delTask(${i})">🗑️</button><div style="height:8px; background:#ddd; border-radius:4px; overflow:hidden; margin-top:5px;"><div style="width:${p}%; background:var(--primary); height:100%;"></div></div></div>`;
                });
            }

            // 🔴 透明日誌顯示 (含原因)
            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            const logs = [...(prof.logs || [])];
            const att = window.master.attendance || {};
            Object.keys(att).forEach(d => { if(att[d][sid]) logs.push({ time: d + " 00:00", act: "出席登記: "+statusNames[att[d][sid]], reason: "日常點名" }); });
            logs.sort((a,b) => b.time.localeCompare(a.time)).forEach(l => {
                hBox.innerHTML += `<div class="log-row">🕒 ${l.time}<br><b>${l.act}</b><span class="log-reason">原因：${l.reason}</span></div>`;
            });

            if (role === 'admin') {
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('admin-pts-tool').style.display = 'block';
                document.getElementById('admin-med-tool').style.display = 'block';
                document.getElementById('admin-pw-info').style.display = 'block';
                db.ref(`jjvs_v17_auth/${sid}/p`).once('value', sn => document.getElementById('m-pw').innerText = sn.val() || '未設');
            }
        }

        function addLog(sid, act, reason) {
            const time = new Date().toISOString().split('T')[0] + " " + new Date().toTimeString().slice(0,5);
            const logs = window.master.profiles?.[sid]?.logs || [];
            logs.push({ time, act, reason });
            db.ref(`jjvs_v17_cloud/profiles/${sid}/logs`).set(logs);
        }

        function adj(type, v) {
            const cur = type === 'p' ? (window.master.profiles?.[curDetailSid]?.points || 0) : (window.master.profiles?.[curDetailSid]?.medals || 0);
            const r = prompt("請輸入獎懲原因(避免爭議)："); if(!r) return;
            const next = Math.max(0, cur + v);
            const path = type === 'p' ? 'points' : 'medals';
            const actStr = (type === 'p' ? "點數 " : "金牌 ") + (v > 0 ? "➕ 加 ":"➖ 扣 ") + Math.abs(v);
            db.ref(`jjvs_v17_cloud/profiles/${curDetailSid}/${path}`).set(next);
            addLog(curDetailSid, actStr, r);
        }

        function redeem() {
            const p = window.master.profiles?.[curDetailSid]?.points || 0;
            const m = window.master.profiles?.[curDetailSid]?.medals || 0;
            if(p >= 10) {
                db.ref(`jjvs_v17_cloud/profiles/${curDetailSid}`).update({ points: p-10, medals: m+1 });
                addLog(curDetailSid, "🎟️ 集點兌換金牌", "自動兌換 (消耗10星)");
            } else alert("不夠");
        }

        function addTask() {
            const n = document.getElementById('t-name').value; const m = document.getElementById('t-max').value;
            if(!n || !m) return;
            const ts = window.master.profiles?.[curDetailSid]?.tasks || [];
            ts.push({ name: n, max: m, cur: 0 });
            db.ref(`jjvs_v17_cloud/profiles/${curDetailSid}/tasks`).set(ts);
            addLog(curDetailSid, "⚖️ 指派處罰任務", n);
        }

        function incTask(sid, idx) {
            if(role !== 'admin') return; const ts = window.master.profiles[sid].tasks;
            if(ts[idx].cur < ts[idx].max) { ts[idx].cur = parseInt(ts[idx].cur) + 1; db.ref(`jjvs_v17_cloud/profiles/${sid}/tasks`).set(ts); }
        }

        function delTask(idx) {
            const ts = window.master.profiles[curDetailSid].tasks;
            ts.splice(idx, 1); db.ref(`jjvs_v17_cloud/profiles/${curDetailSid}/tasks`).set(ts);
        }

        function updateMsg() {
            const msg = document.getElementById('t-msg').value;
            db.ref(`jjvs_v17_cloud/profiles/${curDetailSid}/msg`).set(msg); alert("已送出");
        }

        function closeModal() { curDetailSid = null; document.getElementById('overlay').style.display='none'; document.getElementById('modal').style.display='none'; }

        function exportExcel() {
            const exp = []; const att = window.master.attendance || {};
            Object.keys(att).sort().reverse().forEach(d => {
                students.forEach(s => {
                    if (att[d][s.id]) exp.push({ "日期": d, "班級": s.group, "姓名": s.name, "狀態": statusNames[att[d][s.id]] });
                });
            });
            const ws = XLSX.utils.json_to_sheet(exp); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "總表"); XLSX.writeFile(wb, `莊敬音樂科管理總表.xlsx`);
        }
    </script>
</body>
</html>
