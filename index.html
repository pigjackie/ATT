<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莊敬音樂科教務管理系統</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --gold:#D4AF37;--gold-l:#F0D060;--gold-d:#A8891C;
  --bg:#0A0A0C;--bg1:#111115;--bg2:#161619;
  --tx:#F0E8D0;--tx2:#A09070;--tx3:#604030;
  --green:#2ECC71;--yellow:#F1C40F;--red:#E74C3C;--blue:#3498DB;
  --bdr:rgba(212,175,55,.2);--bdr2:rgba(212,175,55,.5);
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--tx);font-family:'Noto Serif TC',Georgia,serif;overflow-x:hidden}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);z-index:1000;pointer-events:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:3px}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column}
#loginScreen{display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,rgba(212,175,55,.08),transparent 60%)}

/* ── LOGIN ── */
.lbox{background:var(--bg1);border:1px solid var(--bdr);border-radius:20px;padding:48px 52px;width:420px;max-width:95vw;box-shadow:0 0 30px rgba(212,175,55,.12),0 8px 32px rgba(0,0,0,.6);position:relative}
.lbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:20px 20px 0 0}
.llogo{text-align:center;font-size:52px;margin-bottom:8px;filter:drop-shadow(0 0 14px rgba(212,175,55,.5))}
.ltitle{text-align:center;font-size:22px;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.lsub{text-align:center;font-size:13px;color:var(--tx2);margin-bottom:28px;letter-spacing:1px}
.ltabs{display:flex;border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:24px}
.ltab{flex:1;padding:10px;background:transparent;border:none;color:var(--tx2);cursor:pointer;font-size:14px;font-family:inherit;transition:.2s}
.ltab.on{background:var(--gold);color:#000;font-weight:bold}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;color:var(--tx2);margin-bottom:5px;letter-spacing:1px}
.fg input{width:100%;padding:11px 14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-size:15px;font-family:inherit;outline:none;transition:.2s}
.fg input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.1)}
.btn-pri{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold-d),var(--gold),var(--gold-l));border:none;border-radius:var(--r2);color:#000;font-size:16px;font-weight:bold;cursor:pointer;letter-spacing:2px;font-family:inherit;transition:.2s;box-shadow:0 4px 15px rgba(212,175,55,.3)}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,175,55,.4)}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;background:rgba(10,10,12,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--bdr);padding:0 16px;display:flex;align-items:center;gap:12px;height:58px;flex-shrink:0}
.topbar-logo{font-size:22px}
.topbar-title{font-size:17px;color:var(--gold);letter-spacing:1px;flex:1}
.topbar-user{font-size:12px;color:var(--tx2)}
.topbar-user b{color:var(--gold)}

/* ── BUTTONS ── */
.btn{padding:6px 13px;background:transparent;border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx2);cursor:pointer;font-size:12px;font-family:inherit;transition:.2s;white-space:nowrap}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.g{background:var(--gold);color:#000;border-color:var(--gold);font-weight:bold}
.btn.g:hover{background:var(--gold-l)}
.btn.d{border-color:rgba(231,76,60,.5);color:var(--red)}
.btn.d:hover{background:rgba(231,76,60,.1);border-color:var(--red)}
.btn.s{border-color:rgba(46,204,113,.5);color:var(--green)}
.btn.s:hover{background:rgba(46,204,113,.1)}

/* ── NOTIF BELL ── */
.notif-btn{position:relative;padding:6px 10px;background:transparent;border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx2);cursor:pointer;font-size:18px;transition:.2s}
.notif-btn:hover{border-color:var(--gold);color:var(--gold)}
.notif-dot{position:absolute;top:2px;right:2px;width:10px;height:10px;background:var(--red);border-radius:50%;display:none;border:2px solid var(--bg)}
.notif-dot.on{display:block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* ── NAVTABS ── */
.navtabs{display:flex;background:var(--bg1);border-bottom:1px solid var(--bdr);padding:0 16px;overflow-x:auto;flex-shrink:0}
.navtab{padding:13px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--tx2);cursor:pointer;font-size:13px;white-space:nowrap;font-family:inherit;transition:.2s;position:relative}
.navtab:hover{color:var(--gold)}
.navtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.nbadge{display:inline-block;background:var(--red);color:#fff;font-size:10px;padding:1px 5px;border-radius:10px;margin-left:4px;vertical-align:top;animation:pulse 1.5s infinite}

/* ── CONTENT ── */
.content{flex:1;padding:16px}

/* ── CLASS SELECTOR ── */
.clsbtns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.clsbtn{padding:7px 16px;background:var(--bg1);border:1px solid var(--bdr);border-radius:20px;color:var(--tx2);cursor:pointer;font-size:13px;font-family:inherit;transition:.2s}
.clsbtn:hover{border-color:var(--gold);color:var(--gold)}
.clsbtn.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:bold}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.legend{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-left:auto}
.ldot{width:9px;height:9px;border-radius:50%}
.litem{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)}

/* ── BATCH TOOLBAR ── */
#batchBar{display:none;margin-bottom:12px;padding:10px 14px;background:var(--bg1);border:1px solid var(--gold-d);border-radius:var(--r);gap:8px;flex-wrap:wrap;align-items:center}
#batchBar.on{display:flex}

/* ── STUDENT GRID ── */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:640px){.sgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:360px){.sgrid{grid-template-columns:1fr}}

.scard{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;position:relative;overflow:hidden;transition:.2s}
.scard:hover{border-color:var(--bdr2);box-shadow:0 0 16px rgba(212,175,55,.12)}
.scard.sel{border-color:var(--gold)!important;background:rgba(212,175,55,.07);box-shadow:0 0 0 2px var(--gold-d)}
.scard.sel::after{content:'✓';position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--gold);color:#000;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;line-height:20px;text-align:center}
.scard.s出{border-left:3px solid var(--green)}.scard.s遲{border-left:3px solid var(--yellow)}.scard.s缺{border-left:3px solid var(--red)}.scard.s假{border-left:3px solid var(--blue)}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sc-num{font-size:11px;color:var(--tx3)}
.sbadge{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:bold;cursor:pointer;transition:.15s}
.sbadge:hover{transform:scale(1.12)}
.sbadge.出{background:rgba(46,204,113,.2);color:var(--green)}.sbadge.遲{background:rgba(241,196,15,.2);color:var(--yellow)}.sbadge.缺{background:rgba(231,76,60,.2);color:var(--red)}.sbadge.假{background:rgba(52,152,219,.2);color:var(--blue)}.sbadge.未{background:rgba(100,100,100,.2);color:#777}
.sc-name{font-size:19px;font-weight:bold;cursor:pointer;padding:3px 4px;border-radius:5px;border-bottom:2px solid transparent;transition:.18s;display:inline-block;margin-bottom:5px}
.sc-name:hover{color:var(--gold);border-bottom-color:var(--gold)}
.sc-pts{display:flex;align-items:center;justify-content:space-between}
.sc-stars{font-size:12px;color:var(--gold);letter-spacing:-1px}
.sc-medals{font-size:12px;color:var(--tx2)}
.sc-hint{font-size:10px;color:var(--tx3);margin-top:3px}

/* ── DETAIL PANEL ── */
#detailPanel{position:fixed;top:0;right:-500px;width:480px;height:100vh;background:var(--bg2);border-left:1px solid var(--bdr);z-index:300;overflow-y:auto;padding:20px;box-shadow:-8px 0 32px rgba(0,0,0,.5);transition:right .3s ease}
#detailPanel.open{right:0}
@media(max-width:500px){#detailPanel{width:100%;right:-100%}}
.dp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.dp-name{font-size:26px;font-weight:bold;color:var(--gold)}
.dp-cls{font-size:12px;color:var(--tx2);margin-bottom:4px}
.dp-close{background:none;border:1px solid var(--bdr);border-radius:50%;width:34px;height:34px;color:var(--tx2);cursor:pointer;font-size:16px;transition:.2s}
.dp-close:hover{border-color:var(--gold);color:var(--gold)}
.dp-sec{margin-bottom:18px}
.dp-sec-t{font-size:11px;color:var(--gold);letter-spacing:2px;border-bottom:1px solid var(--bdr);padding-bottom:5px;margin-bottom:10px}

/* ── POINTS CARD ── */
.pts-card{background:linear-gradient(135deg,#1a1608,#221c09,#1a1608);border:1px solid var(--gold-d);border-radius:13px;padding:13px 15px 10px;margin-bottom:8px;box-shadow:inset 0 1px 0 rgba(212,175,55,.15),0 4px 14px rgba(0,0,0,.5);position:relative}
.pts-card::before{content:'⭐ 集點卡';position:absolute;top:7px;right:11px;font-size:10px;color:var(--gold-d);letter-spacing:1px}
.pts-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.pc{aspect-ratio:1;border-radius:9px;border:1.5px solid rgba(212,175,55,.2);display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;overflow:hidden;transition:.25s}
.pc.on{background:radial-gradient(circle at 38% 33%,#fff5a0,#D4AF37 55%,#a07c10 100%);border-color:#ffe066;box-shadow:0 0 10px rgba(212,175,55,.5),inset 0 1px 0 rgba(255,255,200,.4)}
.pc.on::after{content:'';position:absolute;top:12%;left:14%;width:32%;height:20%;background:rgba(255,255,255,.28);border-radius:50%;transform:rotate(-32deg)}
.pc.off{background:rgba(0,0,0,.3)}
.pts-info{font-size:13px;color:var(--tx2);text-align:center;margin-top:8px}
.pts-info b{color:var(--gold);font-size:17px}

/* ── MEDALS ── */
.medals-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:flex-end}
.mcoin{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff5a0,#F0C840 30%,#D4AF37 55%,#8B6914 80%,#5a4009 100%);box-shadow:0 4px 10px rgba(0,0,0,.6),0 1px 0 rgba(255,255,180,.5) inset,0 -2px 4px rgba(0,0,0,.4) inset;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;overflow:hidden;border:2px solid #a07a10;transition:.2s;cursor:default}
.mcoin::before{content:'';position:absolute;top:10%;left:14%;width:33%;height:22%;background:rgba(255,255,255,.28);border-radius:50%;transform:rotate(-32deg)}
.mcoin:hover{transform:translateY(-3px) rotate(8deg);box-shadow:0 8px 18px rgba(212,175,55,.45)}

/* ── ATT HISTORY ── */
.att-sum{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.att-si{font-size:12px}
.att-hgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.att-day{text-align:center;padding:3px 1px;border-radius:4px;font-size:10px;border:1px solid var(--bdr)}
.att-day .dl{color:var(--tx3);margin-bottom:1px}
.att-day .dv{font-weight:bold;font-size:11px}
.att-day.s出{border-color:rgba(46,204,113,.4);background:rgba(46,204,113,.08)}.att-day.s出 .dv{color:var(--green)}
.att-day.s遲{border-color:rgba(241,196,15,.4);background:rgba(241,196,15,.08)}.att-day.s遲 .dv{color:var(--yellow)}
.att-day.s缺{border-color:rgba(231,76,60,.4);background:rgba(231,76,60,.08)}.att-day.s缺 .dv{color:var(--red)}
.att-day.s假{border-color:rgba(52,152,219,.4);background:rgba(52,152,219,.08)}.att-day.s假 .dv{color:var(--blue)}

/* ── TASKS ── */
.task-item{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:9px 11px;margin-bottom:7px}
.task-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.task-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.task-fill{height:100%;background:var(--gold);transition:width .3s}

/* ── LOG ── */
.log-item{font-size:12px;padding:7px 9px;border-left:2px solid var(--bdr);margin-bottom:5px;color:var(--tx2)}
.log-item.add{border-left-color:var(--green)}.log-item.sub{border-left-color:var(--red)}.log-item.med{border-left-color:var(--gold)}
.log-t{color:var(--tx3);font-size:10px}

/* ── PASSWORD ── */
.pw-box{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:9px 13px;font-family:monospace;font-size:16px;color:var(--gold);letter-spacing:2px}

/* ── APPLY LIST ── */
.apply-item{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ai-info{flex:1}
.ai-name{font-size:15px;font-weight:bold;margin-bottom:3px}
.ai-reason{font-size:13px;color:var(--tx2)}
.ai-time{font-size:11px;color:var(--tx3)}

/* ── MESSAGES ── */
.msg-item{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;position:relative}
.msg-item.unread{border-left:3px solid var(--red)}
.msg-item.punish{border-left:3px solid var(--yellow)}
.msg-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px}
.msg-to{font-size:13px;color:var(--tx2)}.msg-to b{color:var(--gold)}
.msg-time{font-size:11px;color:var(--tx3);white-space:nowrap}
.msg-body{font-size:14px;color:var(--tx);margin-bottom:4px}
.msg-tag{font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block}
.msg-tag.notice{background:rgba(52,152,219,.2);color:var(--blue)}
.msg-tag.punish{background:rgba(241,196,15,.2);color:var(--yellow)}
.msg-tag.deduct{background:rgba(231,76,60,.2);color:var(--red)}
.msg-read{font-size:11px}

/* ── STUDENT MSG BANNER ── */
#stuBanner{display:none;background:rgba(231,76,60,.1);border-bottom:1px solid rgba(231,76,60,.25);padding:10px 16px}
.stu-msg-item{background:rgba(231,76,60,.07);border-radius:7px;padding:8px 11px;margin-bottom:6px;font-size:13px}
.stu-msg-from{font-size:10px;color:var(--tx3);margin-bottom:2px}
.stu-msg-type-notice{color:var(--blue)}.stu-msg-type-punishment{color:var(--yellow)}

/* ── STATS GRID ── */
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:480px){.statgrid{grid-template-columns:repeat(2,1fr)}}
.statcard{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;text-align:center}
.stat-n{font-size:30px;font-weight:bold;color:var(--gold)}
.stat-l{font-size:12px;color:var(--tx2);margin-top:3px}

/* ── TEACHER LIST ── */
.titem{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.ti-name{font-size:15px;font-weight:bold;margin-bottom:2px}
.ti-cls{font-size:12px;color:var(--tx2)}
.ti-pw{font-size:11px;color:var(--tx3)}

/* ── EXIT PASS ── */
#exitPass{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:#1a9e50;z-index:9999;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center}
#exitPass.on{display:flex}
.ep-title{font-size:64px;font-weight:bold;letter-spacing:4px;margin-bottom:16px}
.ep-name{font-size:44px;margin-bottom:10px}
.ep-info{font-size:22px;opacity:.85;margin-bottom:5px}
.ep-close{margin-top:36px;padding:13px 38px;background:#fff;color:#1a9e50;border:none;border-radius:30px;font-size:17px;font-weight:bold;cursor:pointer}

/* ── DIALOG ── */
#dlgOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.72);z-index:1000;align-items:center;justify-content:center}
#dlgOverlay.on{display:flex}
.dlg{background:var(--bg2);border:1px solid var(--bdr);border-radius:15px;padding:28px;width:380px;max-width:92vw;box-shadow:0 0 20px rgba(212,175,55,.15),0 8px 30px rgba(0,0,0,.6);position:relative}
.dlg::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:15px 15px 0 0}
.dlg-title{font-size:17px;font-weight:bold;color:var(--gold);margin-bottom:18px}
.dlg-label{font-size:11px;color:var(--tx2);margin-bottom:5px;letter-spacing:1px}
.dlg-input{width:100%;padding:9px 12px;background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);font-size:14px;font-family:inherit;margin-bottom:12px;outline:none;transition:.2s}
.dlg-input:focus{border-color:var(--gold)}
.dlg-msg{font-size:14px;color:var(--tx);margin-bottom:18px;line-height:1.6}
.dlg-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.dlg-btn{padding:8px 20px;border-radius:var(--r2);border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;font-size:13px;font-family:inherit;transition:.2s}
.dlg-btn:hover{border-color:var(--gold);color:var(--gold)}
.dlg-btn.ok{background:var(--gold);color:#000;border-color:var(--gold);font-weight:bold}
.dlg-btn.ok:hover{background:var(--gold-l)}
.dlg-btn.del{background:var(--red);color:#fff;border-color:var(--red);font-weight:bold}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bdr);border-radius:30px;padding:10px 22px;font-size:13px;color:var(--tx);box-shadow:0 4px 20px rgba(0,0,0,.6);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}

/* ── MISC ── */
.empty{text-align:center;padding:50px 20px;color:var(--tx3);font-size:15px}
.sep{border:none;border-top:1px solid var(--bdr);margin:14px 0}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
textarea{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);padding:9px 12px;font-family:inherit;font-size:14px;outline:none;width:100%;resize:vertical}
textarea:focus{border-color:var(--gold)}
select{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);color:var(--tx);padding:7px 11px;font-family:inherit;font-size:13px;outline:none;cursor:pointer}
select:focus{border-color:var(--gold)}

<!-- ══ LOGIN ══ -->
<div id="loginScreen" class="screen">
  <div class="lbox">
    <div class="llogo">🎼</div>
    <div class="ltitle">莊敬高職音樂科</div>
    <div class="lsub">教務管理系統 · Royal Edition</div>
    <div class="ltabs">
      <button class="ltab on" onclick="switchLTab('teacher')">教師登入</button>
      <button class="ltab" onclick="switchLTab('student')">學生登入</button>
    </div>
    <div id="teacherForm">
      <div class="fg"><label>教師帳號（姓名）</label><input id="lName" type="text" placeholder="帳號" autocomplete="off"></div>
      <div class="fg"><label>密碼</label><input id="lPass" type="password" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-pri" onclick="doLogin()">登 入</button>
    </div>
    <div id="studentForm" style="display:none">
      <div class="fg"><label>學生姓名</label><input id="sName" type="text" placeholder="姓名" autocomplete="off"></div>
      <div class="fg"><label>密碼（初始：0000）</label><input id="sPass" type="password" placeholder="密碼" onkeydown="if(event.key==='Enter')doStudentLogin()"></div>
      <button class="btn-pri" onclick="doStudentLogin()">登 入</button>
    </div>
  </div>
</div>

<!-- ══ TEACHER APP ══ -->
<div id="appScreen" class="screen">
  <div class="topbar">
    <div class="topbar-logo">🎼</div>
    <div class="topbar-title">莊敬音樂科教務系統</div>
    <div class="topbar-user">身份：<b id="curUser">—</b></div>
    <button class="notif-btn" onclick="switchTab('inbox')" title="訊息中心">💬<span class="notif-dot" id="teacherNotifDot"></span></button>
    <button class="btn" onclick="doLogout()">登出</button>
  </div>
  <div class="navtabs">
    <button class="navtab on" onclick="switchTab('att')" id="tab-att">📋 點名</button>
    <button class="navtab" onclick="switchTab('apply')" id="tab-apply">🚪 外出申請<span class="nbadge" id="applyBadge" style="display:none">0</span></button>
    <button class="navtab" onclick="switchTab('inbox')" id="tab-inbox">💬 訊息<span class="nbadge" id="inboxBadge" style="display:none">0</span></button>
    <button class="navtab" onclick="switchTab('report')" id="tab-report">📊 報表</button>
    <button class="navtab" onclick="switchTab('teachers')" id="tab-teachers" style="display:none">⚙️ 教師管理</button>
  </div>
  <div class="content">
    <!-- 點名 -->
    <div id="tabAtt">
      <div class="clsbtns" id="clsBtns"></div>
      <div class="toolbar">
        <button class="btn g" onclick="saveAtt()">💾 儲存點名</button>
        <button class="btn" onclick="setAllAtt('出')">全部出席</button>
        <button class="btn" id="batchBtn" onclick="toggleBatch()">☑️ 批次加點</button>
        <div class="legend">
          <div class="litem"><div class="ldot" style="background:var(--green)"></div>出席</div>
          <div class="litem"><div class="ldot" style="background:var(--yellow)"></div>遲到</div>
          <div class="litem"><div class="ldot" style="background:var(--red)"></div>缺席</div>
          <div class="litem"><div class="ldot" style="background:var(--blue)"></div>請假</div>
        </div>
      </div>
      <div id="batchBar">
        <span style="color:var(--gold);font-weight:bold;font-size:13px">批次模式</span>
        <span style="color:var(--tx2);font-size:13px">已選 <b id="batchCnt" style="color:var(--gold)">0</b> 人</span>
        <button class="btn s" onclick="batchPts(1)">⭐ +1點</button>
        <button class="btn d" onclick="batchPts(-1)">－ 扣1點</button>
        <button class="btn g" onclick="batchMedal()">🎖️ +金牌</button>
        <button class="btn" onclick="batchSetAtt('出')" style="border-color:var(--green);color:var(--green)">✓ 批次出席</button>
        <button class="btn" onclick="batchSetAtt('缺')" style="border-color:var(--red);color:var(--red)">✗ 批次缺席</button>
        <button class="btn" onclick="batchSetAtt('遲')" style="border-color:var(--yellow);color:var(--yellow)">⏱ 批次遲到</button>
        <button class="btn" onclick="selectAll()">全選</button>
        <button class="btn" onclick="clearSel()">清除</button>
        <button class="btn d" onclick="toggleBatch()" style="margin-left:auto">✕ 結束</button>
      </div>
      <div class="sgrid" id="stuGrid"></div>
    </div>
    <!-- 外出申請 -->
    <div id="tabApply" style="display:none">
      <h3 style="color:var(--gold);margin-bottom:14px">🚪 第八節外出申請審核</h3>
      <div id="applyList"><div class="empty">目前無待審核申請</div></div>
    </div>
    <!-- 訊息中心 -->
    <div id="tabInbox" style="display:none">
      <div class="row" style="margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <h3 style="color:var(--gold)">💬 訊息中心</h3>
        <button class="btn g" onclick="openSendMsg()">✉️ 新增訊息</button>
        <button class="btn" onclick="renderInbox()">🔄 重新整理</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <button class="btn on" id="inboxTabAll" onclick="inboxFilter('all')" style="border-color:var(--gold);color:var(--gold)">全部</button>
        <button class="btn" id="inboxTabUnread" onclick="inboxFilter('unread')">🔴 未讀</button>

      </div>
      <div id="inboxList"><div class="empty">尚無訊息</div></div>
    </div>
    <!-- 報表 -->
    <div id="tabReport" style="display:none">
      <div class="statgrid" id="statGrid"></div>
      <div class="row" style="margin-bottom:14px;flex-wrap:wrap">
        <button class="btn g" onclick="exportXlsx()">📥 Excel</button>
        <button class="btn" onclick="exportPdf()">📄 PDF</button>
        <button class="btn d" onclick="resetAllDlg()" style="margin-left:auto">⚠️ 全班重置</button>
      </div>

      <hr style="border-color:var(--bdr);margin:20px 0">

      <div id="deductLog"><div class="empty">載入中...</div></div>
    </div>

    <div id="tabTeachers" style="display:none">

        <h3 style="color:var(--gold)">⚙️ 教師帳號管理</h3>
        <button class="btn g" style="margin-left:auto" onclick="openAddTeacher()">＋ 新增</button>
      </div>
      <div id="teacherList"></div>
    </div>
  </div>
</div>

<!-- ══ STUDENT SCREEN ══ -->
<div id="studentScreen" class="screen">
  <div class="topbar">
    <div class="topbar-logo">🎼</div>
    <div class="topbar-title">學生個人資料</div>
    <div class="topbar-user">學生：<b id="stuUserName">—</b></div>
    <button class="notif-btn" id="stuNotifBtn" onclick="toggleStuBanner()" title="訊息通知">🔔<span class="notif-dot" id="stuNotifDot"></span></button>

  </div>

  <div id="stuBanner">
    <div style="font-size:13px;color:var(--red);font-weight:bold;margin-bottom:8px">🔴 未讀訊息</div>
    <div id="stuBannerList"></div>
  </div>
  <div class="content">
    <div id="stuCard" style="max-width:600px;margin:0 auto"></div>
    <div style="max-width:600px;margin:16px auto 0">
      <button class="btn g" onclick="openApplyExit()" style="width:100%;padding:13px;font-size:15px">🚪 申請第八節外出</button>
    </div>
    <div id="stuPassArea" style="max-width:600px;margin:10px auto 0"></div>
  </div>
</div>

<!-- ══ DETAIL PANEL ══ -->
<div id="detailPanel">
  <div class="dp-hd">
    <div>
      <div class="dp-cls" id="dpCls"></div>
      <div class="dp-name" id="dpName"></div>
    </div>
    <button class="dp-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="dp-sec">
    <div class="dp-sec-t">🔑 密碼</div>
    <div class="pw-box" id="dpPw">—</div>
  </div>
  <div class="dp-sec">
    <div class="dp-sec-t">📋 今日出勤</div>
    <div id="dpStatus" style="font-size:20px;font-weight:bold;margin-bottom:10px"></div>
    <div class="dp-sec-t" style="margin-top:4px">📅 出勤歷史（近21天）</div>
    <div id="dpAttHist"></div>
  </div>
  <div class="dp-sec">
    <div class="dp-sec-t">⭐ 點數集點卡</div>
    <div class="pts-card">
      <div class="pts-grid" id="dpPtsGrid"></div>
      <div class="pts-info">目前：<b id="dpPtsNum">0</b> 點 <span style="font-size:11px;color:var(--tx3);margin-left:8px">集滿5點換金牌</span></div>
    </div>
    <div class="row">
      <button class="btn s" onclick="chgPts(1)">＋ 加1點</button>
      <button class="btn d" onclick="chgPts(-1)">－ 扣1點</button>
      <button class="btn g" onclick="redeemMedal()" id="redeemBtn">🎖️ 兌換金牌</button>
    </div>
  </div>
  <div class="dp-sec">
    <div class="dp-sec-t">🎖️ 金牌庫存</div>
    <div class="medals-row" id="dpMedals"></div>
    <div style="font-size:13px;color:var(--tx2);margin-bottom:7px">共 <b style="color:var(--gold)" id="dpMedalsN">0</b> 枚</div>
    <div class="row">
      <button class="btn s" onclick="chgMedal(1)">＋ 加金牌</button>
      <button class="btn d" onclick="chgMedal(-1)">－ 扣金牌</button>
    </div>
  </div>
  <div class="dp-sec">
    <div class="dp-sec-t">📝 處罰任務</div>
    <div id="dpTasks"></div>
    <div class="row" style="margin-top:7px">
      <button class="btn" onclick="openAddTask()" style="flex:1">＋ 新增任務</button>
      <button class="btn" onclick="openAddCopy()" style="flex:1">📝 新增罰抄</button>
    </div>
  </div>
  <div class="dp-sec">
    <div class="dp-sec-t">📜 異動日誌</div>
    <div id="dpLog" style="max-height:260px;overflow-y:auto"></div>
  </div>
  <div class="dp-sec">
    <div class="dp-sec-t">⚠️ 重置</div>
    <div class="row" style="flex-wrap:wrap;gap:6px">
      <button class="btn d" onclick="resetPts()">重置點數</button>
      <button class="btn d" onclick="resetMedals()">重置金牌</button>
      <button class="btn d" onclick="resetPw()">重置密碼(→0000)</button>
      <button class="btn d" onclick="resetAll()" style="background:rgba(231,76,60,.15)">🗑️ 清除全部</button>
    </div>
  </div>
</div>

<!-- ══ EXIT PASS ══ -->

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'on' + (type?' '+type:'');
  clearTimeout(t._t); t._t = setTimeout(()=>t.className='', 3000);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  const el = document.getElementById(id);
  if (id === 'loginScreen') {
    el.style.display = 'flex';
    el.style.alignItems = 'center';
    el.style.justifyContent = 'center';
  } else {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
  }

}

function switchLTab(t) {
  document.querySelectorAll('.ltab').forEach((b,i)=>b.classList.toggle('on',(t==='teacher'&&i===0)||(t==='student'&&i===1)));
  document.getElementById('teacherForm').style.display = t==='teacher'?'':'none';
  document.getElementById('studentForm').style.display = t==='student'?'':'none';
}

async function doLogin() {
  const name = document.getElementById('lName').value.trim();
  const pass = document.getElementById('lPass').value.trim();
  if (!name||!pass) { toast('請填寫帳號和密碼','err'); return; }
  if (name===MASTER.name && pass===MASTER.pass) {
    me = {name, role:'master', classes:CLASSES};
    enterApp(); return;
  }
  toast('驗證中…');
  try {
    const teachers = await Promise.race([
      dbGet('teachers'),
      new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),8000))
    ]);
    if (teachers) {
      for (const k of Object.keys(teachers)) {
        const t = teachers[k];
        if (t.name===name && t.pass===pass) {
          me = {name, role:'teacher', classes:t.classes||[]};
          enterApp(); return;
        }
      }
    }
    toast('帳號或密碼錯誤','err');
  } catch(e) {
    toast(e.message==='timeout'?'連線逾時，請確認Firebase規則':'連線失敗：'+e.message,'err');
  }
}

async function doStudentLogin() {
  const name = document.getElementById('sName').value.trim();
  const pass = document.getElementById('sPass').value.trim();
  if (!name||!pass) { toast('請填寫姓名和密碼','err'); return; }
  const stu = byName(name);
  if (!stu) { toast('查無此學生','err'); return; }
  try {
    const data = await dbGet(`students/${stu.id}`);
    const stored = data?.password || '0000';
    if (pass !== stored) { toast('密碼錯誤','err'); return; }
    me = {name, role:'student', stuId:stu.id};
    if (!data?.password || data.password==='0000') {
      openDlg('⚠️ 首次登入，請修改密碼',
        `<div class="dlg-label">新密碼</div><input class="dlg-input" type="password" id="np1" placeholder="新密碼">
         <div class="dlg-label">確認密碼</div><input class="dlg-input" type="password" id="np2" placeholder="再次輸入">`,
        [{label:'確認修改',cls:'ok',fn:async()=>{
          const p1=document.getElementById('np1').value;
          const p2=document.getElementById('np2').value;
          if(!p1){toast('密碼不能為空','err');return false}
          if(p1!==p2){toast('兩次不一致','err');return false}
          await dbUpd(`students/${stu.id}`,{password:p1});
          toast('密碼已更新','ok');
          enterStudentView(stu); return true;
        }}]);
    } else { enterStudentView(stu); }
  } catch(e) { toast('連線失敗','err'); }
}

function enterApp() {

function switchTab(t) {
  document.querySelectorAll('.navtab').forEach(b=>b.classList.remove('on'));
  ['att','apply','inbox','report','teachers'].forEach(id=>{
    const el = document.getElementById('tab'+id.charAt(0).toUpperCase()+id.slice(1));
    if (el) el.style.display = 'none';
  });
  document.getElementById('tab-'+t).classList.add('on');
  // map tab id to content div
  const map = {att:'tabAtt',apply:'tabApply',inbox:'tabInbox',report:'tabReport',teachers:'tabTeachers'};
  document.getElementById(map[t]).style.display = '';
  if (t==='att') renderGrid();
  if (t==='report') { buildClsBtns('clsBtnsR', switchClsR); renderRpt(); renderStats(); loadDeductLog(); }
  if (t==='teachers') renderTeachers();

  if (t==='apply') {} // already live
}

// CLASS SELECTOR
// ══════════════════════════════════════════
function buildClsBtns(containerId, clickFn) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = '';
  me.classes.forEach((cls,i) => {
    const b = document.createElement('button');
    b.className = 'clsbtn'+(i===0?' on':'');
    b.textContent = cls;
    b.onclick = () => {
      c.querySelectorAll('.clsbtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      clickFn(cls);
    };
    c.appendChild(b);
  });
}

function switchCls(cls) { curCls = cls; renderGrid(); }
function switchClsR(cls) { curCls = cls; renderRpt(); }

// ══════════════════════════════════════════
// STUDENT GRID
// ══════════════════════════════════════════
async function renderGrid() {
  if (!curCls) return;
  const grid = document.getElementById('stuGrid');
  grid.innerHTML = '<div style="padding:20px"><div class="spin"></div></div>';
  const stus = byCls(curCls);
  const td = today();
  const res = await Promise.all(stus.map(s=>dbGet(`students/${s.id}`)));
  const dm = {}; stus.forEach((s,i)=>dm[s.id]=res[i]||{});
  grid.innerHTML = '';
  stus.forEach(s => {
    const d = dm[s.id];
    const att = pendAtt[s.id] || d.attendance?.[td] || '未';
    const pts = d.points||0;
    const medals = d.medals||0;
    const stars = Math.min(pts,10);
    const sel = batchSel.has(s.id);
    const card = document.createElement('div');
    card.className = `scard s${att}${sel?' sel':''}`;
    card.id = `sc-${s.id}`;
    card.innerHTML = `
      <div class="sc-top">
        <div class="sc-num">${s.id}</div>
        <div class="sbadge ${att}" onclick="cycleAtt(event,'${s.id}')">${att}</div>
      </div>
      <div class="sc-name" onclick="handleCardClick(event,'${s.id}')"><span style='font-size:11px;color:var(--tx3);margin-right:3px'>${s.id.split('-')[1]||''}</span>${s.name}</div>
      <div class="sc-pts">
        <div class="sc-stars">${'★'.repeat(stars)}${'☆'.repeat(10-stars)}</div>
        <div class="sc-medals">${medals>0?'🎖️×'+medals:''}</div>
      </div>
      <div class="sc-hint">${batchMode?'👆點擊勾選':'👆名字查詳情'}</div>`;
    // restore sel visual
    if (sel) card.classList.add('sel');
    grid.appendChild(card);
  });
}

function handleCardClick(e, id) {
  e.stopPropagation();
  if (batchMode) { toggleSel(id); return; }
  const stu = byId(id);
  if (stu) openDetail(stu);
}

function cycleAtt(e, id) {
  e.stopPropagation();
  const cur = pendAtt[id] || '未';
  const next = STATUS[(STATUS.indexOf(cur)+1)%STATUS.length];
  pendAtt[id] = next;
  const card = document.getElementById(`sc-${id}`);
  if (card) {
    card.className = `scard s${next}${batchSel.has(id)?' sel':''}`;
    const badge = card.querySelector('.sbadge');
    badge.className = `sbadge ${next}`;
    badge.textContent = next;
  }
  if (next==='遲') autoDeductLate(id);
}

async function autoDeductLate(id) {
  const d = await dbGet(`students/${id}`);
  const pts = Math.max(0,(d?.points||0)-1);
  const lk = Date.now()+'';
  const stu = byId(id);
  await dbUpd(`students/${id}`,{
    points:pts,
    [`log/${lk}`]:{time:now(),action:'遲到自動扣點',reason:'遲到扣1點',teacher:me.name,delta:-1}
  });
  // 發送記點通知給學生
  await sendNotifToStudent(id, stu?.name||id, '遲到自動扣1點', 'notice');
  toast(`${byId(id)?.name} 遲到，自動扣1點`);
}

async function saveAtt() {
  if (!curCls) { toast('請先選班級','err'); return; }
  const td = today();
  const upd = {};
  let count = 0;
  for (const [id,att] of Object.entries(pendAtt)) {
    if (byId(id)?.cls!==curCls) continue;
    upd[`${ROOT}/students/${id}/attendance/${td}`] = att;
    count++;
  }
  if (!count) { toast('無變更需儲存'); return; }
  await db.ref('/').update(upd);
  // 清除已儲存班級的 pendAtt
  byCls(curCls).forEach(s=>{ delete pendAtt[s.id]; });
  toast(`已儲存 ${count} 筆點名記錄`,'ok');
  renderGrid();
}

function setAllAtt(att) {
  byCls(curCls).forEach(s=>{ pendAtt[s.id]=att; });
  renderGrid();
}

// BATCH MODE
// ══════════════════════════════════════════
function toggleBatch() {
  batchMode = !batchMode;
  batchSel.clear();
  const btn = document.getElementById('batchBtn');
  const bar = document.getElementById('batchBar');
  btn.textContent = batchMode?'✕ 退出批次':'☑️ 批次加點';
  btn.className = batchMode?'btn g':'btn';
  bar.classList.toggle('on', batchMode);
  if (batchMode) toast('批次模式：點名字勾選學生');
  updBatchCnt();
  renderGrid();
}

function toggleSel(id) {
  if (batchSel.has(id)) batchSel.delete(id); else batchSel.add(id);
  updBatchCnt();
  const card = document.getElementById(`sc-${id}`);
  if (card) card.classList.toggle('sel', batchSel.has(id));
}

function updBatchCnt() { document.getElementById('batchCnt').textContent = batchSel.size; }
function selectAll() { byCls(curCls).forEach(s=>batchSel.add(s.id)); updBatchCnt(); renderGrid(); }
function clearSel() { batchSel.clear(); updBatchCnt(); renderGrid(); }

function batchSetAtt(att) {
  if (!batchSel.size) { toast('請先勾選學生','err'); return; }
  batchSel.forEach(id => {
    pendAtt[id] = att;
    const card = document.getElementById(`sc-${id}`);
    if (card) {
      card.className = `scard s${att} sel`;
      const badge = card.querySelector('.sbadge');
      if (badge) { badge.className=`sbadge ${att}`; badge.textContent=att; }
    }
  });
  toast(`已批次設定 ${batchSel.size} 人為「${att}」`);
  if (att==='遲') {
    openDlg('⏱ 批次遲到確認',`<div class="dlg-msg">已標記 ${batchSel.size} 人遲到。<br>是否同時自動扣1點？</div>`,
      [{label:'是，自動扣點',cls:'ok',fn:async()=>{
        for(const id of batchSel){ await autoDeductLate(id); }
        toast('批次遲到扣點完成','ok'); return true;
      }},{label:'否，只改狀態',fn:()=>true}]);
  }
}
async function batchPts(delta) {
  if (!batchSel.size) { toast('請先勾選學生','err'); return; }
  openDlg(delta>0?`⭐ 批次+1點（${batchSel.size}人）`:`－ 批次扣1點（${batchSel.size}人）`,
    `<div class="dlg-label">原因</div><input class="dlg-input" type="text" id="bReason" placeholder="請輸入原因">`,
    [{label:'確認',cls:'ok',fn:async()=>{
      const reason = document.getElementById('bReason').value.trim();
      if (!reason){toast('請填寫原因','err');return false}
      const upd = {};
      for (const id of batchSel) {
        const d = await dbGet(`students/${id}`);
        const pts = Math.max(0,(d?.points||0)+delta);
        const lk = Date.now()+'_'+id;
        upd[`${ROOT}/students/${id}/points`] = pts;
        upd[`${ROOT}/students/${id}/log/${lk}`] = {time:now(),action:delta>0?'批次加點':'批次扣點',reason,teacher:me.name,delta};
        // 發通知
        const stu = byId(id);
        if (stu) upd[`${ROOT}/stuMsgs/${id}/${lk}`] = {from:me.name,content:`${delta>0?'獲得':'扣除'}1點 — ${reason}`,type:'notice',time:now(),read:false};
      }
      await db.ref('/').update(upd);
      toast(`${batchSel.size}人${delta>0?'加':'扣'}點完成`,'ok');
      renderGrid(); return true;
    }},{label:'取消',fn:()=>true}]);
}

async function batchMedal() {
  if (!batchSel.size) { toast('請先勾選學生','err'); return; }
  openDlg(`🎖️ 批次發金牌（${batchSel.size}人）`,
    `<div class="dlg-label">原因</div><input class="dlg-input" type="text" id="bmR" placeholder="請輸入原因">`,
    [{label:'確認',cls:'ok',fn:async()=>{
      const reason = document.getElementById('bmR').value.trim();
      if (!reason){toast('請填寫原因','err');return false}
      const upd = {};
      for (const id of batchSel) {
        const d = await dbGet(`students/${id}`);
        const medals = (d?.medals||0)+1;
        const lk = Date.now()+'_'+id;
        upd[`${ROOT}/students/${id}/medals`] = medals;
        upd[`${ROOT}/students/${id}/log/${lk}`] = {time:now(),action:'批次加金牌',reason,teacher:me.name,delta:0};
        upd[`${ROOT}/stuMsgs/${id}/${lk}`] = {from:me.name,content:`獲得金牌🎖️ — ${reason}`,type:'notice',time:now(),read:false};
      }
      await db.ref('/').update(upd);
      toast(`已發${batchSel.size}枚金牌`,'ok'); renderGrid(); return true;
    }},{label:'取消',fn:()=>true}]);
}

// ══════════════════════════════════════════
// DETAIL PANEL
// ══════════════════════════════════════════
async function openDetail(stu) {
  curStu = stu;
  const d = (await dbGet(`students/${stu.id}`))||{};
  const td = today();
  document.getElementById('dpName').textContent = stu.name;
  document.getElementById('dpCls').textContent = stu.cls+' · '+stu.id;
  document.getElementById('dpPw').textContent = d.password||'0000';
  // 今日狀態
  const att = d.attendance?.[td]||'未';
  const attColor = {出:'var(--green)',遲:'var(--yellow)',缺:'var(--red)',假:'var(--blue)'}[att]||'var(--tx2)';
  document.getElementById('dpStatus').innerHTML = `<span style="color:${attColor}">${att}</span>`;
  // 出勤歷史
  const attH = d.attendance||{};
  const days = Object.keys(attH).sort().slice(-21);
  const sum = {出:0,遲:0,缺:0,假:0};
  days.forEach(day=>{ if(sum[attH[day]]!==undefined) sum[attH[day]]++; });
  document.getElementById('dpAttHist').innerHTML = `
    <div class="att-sum">
      <div class="att-si" style="color:var(--green)">出席 ${sum['出']}</div>
      <div class="att-si" style="color:var(--yellow)">遲到 ${sum['遲']}</div>
      <div class="att-si" style="color:var(--red)">缺席 ${sum['缺']}</div>
      <div class="att-si" style="color:var(--blue)">請假 ${sum['假']}</div>
    </div>
    <div class="att-hgrid">${days.map(day=>{
      const v=attH[day]||'未';
      const sd=day.replace(/^\d+\//,'').replace('/','/');
      return `<div class="att-day s${v}"><div class="dl">${sd}</div><div class="dv">${v}</div></div>`;
    }).join('')}</div>`;
  // 點數
  const pts = d.points||0;
  document.getElementById('dpPtsNum').textContent = pts;
  document.getElementById('redeemBtn').disabled = pts<5;
  const pg = document.getElementById('dpPtsGrid');
  pg.innerHTML = '';
  for(let i=0;i<10;i++){
    const c=document.createElement('div');
    c.className='pc '+(i<pts?'on':'off');
    c.textContent=i<pts?'⭐':'';
    pg.appendChild(c);
  }
  // 金牌
  const medals = d.medals||0;
  document.getElementById('dpMedalsN').textContent = medals;
  const mr = document.getElementById('dpMedals');
  mr.innerHTML = medals>0
    ? Array(Math.min(medals,12)).fill(0).map(()=>`<div class="mcoin">🏅</div>`).join('')+(medals>12?`<span style="color:var(--gold);font-size:18px;align-self:center">+${medals-12}</span>`:'')
    : '<span style="color:var(--tx3);font-size:13px;font-style:italic">尚無金牌</span>';
  // 任務
  renderTasks(d.tasks||{});
  // 日誌
  renderLog(d.log||{});
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  curStu = null;
}

function renderTasks(tasks) {
  const c = document.getElementById('dpTasks');
  const ents = Object.entries(tasks);
  if (!ents.length) { c.innerHTML='<div style="color:var(--tx3);font-size:13px">暫無任務</div>'; return; }
  c.innerHTML = ents.map(([k,t])=>{
    const pct = Math.min(100,Math.round((t.done/t.total)*100));
    return `<div class="task-item">
      <div class="task-hd">
        <div style="font-size:14px">${t.name}</div>
        <div class="row"><span style="font-size:12px;color:var(--tx2)">${t.done}/${t.total}</span>
          <button class="btn s" onclick="incrTask('${k}')" style="padding:2px 7px;font-size:11px">+1</button>
          <button class="btn d" onclick="delTask('${k}')" style="padding:2px 7px;font-size:11px">✕</button>
        </div>
      </div>
      <div class="task-bar"><div class="task-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderLog(log) {
  const c = document.getElementById('dpLog');
  const ents = Object.entries(log).sort((a,b)=>b[0]-a[0]).slice(0,40);
  if (!ents.length) { c.innerHTML='<div style="color:var(--tx3);font-size:13px">尚無記錄</div>'; return; }
  c.innerHTML = ents.map(([,e])=>{
    const cls = e.delta>0?'add':e.delta<0?'sub':e.action?.includes('牌')?'med':'';
    return `<div class="log-item ${cls}"><div class="log-t">${e.time||''} · ${e.teacher||''}</div><div>${e.action||''}${e.reason?' — '+e.reason:''}</div></div>`;
  }).join('');
}

function renderApplyList(data) {
  const c = document.getElementById('applyList');

  if (!pend.length) { c.innerHTML='<div class="empty">目前無待審核申請 ✓</div>'; return; }
  c.innerHTML = pend.map(([k,a])=>`
    <div class="apply-item">
      <div class="ai-info">

  const stu = byName(name);

async function sendNotifToStudent(stuId, stuName, content, type='notice') {
  const k = Date.now()+'_auto';
  await db.ref(`${ROOT}/stuMsgs/${stuId}/${k}`).set({
    from: me?.name||'系統', content, type, time: now(), read: false
  });
}

function startMsgListener() {
  // 監聽老師端發出的訊息未讀數
  ref('messages').on('value', snap => {
    renderInbox(snap.val()||{});
  });
}

let inboxFilterMode = 'all';
function inboxFilter(mode) {
  inboxFilterMode = mode;
  ['all','unread','punishment'].forEach(m=>{
    const btn = document.getElementById('inboxTab'+m.charAt(0).toUpperCase()+m.slice(1));
    if(btn) { btn.style.borderColor=m===mode?'var(--gold)':''; btn.style.color=m===mode?'var(--gold)':''; }
  });
  renderInbox();
}

async function renderInbox(data) {
  if (!data) data = await dbGet('messages')||{};
  const c = document.getElementById('inboxList');
  if (!c) return;
  let ents = Object.entries(data).sort((a,b)=>b[0]-a[0]);
  if (inboxFilterMode==='unread') ents=ents.filter(([,m])=>!m.read);
  if (inboxFilterMode==='punishment') ents=ents.filter(([,m])=>m.type==='punishment');
  if (!ents.length) { c.innerHTML='<div class="empty">尚無訊息</div>'; return; }
  let unread = 0;
  c.innerHTML = ents.map(([k,m])=>{
    if (!m.read) unread++;
    const typeLabel = {notice:'📢通知',punishment:'⚠️處罰',deduct:'🔴扣分'}[m.type]||'📢通知';
    const typeClass = m.type==='punishment'?'punish':m.type==='deduct'?'unread':'';
    return `<div class="msg-item ${typeClass}" style="border-left:3px solid ${m.read?'var(--bdr)':m.type==='punishment'?'var(--yellow)':m.type==='deduct'?'var(--red)':'var(--blue)'}">
      <div class="msg-hd">
        <div class="msg-to">發給：<b>${m.to}</b> <span class="msg-tag notice">${typeLabel}</span></div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <div class="msg-time">${m.time}</div>
          <button class="btn d" onclick="delMsg('${k}')" style="padding:2px 7px;font-size:10px">刪</button>
        </div>
      </div>
      <div class="msg-body">${m.content}</div>
      <div style="font-size:11px;color:var(--tx3)">發送者：${m.from} · <span style="color:${m.read?'var(--green)':'var(--red)'}">${m.read?'✅已讀':'🔴未讀'}</span></div>
    </div>`;
  }).join('');
  const ib = document.getElementById('inboxBadge');
  ib.textContent = unread; ib.style.display = unread?'':'none';
  document.getElementById('teacherNotifDot')?.classList.toggle('on', unread>0 || document.getElementById('applyBadge').style.display!=='none');
}

async function delMsg(k) {
  await db.ref(`${ROOT}/messages/${k}`).remove();
  toast('訊息已刪除');
}

function openSendMsg() {
  const clsOpts = CLASSES.map(cls=>`<option value="cls:${cls}">📢 ${cls} 全班</option>`).join('');
  const stuOpts = CLASSES.map(cls=>
    `<optgroup label="${cls}">`+
    byCls(cls).map(s=>`<option value="stu:${s.id}:${s.name}">${s.id.split('-')[1]||''} ${s.name}</option>`).join('')+
    `</optgroup>`
  ).join('');
  openDlg('✉️ 發送訊息',
    `<div class="dlg-label">發送對象</div>
     <select class="dlg-input" id="msgTo" style="width:100%;margin-bottom:12px">
       <option value="all">🌐 全校廣播（所有班級）</option>
       ${clsOpts}
       <optgroup label="─ 個別學生 ─">${stuOpts}</optgroup>
     </select>
     <div class="dlg-label">類型</div>
     <select class="dlg-input" id="msgType" style="width:100%;margin-bottom:12px">
       <option value="notice">📢 一般通知</option>
       <option value="punishment">⚠️ 處罰通知</option>
       <option value="deduct">🔴 扣分通知</option>
     </select>
     <div class="dlg-label">訊息內容</div>
     <textarea class="dlg-input" id="msgContent" rows="3" placeholder="請輸入訊息內容..."></textarea>`,
    [{label:'發送',cls:'ok',fn:async()=>{
      const target = document.getElementById('msgTo').value;
      const type = document.getElementById('msgType').value;
      const content = document.getElementById('msgContent').value.trim();
      if (!content){toast('請填寫內容','err');return false}
      const k = Date.now()+'';
      let toName, toIds;
      if (target === 'all') {
        toName='全校'; toIds=STUDENTS.map(s=>s.id);
      } else if (target.startsWith('cls:')) {
        const cls=target.slice(4); toName=cls+'全班'; toIds=byCls(cls).map(s=>s.id);
      } else {
        const parts=target.split(':'); toName=parts[2]; toIds=[parts[1]];
      }
      const upd = {};
      upd[`${ROOT}/messages/${k}`] = {from:me.name, to:toName, content, type, time:now(), read:false};
      toIds.forEach(id=>{ upd[`${ROOT}/stuMsgs/${id}/${k}`] = {from:me.name, content, type, time:now(), read:false}; });
      await db.ref('/').update(upd);
      toast(`已發送給 ${toName}（${toIds.length}人）`,'ok');
      return true;
    }},{label:'取消',fn:()=>true}]);

// ── 學生端訊息系統 (優化版) ──
let _stuMsgListener = null;

async function loadStuMsgs(stuId) {
  _currentStuId = stuId;
  const msgPath = `stuMsgs/${stuId}`;

  // 先移除舊的監聽器，避免重複執行
  ref(msgPath).off('value');

  // 開啟即時監聽：資料庫一改，畫面立刻跳
  ref(msgPath).on('value', snap => {
    const data = snap.val() || {};
    _renderStuMsgs(stuId, data);
  });
}

function _renderStuMsgs(stuId, data) {
  const list = document.getElementById('stuBannerList');
  const dot = document.getElementById('stuNotifDot');
  if (!list) return;

  const allMsgs = Object.entries(data).sort((a, b) => b[0].localeCompare(a[0]));
  const unreadCount = allMsgs.filter(([, m]) => !m.read).length;

  // 更新導航列紅點狀態
  if (dot) {
    dot.classList.toggle('on', unreadCount > 0);
  }

  if (allMsgs.length === 0) {
    list.innerHTML = '<div class="empty">尚無訊息</div>';
    return;
  }

  // 渲染訊息內容
  list.innerHTML = allMsgs.slice(0, 20).map(([k, m]) => {
    const isUnread = !m.read;
    const typeLabel = { notice: '📢 通知', punishment: '⚠️ 處罰', deduct: '🔴 扣分' }[m.type] || '📢';
    
    // 這裡我們直接在 HTML 裡呼叫修正後的 markRead
    return `
      <div class="stu-msg-item" 
           style="border-left:3px solid ${m.read ? 'var(--bdr)' : (m.type === 'punishment' ? 'var(--yellow)' : 'var(--blue)')}; 
                  opacity: ${m.read ? '0.7' : '1'}">
        <div class="stu-msg-from">
          ${typeLabel} · ${m.from} · ${m.time}
          ${m.read ? '<span style="color:var(--green);margin-left:5px">✓ 已讀</span>' : ''}
        </div>
        <div style="margin:5px 0; color:var(--tx)">${m.content}</div>
        ${isUnread ? `
          <button class="btn s" 
                  style="margin-top:5px; padding:3px 12px" 
                  onclick="markRead('${stuId}', '${k}')">
            ✓ 標記已讀
          </button>` : ''}
      </div>`;
  }).join('');
}

// ── 核心修正：確保路徑絕對正確的 markRead ──
async function markRead(stuId, k) {
  // 防止重複點擊
  console.log("正在嘗試讀取訊息:", stuId, k);
  
  try {
    // 使用你定義的 ref(p) 輔助函式，這樣路徑才會自動帶上 ROOT (jjvs_v2)
    // 1. 更新學生個人的訊息狀態
    await ref(`stuMsgs/${stuId}/${k}`).update({ read: true });
    
    // 2. 同步更新老師端的總訊息表 (非必要，但建議保留)
    try {
      await ref(`messages/${k}`).update({ read: true });
    } catch(e) {
      // 如果老師端的 key 不同，這裡跳過不影響學生端
    }

    toast('已讀取', 'ok');
  } catch (e) {
    console.error("已讀失敗:", e);
    toast('讀取失敗，請檢查網路', 'err');
  }
}

// ── 橫幅切換優化 ──
function toggleStuBanner() {
  const banner = document.getElementById('stuBanner');
  if (!banner) return;
  
  stuBannerOpen = !stuBannerOpen;
  banner.style.display = stuBannerOpen ? 'block' : 'none';
  
  // 每次打開時確保有最新資料
  if (stuBannerOpen && _currentStuId) {
    loadStuMsgs(_currentStuId);
  }

      const newPts = (d?.points||0)-5, newMedals = (d?.medals||0)+1;
      const lk = Date.now()+'';
      await dbUpd(`students/${stuId}`,{points:newPts,medals:newMedals,
        [`log/${lk}`]:{time:now(),action:'學生兌換金牌',reason:'集滿5點自行兌換',teacher:'學生',delta:-5}});
      toast('金牌兌換成功🎖️','ok');
      const stu = byId(stuId); if(stu) loadStuView(stu);
      return true;
    }},{label:'取消',fn:()=>true}]);
}

// ── 學生修改密碼 ──
function stuChangePw(stuId) {
  openDlg('🔑 修改密碼',
    `<div class="dlg-label">目前密碼</div><input class="dlg-input" type="password" id="cpOld" placeholder="目前密碼">
     <div class="dlg-label">新密碼</div><input class="dlg-input" type="password" id="cpNew1" placeholder="新密碼">
     <div class="dlg-label">確認新密碼</div><input class="dlg-input" type="password" id="cpNew2" placeholder="再次輸入">`,
    [{label:'確認修改',cls:'ok',fn:async()=>{
      const old = document.getElementById('cpOld').value;
      const n1 = document.getElementById('cpNew1').value;
      const n2 = document.getElementById('cpNew2').value;
      const d = await dbGet(`students/${stuId}`);
      const stored = d?.password||'0000';
      if (old !== stored) { toast('目前密碼錯誤','err'); return false; }
      if (!n1) { toast('新密碼不能為空','err'); return false; }
      if (n1 !== n2) { toast('兩次密碼不一致','err'); return false; }
      await dbUpd(`students/${stuId}`,{password:n1});
      toast('密碼已更新','ok'); return true;
    }},{label:'取消',fn:()=>true}]);
}

// ══════════════════════════════════════════
// STUDENT VIEW (self)
// ══════════════════════════════════════════
async function loadStuView(stu) {
  const c = document.getElementById('stuCard');
  c.innerHTML = '<div class="spin"></div>';
  const d = (await dbGet(`students/${stu.id}`))||{};
  const td = today();
  const att = d.attendance?.[td]||'未點名';
  const pts = d.points||0, medals = d.medals||0;
  const attColor = {出:'var(--green)',遲:'var(--yellow)',缺:'var(--red)',假:'var(--blue)'}[att]||'var(--tx2)';
  c.innerHTML = `
    <div style="background:var(--bg1);border:1px solid var(--bdr);border-radius:18px;padding:28px;box-shadow:0 0 20px rgba(212,175,55,.1)">
      <div style="text-align:center;margin-bottom:18px">
        <div style="font-size:13px;color:var(--tx2)">${stu.cls}</div>
        <div style="font-size:34px;font-weight:bold;color:var(--gold);margin:6px 0">${stu.name}</div>
        <div style="font-size:14px;color:var(--tx2)">今日：<span style="color:${attColor};font-weight:bold">${att}</span></div>
      </div>
      <hr class="sep">
      <div class="dp-sec-t">⭐ 點數集點卡</div>
      <div class="pts-card">
        <div class="pts-grid">${Array(10).fill(0).map((_,i)=>`<div class="pc ${i<pts?'on':'off'}">${i<pts?'⭐':''}</div>`).join('')}</div>
        <div class="pts-info">目前：<b>${pts}</b> 點</div>
      </div>
      <hr class="sep">
      <div class="dp-sec-t">🎖️ 金牌庫存</div>
      <div class="medals-row">${medals>0?Array(Math.min(medals,10)).fill(0).map(()=>`<div class="mcoin">🏅</div>`).join('')+(medals>10?`<span style="color:var(--gold);font-size:16px;align-self:center">+${medals-10}</span>`:''): '<span style="color:var(--tx3);font-size:13px">尚無金牌</span>'}</div>
      <div style="font-size:13px;color:var(--tx2);margin-bottom:14px">共 <b style="color:var(--gold)">${medals}</b> 枚</div>
      <hr class="sep">
      <div class="dp-sec-t" style="margin-bottom:8px">🎁 兌換金牌</div>
      <button class="btn g" onclick="stuRedeemMedal('${stu.id}',${pts})" ${pts<5?'disabled style="opacity:.5"':''} style="width:100%;padding:10px;font-size:14px;margin-bottom:4px">
        🎖️ ${pts>=5?'兌換金牌（扣5點）':'點數不足（需滿5點）'}
      </button>
      <hr class="sep">
      <div class="dp-sec-t" style="margin-bottom:8px">🔑 修改密碼</div>
      <button class="btn" onclick="stuChangePw('${stu.id}')" style="width:100%;padding:10px;font-size:14px;margin-bottom:4px">修改我的密碼</button>
      <hr class="sep">
      <div class="dp-sec-t">📜 最近記錄</div>
      <div>${Object.entries(d.log||{}).sort((a,b)=>b[0]-a[0]).slice(0,8).map(([,e])=>`
        <div class="log-item ${e.delta>0?'add':e.delta<0?'sub':''}">
          <div class="log-t">${e.time||''}</div>
          <div>${e.action||''}${e.reason?' — '+e.reason:''}</div>
        </div>`).join('')||'<div style="color:var(--tx3);font-size:13px">尚無記錄</div>'}</div>
    </div>`;
  // 監聽外出審核
  listenMyApprovalStu(stu.name);
}

function listenMyApprovalStu(name) {
  ref('exitApply').on('value', snap=>{
    const data=snap.val()||{};
    const td=today();
    const approved=Object.values(data).find(a=>a.studentName===name&&a.status==='approved'&&a.approvedTime?.includes(td.replace(/\//g,'/')));
    const area=document.getElementById('stuPassArea');
    if (approved&&area) {
      area.innerHTML=`<button class="btn g" onclick="showExitPass('${name}','${approved.approvedBy}','${approved.approvedTime}')" style="width:100%;padding:12px;font-size:14px">📋 顯示外出憑證</button>`;
    }
  });
}

// ══════════════════════════════════════════
// TEACHER MANAGEMENT
// ══════════════════════════════════════════
async function renderTeachers() {
  const c = document.getElementById('teacherList');
  c.innerHTML = '<div class="spin"></div>';
  const teachers = await dbGet('teachers')||{};
  c.innerHTML = `<div class="titem"><div class="ti-name">${MASTER.name} <span style="background:var(--gold);color:#000;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px">最高權限</span></div><div class="ti-cls">管轄所有班級</div></div>`;
  Object.entries(teachers).forEach(([k,t])=>{
    const d=document.createElement('div');
    d.className='titem';
    d.innerHTML=`<div><div class="ti-name">${t.name}</div><div class="ti-cls">班級：${(t.classes||[]).join('、')||'無'}</div><div class="ti-pw">密碼：${t.pass}</div></div><button class="btn d" onclick="delTeacher('${k}','${t.name}')">刪除</button>`;
    c.appendChild(d);
  });
}

function openAddTeacher() {
  openDlg('⚙️ 新增教師帳號',
    `<div class="dlg-label">姓名（即帳號）</div><input class="dlg-input" type="text" id="tN" placeholder="教師姓名">
     <div class="dlg-label">密碼</div><input class="dlg-input" type="password" id="tP" placeholder="密碼">
     <div class="dlg-label">管轄班級</div>${CLASSES.map(c=>`<label style="display:block;margin-bottom:6px;font-size:14px;cursor:pointer"><input type="checkbox" value="${c}" style="margin-right:6px"> ${c}</label>`).join('')}`,
    [{label:'新增',cls:'ok',fn:async()=>{
      const name=document.getElementById('tN').value.trim();
      const pass=document.getElementById('tP').value.trim();
      const classes=[...document.querySelectorAll('#dlgBody input[type=checkbox]:checked')].map(c=>c.value);
      if(!name||!pass){toast('請填寫完整','err');return false}
      await dbSet(`teachers/${Date.now()}`,{name,pass,classes});
      toast('教師帳號已新增','ok'); renderTeachers(); return true;
    }},{label:'取消',fn:()=>true}]);
}

async function delTeacher(k, name) {
  openDlg('⚠️ 確認刪除',`<div class="dlg-msg">確認要刪除「${name}」的帳號？</div>`,
    [{label:'刪除',cls:'del',fn:async()=>{ await db.ref(`${ROOT}/teachers/${k}`).remove(); toast('已刪除'); renderTeachers(); return true; }},{label:'取消',fn:()=>true}]);
}

// ══════════════════════════════════════════
// REPORT & EXPORT
// ══════════════════════════════════════════
async function loadDeductLog() {
  const el = document.getElementById('deductLog');
  if (!el) return;
  el.innerHTML = '<div class="spin"></div>';
  // 讀取所有學生log中 delta<0 的記錄
  const stus = me.classes.flatMap(c=>byCls(c));
  const all = [];
  for (const s of stus) {
    const log = await dbGet(`students/${s.id}/log`) || {};
    Object.values(log).forEach(e => {
      if ((e.delta||0) < 0) all.push({...e, studentName:s.name, studentId:s.id, cls:s.cls});
    });
  }
  all.sort((a,b)=>(b.time||'').localeCompare(a.time||'')); 
  const recent = all.slice(0,40);
  if (!recent.length) { el.innerHTML='<div class="empty">尚無扣分記錄</div>'; return; }
  el.innerHTML = recent.map(e=>`
    <div class="log-item sub" style="background:var(--bg1);padding:8px 12px;border-radius:6px;margin-bottom:5px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:bold">${e.studentName} <span style="font-size:11px;color:var(--tx3)">${e.cls}</span></span>
        <span style="color:var(--red);font-weight:bold">${e.delta}點</span>
      </div>
      <div class="log-t">${e.time||''} · ${e.teacher||''}</div>
      <div style="font-size:13px">${e.action||''}${e.reason?' — '+e.reason:''}</div>
    </div>`).join('');
}
async function renderStats() {
  const td=today();
  const stus=me.classes.flatMap(c=>byCls(c));
  const res=await Promise.all(stus.map(s=>dbGet(`students/${s.id}/attendance/${td}`)));
  const sum={出:0,遲:0,缺:0,假:0};
  res.forEach(r=>{ if(sum[r]!==undefined) sum[r]++; });
  document.getElementById('statGrid').innerHTML=`
    <div class="statcard"><div class="stat-n" style="color:var(--green)">${sum['出']}</div><div class="stat-l">出席</div></div>
    <div class="statcard"><div class="stat-n" style="color:var(--yellow)">${sum['遲']}</div><div class="stat-l">遲到</div></div>
    <div class="statcard"><div class="stat-n" style="color:var(--red)">${sum['缺']}</div><div class="stat-l">缺席</div></div>
    <div class="statcard"><div class="stat-n" style="color:var(--blue)">${sum['假']}</div><div class="stat-l">請假</div></div>`;
}

async function renderRpt() {
  if (!curCls) curCls=me.classes[0];
  const grid=document.getElementById('rptGrid');
  grid.innerHTML='<div class="spin"></div>';
  const stus=byCls(curCls);
  const res=await Promise.all(stus.map(s=>dbGet(`students/${s.id}`)));
  grid.innerHTML='';
  stus.forEach((s,i)=>{
    const d=res[i]||{};
    const card=document.createElement('div');
    card.className='scard';
    card.style.cursor='pointer';
    card.innerHTML=`<div class="sc-top"><div class="sc-num">${s.id}</div><div style="font-size:12px;color:var(--tx3)">⭐${d.points||0} 🎖️${d.medals||0}</div></div>
      <div class="sc-name" style="cursor:default"><span style="font-size:11px;color:var(--tx3);margin-right:3px">${s.id.split('-')[1]||''}</span>${s.name}</div>
      <div style="font-size:12px;color:var(--tx2);margin-top:3px">${Object.keys(d.tasks||{}).length}任務 · ${Object.keys(d.log||{}).length}筆記錄</div>`;
    card.onclick=()=>openDetail(s,d);
    grid.appendChild(card);
  });
}

async function exportXlsx() {
  toast('生成 Excel...');
  const wb=XLSX.utils.book_new(), td=today();
  for (const cls of me.classes) {
    const stus=byCls(cls);
    const res=await Promise.all(stus.map(s=>dbGet(`students/${s.id}`)));
    const rows=[['學號','姓名','班級','點數','金牌','今日出勤']];
    stus.forEach((s,i)=>{ const d=res[i]||{}; rows.push([s.id,s.name,s.cls,d.points||0,d.medals||0,d.attendance?.[td]||'未']); });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),cls);
  }
  XLSX.writeFile(wb,`莊敬音樂科_${td}.xlsx`);
  toast('Excel 已下載','ok');
}

async function exportPdf() {
  toast('生成 PDF...');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape'});
  const td=today();
  doc.setFontSize(14); doc.text('莊敬高職音樂科 教務報表',14,14);
  doc.setFontSize(10); doc.text(`日期：${td}`,14,21);
  let y=28;
  for (const cls of me.classes) {
    const stus=byCls(cls);
    const res=await Promise.all(stus.map(s=>dbGet(`students/${s.id}`)));
    doc.autoTable({startY:y,head:[[cls,'姓名','點數','金牌','今日']],body:stus.map((s,i)=>{const d=res[i]||{};return[s.id,s.name,d.points||0,d.medals||0,d.attendance?.[td]||'未'];}),styles:{fontSize:9},headStyles:{fillColor:[180,145,30]}});
    y=doc.lastAutoTable.finalY+8;
    if(y>180){doc.addPage();y=20;}
  }
  doc.save(`莊敬音樂科_${td}.pdf`);
  toast('PDF 已下載','ok');
}

// ══════════════════════════════════════════
// DIALOG
// ══════════════════════════════════════════
function openDlg(title, bodyHtml, actions) {
  document.getElementById('dlgTitle').textContent = title;
  document.getElementById('dlgBody').innerHTML = bodyHtml;
  const acts = document.getElementById('dlgActs');
  acts.innerHTML = '';
  actions.forEach(a=>{
    const b=document.createElement('button');
    b.className='dlg-btn '+(a.cls||'');
    b.textContent=a.label;
    b.onclick=async()=>{ const r=await a.fn(); if(r!==false) closeDlg(); };
    acts.appendChild(b);
  });
  document.getElementById('dlgOverlay').classList.add('on');
  setTimeout(()=>{const f=document.querySelector('#dlgBody .dlg-input');if(f)f.focus();},100);
}

function closeDlg() { document.getElementById('dlgOverlay').classList.remove('on'); }
