        #gate-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--primary), #FFB300); }
        .gate-card { background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); width: 85%; max-width: 380px; text-align: center; }

        #app-screen { display: none; padding: 10px; min-height: 100vh; }
        header { text-align: center; background: var(--primary); padding: 20px; border-radius: 0 0 40px 40px; margin: -10px -10px 10px -10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .s-box { background: #fff; border-radius: 18px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1.5px solid #eee; position: relative; }
        .s-dot { width: 55px; height: 55px; border-radius: 15px; margin: 0 auto 10px; border: 3px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; color: #fff; }
        .s-points { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #fff; font-size: 0.75rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 94%; max-width: 480px; background: #fff; border-radius: 30px; padding: 20px; z-index: 1001; box-shadow: 0 25px 70px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; }
        
        /* 外出核可畫面 (警衛專用) */
        #pass-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--safe); z-index: 5000; color: #fff; text-align: center; padding-top: 60px; }
        .pass-card { background: #fff; color: #000; margin: 20px; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        .btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-gold { background: var(--primary); color: #000; }
        .btn-dark { background: #000; color: #fff; }
        
        .section-title { font-size: 1.1rem; font-weight: bold; border-left: 5px solid var(--primary); padding-left: 10px; margin: 18px 0 8px 0; text-align: left; }
        .log-row { background: #f8f8f8; border-radius: 12px; padding: 10px; margin-bottom: 6px; font-size: 0.8rem; border-left: 4px solid #ddd; position: relative; }
        .slot { width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.1); border: 1px dashed #ccc; display: inline-flex; align-items: center; justify-content: center; margin: 2px; }

                                if(!d) { 
                                    const np = prompt("首入設定查詢密碼："); 
                                    if(np) { db.ref(`jjvs_v20_auth/${f.id}`).set({p: np}); curStudent = f; role = 'student'; saveLogin('student', f.id); start(); }
                                } else if(pw === d.p) { curStudent = f; role = 'student'; saveLogin('student', f.id); start(); }
                                else alert("學生密碼錯誤");
                            });
                        } else alert("帳號不存在");
                    }
                });
            }
        }

        function saveLogin(r, sid, n, cls) {
            localStorage.setItem('jjvs_role', r); localStorage.setItem('jjvs_sid', sid);
            localStorage.setItem('jjvs_admin_name', n); localStorage.setItem('jjvs_admin_cls', cls);
        }

        window.onload = () => {
            const r = localStorage.getItem('jjvs_role');
            if(r === 'admin') {
                role = 'admin'; adminInfo = { n: localStorage.getItem('jjvs_admin_name'), cls: localStorage.getItem('jjvs_admin_cls') };
                start();
            } else if(r === 'student') {
                curStudent = students.find(s => s.id === localStorage.getItem('jjvs_sid'));
                role = 'student'; start();
            }
        };

        function logout() { localStorage.clear(); location.reload(); }

        function start() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('target-date').value = new Date().toISOString().split('T')[0];
            if(role === 'admin') {
                document.getElementById('admin-view').style.display = 'block';
                if(adminInfo.n === '蕭旭成') document.getElementById('admin-setup-btn').style.display = 'inline-block';
                initTabs();
            } else {
                document.getElementById('student-view').style.display = 'block';
                openDetail(curStudent.id);
            }
            loadCloud();
        }

        function initTabs() {
            const tb = document.getElementById('tabs'); tb.innerHTML = "";
            const grps = adminInfo.cls === 'ALL' ? ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"] : [adminInfo.cls];
            currentGrp = grps[0];
            grps.forEach(g => {
                const b = document.createElement('button'); b.innerText = g;
                b.style.cssText = "white-space:nowrap; padding:10px 15px; border-radius:15px; border:2.5px solid #FFD700; background:#fff; font-weight:bold;";
                if(g === currentGrp) b.style.background = "#FFD700";
                b.onclick = () => { currentGrp = g; initTabs(); renderGrid(); };
                tb.appendChild(b);
            });
        }

        function loadCloud() {
            db.ref('jjvs_v20_cloud').on('value', snap => {
                window.master = snap.val() || {};
                const sd = document.getElementById('target-date').value;
                localAtt = {...(window.master.attendance && window.master.attendance[sd])};
                renderGrid(); renderLeaves();
                if(curDetailSid) refreshModalUI(curDetailSid);
                document.getElementById('login-info').innerText = role === 'admin' ? `${adminInfo.n} 老師 (連線中)` : "學生："+curStudent.name;
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid'); grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles?.[s.id]?.points) || 0;
                const div = document.createElement('div'); div.className = "s-box";
                div.innerHTML = `<div class="s-points">${pts}P</div><div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div><div style="font-weight:bold; font-size:0.95rem;" onclick="openDetail('${s.id}')">${s.name}</div>`;
                grid.appendChild(div);
            });
        }

        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let nextIndex = (statusColors.indexOf(cur) + 1) % statusColors.length;
            let next = statusColors[nextIndex]; localAtt[sid] = next;
            const dot = document.getElementById(`dot-${sid}`);
            dot.className = `s-dot ${next}`; dot.innerText = statusNames[next];
            document.getElementById('save-btn').style.background = "#FF4500";
            if(next === 'bg-late') {
                const curP = window.master.profiles?.[sid]?.points || 0;
                db.ref(`jjvs_v20_cloud/profiles/${sid}/points`).set(Math.max(0, curP - 1));
                addLog(sid, "💀 遲到自動扣 1 點", `系統自動 (${adminInfo.n} 點名)`);
            }
        }

        function syncCloud() {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v20_cloud/attendance/${sd}`).set(localAtt).then(() => alert("已存檔"));
        }

        function openDetail(sid) {
            curDetailSid = sid; document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            if (window.master) refreshModalUI(sid);
        }

        function refreshModalUI(sid) {
            const s = students.find(x => x.id === sid);
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無", tasks: [], logs: [] };
            document.getElementById('m-name').innerText = s.name;
            document.getElementById('m-msg').innerText = prof.msg || "目前無訊息";
            
            const pts = prof.points || 0; const sb = document.getElementById('stamp-card'); sb.innerHTML = "";
            for(let i=0; i<10; i++) sb.innerHTML += `<div class="slot ${i < pts ? 'slot-active' : ''}">${i < pts ? '⭐' : ''}</div>`;
            
            const med = prof.medals || 0; const mb = document.getElementById('medal-card'); mb.innerHTML = "";
            for(let i=0; i<Math.max(med, 3); i++) mb.innerHTML += `<div class="slot ${i < med ? 'slot-active' : ''}">${i < med ? '🏅' : ''}</div>`;
            
            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            const combinedLogs = [...(prof.logs || [])];
            const att = window.master.attendance || {};
            Object.keys(att).forEach(d => { if(att[d][sid]) combinedLogs.push({ time: d, act: "出席登記: "+statusNames[att[d][sid]], reason: "系統存檔", admin: "系統" }); });
            combinedLogs.sort((a,b) => b.time.localeCompare(a.time)).forEach(l => {
                hBox.innerHTML += `<div class="log-row">📅 ${l.time}<br><b>${l.act}</b><br>原因：${l.reason} <span style="float:right; color:#999;">${l.admin || ''}</span></div>`;
            });

            if(role === 'admin') {
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('admin-pts-tool').style.display = 'block';
                document.getElementById('admin-med-tool').style.display = 'block';
                document.getElementById('admin-input-zone').style.display = 'block';
                document.getElementById('admin-only-info').style.display = 'block';
                db.ref(`jjvs_v20_auth/${sid}/p`).once('value', sn => document.getElementById('m-pw').innerText = sn.val() || '未設');
            }
            
            // 檢查學生假單狀態
            const sd = document.getElementById('target-date').value;
            const lKey = sd + "_" + sid;
            const leave = window.master.leaves?.[lKey];
            if(role === 'student' && leave === 'APPROVED') {
                document.getElementById('student-leave-status').innerHTML = `<button class="btn" style="background:var(--safe); color:#fff;" onclick="showGuardPass('${s.name}', '${sd}')">🎟️ 顯示核可外出證</button>`;
            } else if(role === 'student' && leave === 'PENDING') {
                document.getElementById('student-leave-status').innerText = "⏳ 外出申請審核中...";
            }
        }

        function showGuardPass(name, date) {
            document.getElementById('pass-name').innerText = name;
            document.getElementById('pass-date').innerText = date;
            document.getElementById('pass-admin').innerText = adminInfo.n || '校方審核';
            document.getElementById('pass-screen').style.display = 'block';
        }

        function applyLeave() {
            const r = prompt("請輸入外出原因："); if(!r) return;
            const sd = document.getElementById('target-date').value;
            const lKey = sd + "_" + curStudent.id;
            db.ref(`jjvs_v20_cloud/leaves/${lKey}`).set("PENDING");
            db.ref(`jjvs_v20_cloud/profiles/${curStudent.id}/msg`).set(`⚠️ 提出外出申請：${r}`);
            alert("已提交申請，請洽導師審核。");
        }

        function renderLeaves() {
            const box = document.getElementById('leave-list'); box.innerHTML = "";
            const leaves = window.master.leaves || {};
            const sd = document.getElementById('target-date').value;
            let count = 0;
            students.filter(s => s.group === currentGrp).forEach(s => {
                const lKey = sd + "_" + s.id;
                if(leaves[lKey] === 'PENDING') {
                    count++;
                    box.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;"><span>🚶 ${s.name} 申請外出</span><button class="btn btn-mini" style="background:var(--safe); color:#fff; width:auto; margin:0;" onclick="approveLeave('${s.id}')">核可</button></div>`;
                }
            });
            if(count === 0) box.innerText = "今日目前無外出申請";
        }

        function approveLeave(sid) {
            const sd = document.getElementById('target-date').value;
            const lKey = sd + "_" + sid;
            db.ref(`jjvs_v20_cloud/leaves/${lKey}`).set("APPROVED");
            addLog(sid, "✅ 核可第八節外出", `核可人：${adminInfo.n}`);
        }

        function adj(type, v) {
            const r = prompt("請輸入原因："); if(!r) return;
            const path = type === 'p' ? 'points' : 'medals';
            const cur = parseInt(window.master.profiles?.[curDetailSid]?.[path] || 0);
            db.ref(`jjvs_v20_cloud/profiles/${curDetailSid}/${path}`).set(Math.max(0, cur + v));
            addLog(curDetailSid, (type==='p'?'點數':'金牌')+(v>0?'➕ 加':'➖ 扣')+Math.abs(v), r);
        }

        function addLog(sid, act, reason) {
            const time = new Date().toISOString().split('T')[0] + " " + new Date().toTimeString().slice(0,5);
            const logs = window.master.profiles?.[sid]?.logs || [];
            logs.push({ time, act, reason, admin: adminInfo.n });
            db.ref(`jjvs_v20_cloud/profiles/${sid}/logs`).set(logs);
        }

        function openSetup() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('setup-modal').style.display = 'block';
            renderAdminList();
        }

        function addTeacher() {
            const n = document.getElementById('new-t-name').value;
            const a = document.getElementById('new-t-acc').value;
            const p = document.getElementById('new-t-pw').value;
            const c = document.getElementById('new-t-class').value;
            if(!n || !a || !p) return alert("請填寫完整");
            db.ref(`jjvs_v20_admins/${a}`).set({ n: n, p: CryptoJS.SHA256(p).toString(), cls: c }).then(() => {
                alert("教師帳號已建立"); renderAdminList();
            });
        }

        function renderAdminList() {
            const box = document.getElementById('teacher-list'); box.innerHTML = "讀取中...";
            db.ref('jjvs_v20_admins').once('value', sn => {
                const data = sn.val(); box.innerHTML = "";
                for(let acc in data) {
                    box.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:5px;">${data[acc].n} (${acc}) - 管理: ${data[acc].cls} <button onclick="delAdmin('${acc}')">刪除</button></div>`;
                }
            });
        }
        function delAdmin(acc) { if(confirm("刪除？")) db.ref(`jjvs_v20_admins/${acc}`).remove().then(renderAdminList); }

        function redeem() {
            const p = window.master.profiles?.[curDetailSid]?.points || 0;
            if(p >= 5) {
                const m = window.master.profiles?.[curDetailSid]?.medals || 0;
                db.ref(`jjvs_v20_cloud/profiles/${curDetailSid}`).update({ points: p-5, medals: m+1 });
                addLog(curDetailSid, "🎟️ 點數換金牌", "自動兌換 (5星)");
            } else alert("點數不足");
        }

        function updateMsg() { db.ref(`jjvs_v20_cloud/profiles/${curDetailSid}/msg`).set(document.getElementById('t-msg').value); alert("已發送"); }
        function closeModal() { curDetailSid = null; document.getElementById('overlay').style.display='none'; document.getElementById('modal').style.display='none'; }
    </script>
</body>
</html>
