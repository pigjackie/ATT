    <style>
        :root {
            --royal-gold: #D4AF37;
            --deep-black: #0D0D0D;
            --hall-white: #FFFFFF;
            --present: #27AE60;
            --late: #F39C12;
            --absent: #C0392B;
            --leave: #2980B9;
        }

        body { 
            background-color: #121212;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-family='serif' font-size='20' fill='%23d4af37' opacity='0.1'%3E𝄞%3C/text%3E%3Ctext x='50' y='80' font-family='serif' font-size='15' fill='%23d4af37' opacity='0.1'%3E♫%3C/text%3E%3Ctext x='80' y='40' font-family='serif' font-size='18' fill='%23d4af37' opacity='0.1'%3E♬%3C/text%3E%3Ctext x='30' y='90' font-family='serif' font-size='25' fill='%23d4af37' opacity='0.08'%3E🎹%3C/text%3E%3Ctext x='70' y='20' font-family='serif' font-size='20' fill='%23d4af37' opacity='0.05'%3E🎻%3C/text%3E%3C/svg%3E");
            color: #333; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; min-height: 100vh;
        }

        /* 滿版玻璃門禁 */
        #gate-screen { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #2c3e50 0%, #000 100%);
            position: relative; overflow: hidden; width: 100%;
        }

        .gate-card { 
            background: rgba(255, 255, 255, 0.98); padding: 50px 30px; border-radius: 50px;
            width: 88%; max-width: 400px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 4px solid var(--royal-gold); z-index: 10;
        }

        /* 全版渲染介面 */
        #app-screen { display: none; width: 100%; min-height: 100vh; }
        
        header { 
            background: linear-gradient(to bottom, #1a1a1a, #000); color: var(--royal-gold); 
            padding: 30px 20px; text-align: center; border-radius: 0 0 50px 50px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 100;
        }

        /* 絕對質感 1x3 網格 */
        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 12px; padding: 15px; box-sizing: border-box; width: 100%;
        }
        .s-box { 
            background: #fff; border-radius: 25px; padding: 20px 5px; 
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border: 1px solid rgba(212,175,55,0.3); position: relative;
        }
        .s-dot { 
            aspect-ratio: 1/1; width: 85%; max-width: 65px; margin: 0 auto 10px;
            border-radius: 22px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: 900; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .s-name { font-weight: bold; font-size: 0.95rem; color: #1a1a1a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .s-points { position: absolute; top: -8px; right: -8px; background: var(--accent); color: #fff; font-size: 0.75rem; padding: 4px 10px; border-radius: 15px; font-weight: bold; border: 2px solid #fff; }

        /* 外出查驗畫面 (滿版) */
        #pass-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--present); z-index: 5000; text-align: center; color: #fff;
        }

        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 95%; max-width: 500px; background: #fff; border-radius: 45px; padding: 30px; 
            z-index: 1001; box-shadow: 0 40px 150px rgba(0,0,0,0.8); max-height: 90vh; overflow-y: auto;
        }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; backdrop-filter: blur(10px); }

        .btn { width: 100%; padding: 18px; margin-top: 15px; border-radius: 22px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-gold { background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); color: #fff; box-shadow: 0 10px 20px rgba(212,175,55,0.4); }
        .btn-dark { background: #000; color: #fff; border: 2px solid var(--royal-gold); }
        
        .section-title { font-size: 1.2rem; font-weight: bold; color: #000; border-left: 8px solid var(--royal-gold); padding-left: 15px; margin: 25px 0 15px 0; text-align: left; }
        .log-row { background: #f9f9f9; border-radius: 20px; padding: 15px; margin-bottom: 10px; font-size: 0.9rem; border-left: 5px solid var(--royal-gold); }
        
        .slot { width: 38px; height: 38px; border-radius: 50%; background: #eee; display: inline-flex; align-items: center; justify-content: center; margin: 4px; border: 1px dashed #ccc; font-size: 1.3rem; }
        .slot-active { background: #fff; border: 2.5px solid var(--royal-gold); box-shadow: 0 0 15px rgba(212,175,55,0.5); }

        input, select, textarea { width: 100%; padding: 16px; border-radius: 18px; border: 1.5px solid #ddd; margin-bottom: 15px; font-size: 1.1rem; box-sizing: border-box; outline: none; }
        .tab-btn { white-space: nowrap; padding: 15px 25px; border-radius: 30px; border: none; background: #fff; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tab-btn.active { background: var(--royal-gold); color: #fff; transform: scale(1.05); }
    </style>
</head>

    <div id="gate-screen">

            <p style="color:var(--royal-gold); font-weight:bold; font-size: 1.1rem; margin: 5px 0 35px 0;">ROYAL MASTER HUB</p>
            <input type="text" id="login-acc" placeholder="帳號或學生姓名">
            <input type="password" id="login-pw" placeholder="密碼 (初始 0000)">
            <button class="btn btn-gold" onclick="doAuth()">登入管理中心</button>
            <p style="font-size:0.8rem; color:#aaa; margin-top:25px;">藝術、榮譽、與數據管理</p>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <h2 style="margin:0; letter-spacing: 2px;">🏛️ 莊敬音樂科教務總部</h2>
            <div id="login-info" style="font-size:0.9rem; margin-top:12px; font-weight:bold; background:rgba(212,175,55,0.2); display:inline-block; padding:5px 20px; border-radius:25px;">系統已就緒</div>
            <div style="display:flex; justify-content:center; gap:12px; margin-top:20px;">

        <div id="admin-view" style="display:none; padding-bottom: 100px;">

        // 🟢 登入執行 (優先處理蕭旭成老師)
        function doAuth() {
            const acc = document.getElementById('login-acc').value.trim();
            const pw = document.getElementById('login-pw').value.trim();

            // 🔴 修正：最高權限判定 (第一順位)
            if(acc === MASTER_NAME && pw === MASTER_PIN) {
                role = 'admin'; adminInfo = { n: '蕭旭成', cls: 'ALL' };
                setLogin('admin', null, '蕭旭成', 'ALL'); start();
                return;
            }

            // 2. 教師帳號判定 (第二順位)
            const pwHash = CryptoJS.SHA256(pw).toString();
            db.ref(`jjvs_v23_admins/${acc}`).once('value', sn => {
                const data = sn.val();
                if(data && pwHash === data.p) {
                    role = 'admin'; adminInfo = { n: data.n, cls: data.cls };
                    setLogin('admin', null, data.n, data.cls); start();
                } else {
                    // 3. 學生判定 (第三順位)
                    const f = students.find(s => s.name.includes(acc));
                    if(f) {
                        db.ref(`jjvs_v23_auth/${f.id}`).once('value', sn2 => {
                            const d = sn2.val() || {p: '0000'};
                            if(pw === d.p) {
                                if(pw === '0000') {
                                    const np = prompt("安全要求：請設定您的個人查詢密碼");
                                    if(!np || np === '0000') return alert("修改失敗");
                                    db.ref(`jjvs_v23_auth/${f.id}`).set({p: np});
                                    alert("修改成功，請用新密碼重新登入");
                                } else {
                                    curStudent = f; role = 'student'; setLogin('student', f.id); start();
                                }
                            } else alert("密碼錯誤");
                        });
                    } else alert("查無此帳號或學生名單");
                }
            });
        }

        function setLogin(r, sid, n, cls) {
            localStorage.setItem('jjvs_role', r); localStorage.setItem('jjvs_sid', sid);
            localStorage.setItem('jjvs_admin_name', n); localStorage.setItem('jjvs_admin_cls', cls);
        }

        window.onload = () => {
            const r = localStorage.getItem('jjvs_role');
            if(r === 'admin') {
                role = 'admin'; adminInfo = { n: localStorage.getItem('jjvs_admin_name'), cls: localStorage.getItem('jjvs_admin_cls') };
                start();
            } else if(r === 'student') {
                curStudent = students.find(s => s.id === localStorage.getItem('jjvs_sid'));
                role = 'student'; start();
            }
        };

        function logout() { localStorage.clear(); location.reload(); }

        function start() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('target-date').value = new Date().toISOString().split('T')[0];
            if(role === 'admin') {
                document.getElementById('admin-view').style.display = 'block';
                if(adminInfo.n === '蕭旭成') document.getElementById('admin-setup-btn').style.display = 'inline-block';
                initTabs();
            } else {
                document.getElementById('student-view').style.display = 'block';
                document.getElementById('welcome-name').innerText = curStudent.name + " 同學";
                openDetail(curStudent.id);
            }
            loadCloud();
        }

        function initTabs() {
            const tb = document.getElementById('tabs'); tb.innerHTML = "";
            const grps = adminInfo.cls === 'ALL' ? ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"] : [adminInfo.cls];
            currentGrp = grps[0];
            grps.forEach(g => {
                const b = document.createElement('button'); b.innerText = g;
                b.className = `tab-btn ${g === currentGrp ? 'active' : ''}`;
                b.onclick = () => { currentGrp = g; Array.from(tb.children).forEach(c=>c.classList.remove('active')); b.classList.add('active'); renderGrid(); };
                tb.appendChild(b);
            });
        }

        function loadCloud() {
            db.ref('jjvs_v23_cloud').on('value', snap => {
                window.master = snap.val() || {};
                const sd = document.getElementById('target-date').value;
                localAtt = {...(window.master.attendance && window.master.attendance[sd])};
                renderGrid(); renderLeaves();
                if(curDetailSid) refreshModalUI(curDetailSid);
                document.getElementById('login-info').innerText = role === 'admin' ? `${adminInfo.n} 老師 (皇家連線中)` : "音樂生："+curStudent.name;
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid'); grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles?.[s.id]?.points) || 0;
                const div = document.createElement('div'); div.className = "s-box";
                div.innerHTML = `<div class="s-points">${pts}P</div><div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div><div class="s-name" onclick="openDetail('${s.id}')">${s.name}</div>`;
                grid.appendChild(div);
            });
        }

        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let nextIndex = (statusColors.indexOf(cur) + 1) % statusColors.length;
            let next = statusColors[nextIndex]; localAtt[sid] = next;
            const dot = document.getElementById(`dot-${sid}`);
            dot.className = `s-dot ${next}`; dot.innerText = statusNames[next];
            if(next === 'bg-late') {
                const curP = window.master.profiles?.[sid]?.points || 0;
                db.ref(`jjvs_v23_cloud/profiles/${sid}/points`).set(Math.max(0, curP - 1));
                addLog(sid, "💀 遲到自動扣點", `[系統處置 - ${adminInfo.n} 點名]`);
            }
        }

        function syncCloud() {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v23_cloud/attendance/${sd}`).set(localAtt).then(() => alert("點名數據已同步雲端"));
        }

        function openDetail(sid) {
            curDetailSid = sid; document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            if (window.master) refreshModalUI(sid);
        }

        function refreshModalUI(sid) {
            const s = students.find(x => x.id === sid);
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無", logs: [] };
            document.getElementById('m-name').innerText = s.name;
            document.getElementById('m-msg').innerText = prof.msg || "目前無導師訊息";
            
            // 10格星星
            const pts = prof.points || 0; const sb = document.getElementById('stamp-card'); sb.innerHTML = "";
            for(let i=0; i<10; i++) sb.innerHTML += `<div class="slot ${i < pts ? 'slot-active' : ''}">${i < pts ? '⭐' : ''}</div>`;
            
            // 金牌
            const med = prof.medals || 0; const mb = document.getElementById('medal-card'); mb.innerHTML = "";
            for(let i=0; i<Math.max(med, 5); i++) mb.innerHTML += `<div class="slot ${i < med ? 'slot-active' : ''}">${i < med ? '🏅' : ''}</div>`;
            
            // 具名歷史日誌
            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            const combinedLogs = [...(prof.logs || [])];
            const att = window.master.attendance || {};
            Object.keys(att).forEach(d => { if(att[d][sid]) combinedLogs.push({ time: d+" 00:00", act: "狀態: "+statusNames[att[d][sid]], reason: "點名登記", admin: "系統" }); });
            combinedLogs.sort((a,b) => b.time.localeCompare(a.time)).forEach(l => {
                hBox.innerHTML += `<div class="log-row">🕒 ${l.time}<br><b>${l.act}</b><br>原因：${l.reason} <span style="float:right; color:#999;">by ${l.admin || ''}</span></div>`;
            });

            if(role === 'admin') {
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('admin-pts-tool').style.display = 'block';
                document.getElementById('admin-med-tool').style.display = 'block';
                document.getElementById('admin-msg-zone').style.display = 'block';
                document.getElementById('admin-only-info').style.display = 'block';
                db.ref(`jjvs_v23_auth/${sid}/p`).once('value', sn => document.getElementById('m-pw').innerText = sn.val() || '0000');
            }
            
            const sd = document.getElementById('target-date').value;
            const leave = window.master.leaves?.[sd + "_" + sid];
            if(role === 'student' && leave === 'APPROVED') {
                document.getElementById('student-leave-status').innerHTML = `<button class="btn btn-gold" onclick="showPass('${s.name}', '${sd}')">🎟️ 點此開啟准予外出通行證</button>`;
            } else if(role === 'student' && leave === 'PENDING') {
                document.getElementById('student-leave-status').innerText = "⏳ 外出審核中...";
            }
        }

        function showPass(n, d) {
            document.getElementById('pass-name').innerText = n;
            document.getElementById('pass-date').innerText = d;
            document.getElementById('pass-admin').innerText = adminInfo.n;
            document.getElementById('pass-screen').style.display = 'block';
        }

        function applyLeave() {
            const r = prompt("請輸入外出原因 (例如：術科補習、身體不適)："); if(!r) return;
            const lKey = document.getElementById('target-date').value + "_" + curStudent.id;
            db.ref(`jjvs_v23_cloud/leaves/${lKey}`).set("PENDING");
            db.ref(`jjvs_v23_cloud/profiles/${curStudent.id}/msg`).set(`🚶 申請外出中：${r}`);
            alert("已成功送出申請");
        }

        function renderLeaves() {
            const box = document.getElementById('leave-list'); box.innerHTML = "";
            const leaves = window.master.leaves || {};
            const sd = document.getElementById('target-date').value;
            let count = 0;
            students.filter(s => s.group === currentGrp || adminInfo.cls === 'ALL').forEach(s => {
                if(leaves[sd+"_"+s.id] === 'PENDING') {
                    count++;
                    box.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:12px; align-items:center;"><span>🚶 <b>${s.name}</b> 申請外出</span><button class="btn" style="width:70px; height:35px; padding:0; background:var(--present); color:#fff; border-radius:10px;" onclick="approveLeave('${s.id}')">核可</button></div>`;
                }
            });
            if(count === 0) box.innerText = "今日無任何外出申請。";
        }

        function approveLeave(sid) {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v23_cloud/leaves/${sd+"_"+sid}`).set("APPROVED");
            addLog(sid, "✅ 核可第八節外出", `[${adminInfo.n}] 審核通過`);
        }

        function adj(type, v) {
            const r = prompt("請輸入異動原因："); if(!r) return;
            const path = type === 'p' ? 'points' : 'medals';
            const cur = parseInt(window.master.profiles?.[curDetailSid]?.[path] || 0);
            db.ref(`jjvs_v23_cloud/profiles/${curDetailSid}/${path}`).set(Math.max(0, cur + v));
            addLog(curDetailSid, (type==='p'?'點數':'金牌')+(v>0?'➕加':'➖扣')+Math.abs(v), r);
        }

        function addLog(sid, act, reason) {
            const time = new Date().toISOString().split('T')[0] + " " + new Date().toTimeString().slice(0,5);
            const logs = window.master.profiles?.[sid]?.logs || [];
            logs.push({ time, act, reason, admin: adminInfo.n });
            db.ref(`jjvs_v23_cloud/profiles/${sid}/logs`).set(logs);
        }

        function openSetup() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('setup-modal').style.display = 'block';
            renderAdminList();
        }

        function addTeacher() {
            const n = document.getElementById('new-t-name').value;
            const a = document.getElementById('new-t-acc').value;
            const p = document.getElementById('new-t-pw').value;
            const c = document.getElementById('new-t-class').value;
            if(!n || !a || !p) return alert("請完整填寫欄位");
            db.ref(`jjvs_v23_admins/${a}`).set({ n: n, p: CryptoJS.SHA256(p).toString(), cls: c }).then(() => {
                alert("教師帳號已開通"); renderAdminList();
            });
        }

        function renderAdminList() {
            const box = document.getElementById('teacher-list'); box.innerHTML = "";
            db.ref('jjvs_v23_admins').once('value', sn => {
                const data = sn.val();
                for(let acc in data) {
                    box.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px;"><b>${data[acc].n}</b> (${acc})<br>管轄：${data[acc].cls} <button onclick="delAdmin('${acc}')" style="float:right; color:red; border:none; background:none;">[註銷]</button></div>`;
                }
            });
        }
        function delAdmin(acc) { if(confirm("確定註銷此導師帳號？")) db.ref(`jjvs_v23_admins/${acc}`).remove().then(renderAdminList); }

        function redeem() {
            const p = window.master.profiles?.[curDetailSid]?.points || 0;
            if(p >= 5) {
                const m = window.master.profiles?.[curDetailSid]?.medals || 0;
                db.ref(`jjvs_v23_cloud/profiles/${curDetailSid}`).update({ points: p-5, medals: m+1 });
                addLog(curDetailSid, "🎟️ 星星換金牌", "系統自動兌換");
            } else alert("還差 "+(5-p)+" 點星星喔！");
        }

        function updateMsg() { db.ref(`jjvs_v23_cloud/profiles/${curDetailSid}/msg`).set(document.getElementById('t-msg').value); alert("訊息已送出"); }
        function closeModal() { curDetailSid = null; document.getElementById('overlay').style.display='none'; document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    </script>
</body>
</html>
