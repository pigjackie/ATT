    <style>
        :root { --primary: #FFD700; --bg: #FFF9C4; --text: #333; --accent: #FF4500; }
        body { background: var(--bg); color: var(--text); font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; }
        
        #gate-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--primary), #FFB300); }
        .gate-card { background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); width: 85%; max-width: 380px; text-align: center; }

        #app-screen { display: none; padding: 10px; }
        header { text-align: center; background: var(--primary); padding: 20px; border-radius: 0 0 40px 40px; margin: -10px -10px 15px -10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* 1x3 網格 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .s-box { background: #fff; border-radius: 18px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        
        /* 狀態方塊嵌入文字 */
        .s-dot { 
            width: 55px; height: 55px; border-radius: 15px; margin: 0 auto 10px; 
            border: 3px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .s-points { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        /* 視覺化集點卡 */
        .stamp-card { 
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; 
            background: #fdf2e9; padding: 15px; border-radius: 15px; border: 2px solid #FFB74D; margin-top: 10px;
        }
        .stamp-slot { 
            width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.05); 
            border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .stamp-active { background: #fff; border: 2px solid var(--primary); animation: pop 0.3s ease; }

        @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }

        /* 模組與按鈕 */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 450px; background: #fff; border-radius: 30px; padding: 25px; z-index: 1001; box-shadow: 0 25px 70px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; }
        
        .btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: #000; color: var(--primary); position: sticky; bottom: 15px; z-index: 100; border: 2px solid var(--primary); }
        .btn-gold { background: var(--primary); color: #000; }
        .btn-reset { background: #f5f5f5; color: #666; border: 1px solid #ccc; font-size: 0.85rem; padding: 8px; }

        .bg-present { background:#2ecc71; } .bg-late { background:#f1c40f; } .bg-late-1 { background:#e67e22; } .bg-absent { background:#e74c3c; } .bg-leave { background:#3498db; }
        .section-title { font-size: 1.1rem; font-weight: bold; border-left: 5px solid var(--primary); padding-left: 10px; margin: 20px 0 10px 0; }
    </style>
</head>

        function auth(type) {
            if (type === 'admin') {
                const p = prompt("授權碼：");
                if (btoa(p) === "MDkwMg==") { role = 'admin'; start(); }
            } else {
                const name = prompt("姓名：");
                const f = students.find(s => s.name.includes(name));
                if (!f) return alert("名單無此人");
                db.ref(`jjvs_v10_auth/${f.id}`).once('value', snap => {
                    const d = snap.val();
                    if (!d) {
                        const np = prompt("設定密碼：");

                        if (btoa(cp) === d.p) { curStudent = f; role = 'student'; start(); }
                    }
                });
            }
        }

        function start() {
            document.getElementById('gate-screen').style.display = 'none';

            else { openDetail(curStudent.id); }
            loadCloud();
        }

        function initTabs() {
            const tabBox = document.getElementById('tabs'); tabBox.innerHTML = "";
            classNames.forEach(g => {
                const b = document.createElement('button');
                b.style.cssText = "white-space:nowrap; padding:10px 20px; border-radius:20px; border:2px solid #FFD700; background:#fff; font-weight:bold;";
                if(g === currentGrp) b.style.background = "#FFD700";
                b.innerText = g;
                b.onclick = () => { currentGrp = g; initTabs(); renderGrid(); };
                tabBox.appendChild(b);
            });
        }

        function loadCloud() {
            selDate = document.getElementById('target-date').value;
            db.ref('jjvs_v10_cloud').on('value', snap => {
                window.master = snap.val() || {};
                localAtt = {...(window.master.attendance && window.master.attendance[selDate])};
                renderGrid();
                if(role === 'student' && document.getElementById('modal').style.display === 'block') openDetail(curStudent.id);
            });
        }

            if (role !== 'admin') return;

            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles && window.master.profiles[s.id] && window.master.profiles[s.id].points) || 0;
                const div = document.createElement('div');
                div.className = "s-box";
                div.innerHTML = `
                    <div class="s-points">${pts}P</div>
                    <div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div>
                    <div style="font-weight:bold; font-size:1.1rem;" onclick="openDetail('${s.id}')">${s.name}</div>
                `;
                grid.appendChild(div);
            });
        }

        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let next = statusColors[(statusColors.indexOf(cur) + 1) % statusColors.length];
            localAtt[sid] = next;
            const dot = document.getElementById(`dot-${sid}`);
            dot.className = `s-dot ${next}`;
            dot.innerText = statusNames[next];
            document.getElementById('save-btn').style.background = "#FF4500";
        }

        function syncCloud() {
            db.ref(`jjvs_v10_cloud/attendance/${selDate}`).set(localAtt).then(() => {
                alert("儲存成功"); document.getElementById('save-btn').style.background = "#000";
            });
        }

        function resetToday() {
            if(!confirm("確定要重設本班今日點名為全體出席嗎？(未按下儲存前不會正式生效)")) return;
            students.filter(s => s.group === currentGrp).forEach(s => localAtt[s.id] = 'bg-present');
            renderGrid();
            document.getElementById('save-btn').style.background = "#FF4500";
        }

        function openDetail(sid) {
            const s = students.find(x => x.id === sid);
            document.getElementById('m-name').innerText = s.name;
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無", tasks: [] };
            
            // 視覺化集點卡渲染
            const pts = prof.points || 0;
            document.getElementById('m-medals').innerText = prof.medals || 0;
            const stampCard = document.getElementById('stamp-card'); stampCard.innerHTML = "";
            for(let i=0; i<5; i++) {
                const slot = document.createElement('div');
                slot.className = `stamp-slot ${i < pts ? 'stamp-active' : ''}`;
                slot.innerText = i < pts ? '⭐' : '';
                stampCard.appendChild(slot);
            }
            
            document.getElementById('m-msg').innerText = prof.msg || "無訊息";
            const tList = document.getElementById('m-task-list'); tList.innerHTML = "";
            if(prof.tasks) {
                prof.tasks.forEach((t, i) => {
                    const percent = Math.round((t.cur/t.max)*100);
                    tList.innerHTML += `
                        <div style="margin-bottom:15px; cursor:pointer;" onclick="incTask('${sid}', ${i})">
                            <div style="display:flex; justify-content:space-between;"><strong>${t.name}</strong> <span>${t.cur}/${t.max}</span></div>
                            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                        </div>`;
                });
            } else { tList.innerHTML = "無罰抄任務"; }

            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            const att = window.master.attendance || {};
            Object.keys(att).sort().reverse().forEach(d => {
                if(att[d][sid]) hBox.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #ddd;"><span>📅 ${d}</span><span class="${att[d][sid]}" style="color:#fff; padding:2px 8px; border-radius:5px;">${statusNames[att[d][sid]]}</span></div>`;
            });

            document.getElementById('admin-tools').style.display = role === 'admin' ? 'block' : 'none';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
        }

        function adjustPoints(v) {
            const sid = getSid();
            const cur = parseInt(window.master.profiles[sid]?.points || 0);
            db.ref(`jjvs_v10_cloud/profiles/${sid}/points`).set(cur + v);
        }

        function addNewTask() {
            const n = document.getElementById('t-name').value;
            const m = document.getElementById('t-max').value;
            if(!n || !m) return;
            const sid = getSid();
            const ts = (window.master.profiles && window.master.profiles[sid] && window.master.profiles[sid].tasks) || [];
            ts.push({ name: n, max: m, cur: 0 });
            db.ref(`jjvs_v10_cloud/profiles/${sid}/tasks`).set(ts);
        }

        function incTask(sid, idx) {
            if(role !== 'admin') return;
            const ts = window.master.profiles[sid].tasks;
            if(ts[idx].cur < ts[idx].max) {
                ts[idx].cur = parseInt(ts[idx].cur) + 1;
                db.ref(`jjvs_v10_cloud/profiles/${sid}/tasks`).set(ts);
            }
        }

        function updateInfo() {
            const msg = document.getElementById('t-msg').value;
            db.ref(`jjvs_v10_cloud/profiles/${getSid()}/msg`).set(msg); alert("更新成功");
        }

        function redeem() {
            const sid = getSid();
            const p = parseInt(window.master.profiles[sid]?.points || 0);
            const m = parseInt(window.master.profiles[sid]?.medals || 0);
            if(p >= 5) {
                db.ref(`jjvs_v10_cloud/profiles/${sid}`).update({ points: p-5, medals: m+1 });
                alert("兌換金牌成功！");
            } else { alert("點數不足 5 點喔！"); }
        }

        function getSid() { return students.find(x => x.name === document.getElementById('m-name').innerText).id; }
        function closeModal() { if(role === 'student') return; document.getElementById('overlay').style.display='none'; document.getElementById('modal').style.display='none'; }
    </script>
</body>
</html>
