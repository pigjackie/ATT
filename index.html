        body { background: var(--bg); color: var(--text); font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; }
        
        #gate-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--primary), #FFB300); }
        .gate-card { background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); width: 85%; max-width: 380px; text-align: center; }

        #app-screen { display: none; padding: 10px; min-height: 100vh; }
        header { text-align: center; background: var(--primary); padding: 15px; border-radius: 0 0 40px 40px; margin: -10px -10px 10px -10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        
        .filter-bar { background: #fff; padding: 10px; border-radius: 15px; margin-bottom: 10px; display: flex; gap: 8px; }
        .search-input { flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid #ddd; font-size: 1rem; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 5px; }
        .s-box { background: #fff; border-radius: 18px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1.5px solid #eee; position: relative; }
        .s-dot { width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 8px; border: 3px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: bold; color: #fff; }
        .s-points { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #fff; font-size: 0.75rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        .dialog-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .dialog-box { background: #fff; width: 85%; max-width: 350px; padding: 25px; border-radius: 25px; text-align: center; }
        .dialog-box input, .dialog-box textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }

        .icon-box { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; background: #fdf2e9; padding: 12px; border-radius: 20px; border: 2px solid #FFB74D; margin-top: 5px; }
        .slot { width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.08); border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .slot-active { background: #fff; border: 2px solid var(--primary); }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 94%; max-width: 480px; background: #fff; border-radius: 30px; padding: 20px; z-index: 1001; box-shadow: 0 25px 70px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; }
        
        .btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--dark); color: var(--primary); border: 2.5px solid var(--primary); }
        .btn-gold { background: var(--primary); color: #000; }
        .btn-adj { width: 45px; height: 45px; margin: 5px; border-radius: 12px; font-size: 1.2rem; display: inline-flex; align-items: center; justify-content: center; }

        .bg-present { background:#2ecc71; } .bg-late { background:#f1c40f; } .bg-absent { background:#e74c3c; } .bg-leave { background:#3498db; }
        .section-title { font-size: 1.1rem; font-weight: bold; border-left: 5px solid var(--primary); padding-left: 10px; margin: 15px 0 8px 0; text-align: left; }
        .log-row { background: #f8f8f8; border-radius: 12px; padding: 10px; margin-bottom: 6px; font-size: 0.8rem; border-left: 4px solid #ddd; line-height: 1.4; position: relative; }
        .admin-badge { background: #eee; color: #666; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; position: absolute; right: 10px; top: 10px; }

                                localStorage.setItem('jjvs_role', 'admin'); localStorage.setItem('jjvs_admin_name', data.n); start();
                            } else alert("密碼錯誤");
                        } else { // 註冊模式
                            if(CryptoJS.SHA256(pass).toString() === AUTH_CODE_HASH) { // 用 0902 當密碼觸發註冊
                                openDialog("註冊管理帳號", '<input type="text" placeholder="您的姓名(如:蕭老師)"><input type="text" placeholder="自訂登入帳號"><input type="password" placeholder="自訂登入密碼">', (rv) => {
                                    if(!rv[0] || !rv[1] || !rv[2]) return;
                                    db.ref(`jjvs_v19_admins/${rv[1]}`).set({ n: rv[0], p: CryptoJS.SHA256(rv[2]).toString() });
                                    alert("註冊成功，請重新登入");
                                });
                            } else alert("帳號不存在或授權碼錯誤");
                        }
                    });
                });
            } else {
                openDialog("學生看板", '<input type="text" id="p-name" placeholder="請輸入姓名">', (v) => {
                    const f = students.find(s => s.name.includes(v[0]));
                    if (!f) return alert("查無此人");
                    db.ref(`jjvs_v19_auth/${f.id}`).once('value', sn => {
                        const d = sn.val();
                        if (!d) {
                            openDialog("首次登入", '<input type="text" id="np" placeholder="設定查詢密碼">', (v2) => {
                                db.ref(`jjvs_v19_auth/${f.id}`).set({ p: v2[0] });
                                curStudent = f; role = 'student'; localStorage.setItem('jjvs_role', 'student'); localStorage.setItem('jjvs_sid', f.id); start();
                            });
                        } else {
                            openDialog("身份驗證", '<input type="password" id="cp" placeholder="輸入密碼">', (v3) => {
                                if (v3[0] === d.p) { curStudent = f; role = 'student'; localStorage.setItem('jjvs_role', 'student'); localStorage.setItem('jjvs_sid', f.id); start(); }
                                else alert("錯誤");
                            });
                        }
                    });
                });
            }
        }

        function clearLogin() { localStorage.clear(); location.reload(); }
        function start() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('target-date').value = new Date().toISOString().split('T')[0];
            loadCloud();
            if (role === 'admin') { document.getElementById('admin-panel').style.display = 'block'; initTabs(); }
            else { document.getElementById('student-home-view').style.display = 'block'; openDetail(curStudent.id); }
        }

        function initTabs() {
            const tb = document.getElementById('tabs'); tb.innerHTML = "";
            ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"].forEach(g => {
                const b = document.createElement('button');
                b.style.cssText = "white-space:nowrap; padding:10px 15px; border-radius:15px; border:1.5px solid #FFD700; background:#fff; font-weight:bold;";
                if(g === currentGrp) b.style.background = "#FFD700";
                b.innerText = g; b.onclick = () => { currentGrp = g; initTabs(); renderGrid(); };
                tb.appendChild(b);
            });
        }

        function loadCloud() {
            db.ref('jjvs_v19_cloud').on('value', snap => {
                window.master = snap.val() || {};
                const sd = document.getElementById('target-date').value;
                localAtt = {...(window.master.attendance && window.master.attendance[sd])};
                renderGrid();
                if(curDetailSid) refreshModalUI(curDetailSid);
                document.getElementById('login-info').innerText = role === 'admin' ? `${curAdminName} 管理模式` : "學生："+curStudent.name;
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid'); grid.innerHTML = "";
            const kw = document.getElementById('search-box').value;
            students.filter(s => s.group === currentGrp && s.name.includes(kw)).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles?.[s.id]?.points) || 0;
                div = document.createElement('div'); div.className = "s-box";
                div.innerHTML = `<div class="s-points">${pts}P</div><div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div><div style="font-weight:bold; font-size:0.95rem;" onclick="openDetail('${s.id}')">${s.name}</div>`;
                grid.appendChild(div);
            });
        }

        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let nextIndex = (statusColors.indexOf(cur) + 1) % statusColors.length;
            let next = statusColors[nextIndex];
            localAtt[sid] = next;
            const dot = document.getElementById(`dot-${sid}`);
            dot.className = `s-dot ${next}`; dot.innerText = statusNames[next];
            document.getElementById('save-btn').style.background = "#FF4500";
            
            if(next === 'bg-late') {
                const curP = window.master.profiles?.[sid]?.points || 0;
                db.ref(`jjvs_v19_cloud/profiles/${sid}/points`).set(Math.max(0, curP - 1));
                addLog(sid, "💀 遲到自動扣點", `[${curAdminName}] 系統自動處置`);
            }
        }

        function syncCloud() {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v19_cloud/attendance/${sd}`).set(localAtt).then(() => {
                alert("存檔成功"); document.getElementById('save-btn').style.background = "#000";
            });
        }

        function openDetail(sid) {
            curDetailSid = sid; document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            if (window.master) refreshModalUI(sid);
        }

        function refreshModalUI(sid) {
            const s = students.find(x => x.id === sid);
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無", tasks: [], logs: [] };
            document.getElementById('m-name').innerText = s.name;
            document.getElementById('m-msg').innerText = prof.msg || "無訊息";
            
            const pts = prof.points || 0; const sb = document.getElementById('stamp-card'); sb.innerHTML = "";
            for(let i=0; i<10; i++) sb.innerHTML += `<div class="slot ${i < pts ? 'slot-active' : ''}">${i < pts ? '⭐' : ''}</div>`;
            
            const med = prof.medals || 0; const mb = document.getElementById('medal-card'); mb.innerHTML = "";
            for(let i=0; i<Math.max(med, 5); i++) mb.innerHTML += `<div class="slot ${i < med ? 'slot-active' : ''}">${i < med ? '🏅' : ''}</div>`;
            
            const tl = document.getElementById('m-task-list'); tl.innerHTML = "";
            if(prof.tasks) {
                prof.tasks.forEach((t, i) => {
                    const p = Math.round((t.cur/t.max)*100);
                    tl.innerHTML += `<div style="background:#eee; padding:10px; border-radius:12px; margin-bottom:5px;"><strong>${t.name} (${t.cur}/${t.max})</strong><div style="height:8px; background:#ddd; border-radius:4px; overflow:hidden;" onclick="incTask('${sid}', ${i})"><div style="width:${p}%; background:var(--primary); height:100%;"></div></div></div>`;
                });
            }

            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            const logs = [...(prof.logs || [])];
            const att = window.master.attendance || {};
            Object.keys(att).forEach(d => { if(att[d][sid]) logs.push({ time: d, act: "狀態: "+statusNames[att[d][sid]], reason: "系統點名" }); });
            logs.sort((a,b) => b.time.localeCompare(a.time)).forEach(l => {
                hBox.innerHTML += `<div class="log-row">📅 ${l.time}<br><b>${l.act}</b><br>原因：${l.reason}<span class="admin-badge">by ${curAdminName || '管理員'}</span></div>`;
            });

            if (role === 'admin') {
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('admin-pts-tool').style.display = 'block';
                document.getElementById('admin-med-tool').style.display = 'block';
                document.getElementById('admin-pw-info').style.display = 'block';
                db.ref(`jjvs_v19_auth/${sid}/p`).once('value', sn => document.getElementById('m-pw').innerText = sn.val() || '未設');
            }
        }

        function addLog(sid, act, reason) {
            const time = new Date().toISOString().split('T')[0] + " " + new Date().toTimeString().slice(0,5);
            const logs = window.master.profiles?.[sid]?.logs || [];
            logs.push({ time, act, reason, admin: curAdminName });
            db.ref(`jjvs_v19_cloud/profiles/${sid}/logs`).set(logs);
        }

        function askAdj(type, v) {
            openDialog("變更原因", `<input type="text" id="r-text" placeholder="請註明原因與日期">`, (vals) => {
                if(!vals[0]) return alert("必填");
                const cur = type === 'p' ? (window.master.profiles?.[curDetailSid]?.points || 0) : (window.master.profiles?.[curDetailSid]?.medals || 0);
                const path = type === 'p' ? 'points' : 'medals';
                const actStr = (type === 'p' ? "點數 " : "金牌 ") + (v > 0 ? "➕ ":"➖ ")+Math.abs(v);
                db.ref(`jjvs_v19_cloud/profiles/${curDetailSid}/${path}`).set(Math.max(0, cur + v));
                addLog(curDetailSid, actStr, `[${curAdminName}] ${vals[0]}`);
            });
        }

        function redeem() {
            const p = window.master.profiles?.[curDetailSid]?.points || 0;
            if(p >= 5) {
                const m = window.master.profiles?.[curDetailSid]?.medals || 0;
                db.ref(`jjvs_v19_cloud/profiles/${curDetailSid}`).update({ points: p-5, medals: m+1 });
                addLog(curDetailSid, "🎟️ 兌換金牌", `[${curAdminName}] 消耗 5 點星星`);
            } else alert("不夠");
        }

        function addTask() {
            const n = document.getElementById('t-name').value; const m = document.getElementById('t-max').value;
            if(!n || !m) return;
            const ts = (window.master.profiles?.[curDetailSid]?.tasks) || [];
            ts.push({ name: n, max: m, cur: 0 }); db.ref(`jjvs_v19_cloud/profiles/${curDetailSid}/tasks`).set(ts);
            addLog(curDetailSid, "⚖️ 指派處罰", `[${curAdminName}] ${n}`);
        }

        function incTask(sid, idx) {
            if(role !== 'admin') return; const ts = window.master.profiles[sid].tasks;
            if(ts[idx].cur < ts[idx].max) { ts[idx].cur = parseInt(ts[idx].cur) + 1; db.ref(`jjvs_v19_cloud/profiles/${sid}/tasks`).set(ts); }
        }

        function updateMsg() {
            db.ref(`jjvs_v19_cloud/profiles/${curDetailSid}/msg`).set(document.getElementById('t-msg').value); alert("已送出");
        }

        function closeModal() { curDetailSid = null; document.getElementById('overlay').style.display='none'; document.getElementById('modal').style.display='none'; }
        
        function exportExcel() {
            const exp = []; const att = window.master.attendance || {};
            Object.keys(att).sort().reverse().forEach(d => {
                students.forEach(s => {
                    if (att[d][s.id]) exp.push({ "日期": d, "班級": s.group, "姓名": s.name, "狀態": statusNames[att[d][s.id]] });
                });
            });
            const ws = XLSX.utils.json_to_sheet(exp); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "總表"); XLSX.writeFile(wb, `莊敬音樂科紀錄.xlsx`);
        }
    </script>
</body>
</html>
