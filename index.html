    <style>
        :root { --primary: #FFD700; --bg: #FFF9C4; --text: #333; --accent: #FF4500; --danger: #ff4d4f; }
        body { background: var(--bg); color: var(--text); font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; }
        
        #gate-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--primary), #FFB300); }
        .gate-card { background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); width: 85%; max-width: 380px; text-align: center; }

        #app-screen { display: none; padding: 10px; min-height: 100vh; }
        header { text-align: center; background: var(--primary); padding: 20px; border-radius: 0 0 40px 40px; margin: -10px -10px 15px -10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .s-box { background: #fff; border-radius: 18px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        
        .s-dot { 
            width: 55px; height: 55px; border-radius: 15px; margin: 0 auto 10px; 
            border: 3px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .s-points { position: absolute; top: -5px; right: -5px; background: var(--accent); color: #fff; font-size: 0.75rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        /* 圖示盒樣式 */
        .icon-box { 
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; background: #fdf2e9; 
            padding: 15px; border-radius: 20px; border: 2px solid #FFB74D; margin-top: 10px;
        }
        .slot { width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.1); border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; transition: 0.3s; }
        .slot-active { background: #fff; border: 2px solid var(--primary); transform: scale(1.05); }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 450px; background: #fff; border-radius: 30px; padding: 25px; z-index: 1001; box-shadow: 0 25px 70px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; box-sizing: border-box; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; }
        
        .btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-save { background: #000; color: var(--primary); position: sticky; bottom: 15px; z-index: 100; border: 2px solid var(--primary); }
        .btn-gold { background: var(--primary); color: #000; }
        .btn-adj { width: 45px; height: 45px; padding: 0; margin: 5px; border-radius: 10px; font-size: 1.2rem; }

        .bg-present { background:#2ecc71; } .bg-late { background:#f1c40f; } .bg-absent { background:#e74c3c; } .bg-leave { background:#3498db; }
        .section-title { font-size: 1.1rem; font-weight: bold; border-left: 5px solid var(--primary); padding-left: 10px; margin: 20px 0 10px 0; display: block; text-align: left; }
        .log-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 0.85rem; color: #666; }
        .pw-box { background: #f0f0f0; color: #000; padding: 5px 10px; border-radius: 8px; font-family: monospace; font-weight: bold; }

        function initTabs() {
            const tb = document.getElementById('tabs'); tb.innerHTML = "";
            ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"].forEach(g => {
                const b = document.createElement('button');
                b.style.cssText = "white-space:nowrap; padding:10px 20px; border-radius:20px; border:2px solid #FFD700; background:#fff; font-weight:bold;";
                if(g === currentGrp) b.style.background = "#FFD700";
                b.innerText = g; b.onclick = () => { currentGrp = g; initTabs(); renderGrid(); };
                tb.appendChild(b);
            });
        }

        function loadCloud() {
            db.ref('jjvs_v14_cloud').on('value', snap => {
                window.master = snap.val() || {};
                const sd = document.getElementById('target-date').value;
                localAtt = {...(window.master.attendance && window.master.attendance[sd])};
                renderGrid();
                if(curDetailSid) refreshModalUI(curDetailSid);
                document.getElementById('login-info').innerText = role === 'admin' ? "管理員模式 (連線中)" : "學生："+curStudent.name;
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid'); grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles?.[s.id]?.points) || 0;
                const div = document.createElement('div'); div.className = "s-box";
                div.innerHTML = `<div class="s-points">${pts}P</div><div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div><div style="font-weight:bold; font-size:1.1rem;" onclick="openDetail('${s.id}')">${s.name}</div>`;
                grid.appendChild(div);
            });
        }

        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let next = statusColors[(statusColors.indexOf(cur) + 1) % statusColors.length];
            localAtt[sid] = next; const dot = document.getElementById(`dot-${sid}`);
            dot.className = `s-dot ${next}`; dot.innerText = statusNames[next];
            document.getElementById('save-btn').style.background = "#FF4500";
        }

        function syncCloud() {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v14_cloud/attendance/${sd}`).set(localAtt).then(() => {
                alert("已存雲端"); document.getElementById('save-btn').style.background = "#000";
            });
        }

        function openDetail(sid) {
            curDetailSid = sid; document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            if (window.master) refreshModalUI(sid);
        }

        function refreshModalUI(sid) {
            const s = students.find(x => x.id === sid);
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無", tasks: [], logs: [] };
            document.getElementById('m-name').innerText = s.name;
            document.getElementById('m-msg').innerText = prof.msg || "無訊息";
            
            // 點數與金牌視覺化
            const pts = prof.points || 0; const sBox = document.getElementById('stamp-card'); sBox.innerHTML = "";
            for(let i=0; i<5; i++) sBox.innerHTML += `<div class="slot ${i < pts ? 'slot-active' : ''}">${i < pts ? '⭐' : ''}</div>`;
            
            const med = prof.medals || 0; const mBox = document.getElementById('medal-card'); mBox.innerHTML = "";
            for(let i=0; i<Math.max(med, 3); i++) mBox.innerHTML += `<div class="slot ${i < med ? 'slot-active' : ''}">${i < med ? '🏅' : ''}</div>`;
            
            // 罰抄與日誌
            const tl = document.getElementById('m-task-list'); tl.innerHTML = "";
            if(prof.tasks) {
                prof.tasks.forEach((t, i) => {
                    const p = Math.round((t.cur/t.max)*100);
                    tl.innerHTML += `<div class="task-item"><div style="display:flex; justify-content:space-between; align-items:center;"><strong onclick="incTask('${sid}', ${i})">${t.name} (${t.cur}/${t.max})</strong>${role === 'admin' ? `<button class="btn btn-mini" style="background:var(--danger); color:#fff;" onclick="deleteTask(${i})">🗑️</button>` : ''}</div><div class="progress-bar" onclick="incTask('${sid}', ${i})"><div class="progress-fill" style="width:${p}%"></div></div></div>`;
                });
            }

            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            if(prof.logs) { // 顯示加減點數日誌
                prof.logs.slice().reverse().forEach(l => {
                    hBox.innerHTML += `<div class="log-item"><span>🕒 ${l.time}</span><span style="color:var(--accent); font-weight:bold;">${l.act}</span></div>`;
                });
            }
            const att = window.master.attendance || {}; // 顯示缺曠
            Object.keys(att).sort().reverse().forEach(d => {
                if(att[d][sid]) hBox.innerHTML += `<div class="log-item"><span>📅 ${d}</span><span class="${att[d][sid]}" style="color:#fff; padding:2px 8px; border-radius:5px;">${statusNames[att[d][sid]]}</span></div>`;
            });

            if (role === 'admin') {
                document.getElementById('admin-tools').style.display = 'block';
                document.getElementById('admin-pts-tool').style.display = 'block';
                document.getElementById('admin-medals-tool').style.display = 'block';
                document.getElementById('admin-pw-info').style.display = 'block';
                db.ref(`jjvs_v14_auth/${sid}/p`).once('value', sn => document.getElementById('m-pw').innerText = sn.val() || '未設');
            }
        }

        function addLog(sid, act) {
            const time = new Date().toLocaleString('zh-TW', { hour12: false }).slice(5, 16);
            const logs = window.master.profiles?.[sid]?.logs || [];
            logs.push({ time, act });
            db.ref(`jjvs_v14_cloud/profiles/${sid}/logs`).set(logs);
        }

        function adjustPoints(v) {
            const cur = parseInt(window.master.profiles?.[curDetailSid]?.points || 0);
            const next = Math.max(0, cur + v);
            db.ref(`jjvs_v14_cloud/profiles/${curDetailSid}/points`).set(next);
            addLog(curDetailSid, (v > 0 ? "➕ 加點數 " : "➖ 扣點數 ") + Math.abs(v));
        }

        function adjustMedals(v) {
            const cur = parseInt(window.master.profiles?.[curDetailSid]?.medals || 0);
            const next = Math.max(0, cur + v);
            db.ref(`jjvs_v14_cloud/profiles/${curDetailSid}/medals`).set(next);
            addLog(curDetailSid, (v > 0 ? "🎖️ 獲得金牌 " : "💀 消耗金牌 ") + Math.abs(v));
        }

        function redeem() {
            const p = parseInt(window.master.profiles?.[curDetailSid]?.points || 0);
            const m = parseInt(window.master.profiles?.[curDetailSid]?.medals || 0);
            if(p >= 5) {
                db.ref(`jjvs_v14_cloud/profiles/${curDetailSid}`).update({ points: p-5, medals: m+1 });
                addLog(curDetailSid, "🎟️ 星星兌換金牌"); alert("兌換成功");
            }
        }

        function addNewTask() {
            const n = document.getElementById('t-name').value; const m = document.getElementById('t-max').value;
            if(!n || !m) return;
            const ts = (window.master.profiles?.[curDetailSid]?.tasks) || [];
            ts.push({ name: n, max: m, cur: 0 }); db.ref(`jjvs_v14_cloud/profiles/${curDetailSid}/tasks`).set(ts);
            addLog(curDetailSid, "📝 新增罰抄：" + n);
        }

        function incTask(sid, idx) {
            if(role !== 'admin') return; const ts = window.master.profiles[sid].tasks;
            if(ts[idx].cur < ts[idx].max) { ts[idx].cur = parseInt(ts[idx].cur) + 1; db.ref(`jjvs_v14_cloud/profiles/${sid}/tasks`).set(ts); }
        }

        function deleteTask(idx) {
            const ts = window.master.profiles[curDetailSid].tasks;
            ts.splice(idx, 1); db.ref(`jjvs_v14_cloud/profiles/${curDetailSid}/tasks`).set(ts);
        }

        function updateInfo() {
            const msg = document.getElementById('t-msg').value;
            db.ref(`jjvs_v14_cloud/profiles/${curDetailSid}/msg`).set(msg); alert("送出成功");
        }

        function closeModal() { curDetailSid = null; document.getElementById('overlay').style.display='none'; document.getElementById('modal').style.display='none'; }

        function exportExcel() {
            const exp = []; const att = window.master.attendance || {}; const profs = window.master.profiles || {};
            Object.keys(att).sort().reverse().forEach(d => {
                students.forEach(s => {
                    if (att[d][s.id]) exp.push({ "日期": d, "班級": s.group, "姓名": s.name, "狀態": statusNames[att[d][s.id]], "點數": profs[s.id]?.points || 0, "金牌": profs[s.id]?.medals || 0 });
                });
            });
            const ws = XLSX.utils.json_to_sheet(exp); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "報表"); XLSX.writeFile(wb, `莊敬音樂科紀錄.xlsx`);
        }
    </script>
</body>
</html>
