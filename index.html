<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莊敬音樂科教務管理系統</title>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- SheetJS for Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- jsPDF for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>

<style>
/* ===== CSS VARIABLES ===== */
:root {
  --gold: #D4AF37;
  --gold-light: #F0D060;
  --gold-dark: #A8891C;
  --bg-deep: #0A0A0C;
  --bg-card: #111115;
  --bg-panel: #161619;
  --bg-hover: #1E1E24;
  --text-primary: #F0E8D0;
  --text-secondary: #A09070;
  --text-muted: #604030;
  --green: #2ECC71;
  --yellow: #F1C40F;
  --red: #E74C3C;
  --blue: #3498DB;
  --border: rgba(212,175,55,0.2);
  --border-hover: rgba(212,175,55,0.5);
  --shadow-gold: 0 0 20px rgba(212,175,55,0.15);
  --shadow-deep: 0 4px 24px rgba(0,0,0,0.6);
  --radius: 12px;
  --radius-sm: 8px;
  --font-title: 'Georgia', 'Times New Roman', serif;
  --font-body: 'Noto Serif TC', 'Georgia', serif;
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; background: var(--bg-deep); color: var(--text-primary); font-family: var(--font-body); overflow-x: hidden; }

/* ===== WATERMARK ===== */
body::before {
  content: '𝄞  🎹  𝄞  🎻  𝄞  🎹  𝄞  🎻  𝄞  🎹  𝄞  🎻';
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  font-size: 80px; color: rgba(212,175,55,0.03);
  display: flex; align-items: center; justify-content: center;
  word-break: break-all; line-height: 1.4; text-align: center;
  pointer-events: none; z-index: 0; padding: 20px;
  overflow: hidden;
}

/* ===== GOLD LINES ===== */
body::after {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  z-index: 1000;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

/* ===== SCREENS ===== */
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: block; }

/* ===== LOGIN SCREEN ===== */
#loginScreen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 30%, rgba(212,175,55,0.08) 0%, transparent 60%);
}
#loginScreen.active { display: flex; }

.login-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 56px;
  width: 420px;
  max-width: 95vw;
  box-shadow: var(--shadow-gold), var(--shadow-deep);
  position: relative;
  overflow: hidden;
}
.login-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.login-logo {
  text-align: center;
  font-size: 48px;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 12px rgba(212,175,55,0.5));
}
.login-title {
  text-align: center;
  font-family: var(--font-title);
  font-size: 22px;
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.login-subtitle {
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 36px;
  letter-spacing: 1px;
}
.login-tabs {
  display: flex; gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 28px;
}
.login-tab {
  flex: 1; padding: 10px;
  background: transparent; border: none;
  color: var(--text-secondary); cursor: pointer;
  font-size: 14px; transition: all 0.2s;
  font-family: var(--font-body);
}
.login-tab.active { background: var(--gold); color: #000; font-weight: bold; }

.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 1px; }
.form-group input {
  width: 100%; padding: 12px 16px;
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 15px; font-family: var(--font-body);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.form-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }

.btn-primary {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
  border: none; border-radius: var(--radius-sm);
  color: #000; font-size: 16px; font-weight: bold;
  cursor: pointer; letter-spacing: 2px;
  font-family: var(--font-body);
  transition: all 0.2s; box-shadow: 0 4px 15px rgba(212,175,55,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,175,55,0.4); }
.btn-primary:active { transform: translateY(0); }

/* ===== MAIN APP ===== */
#appScreen { min-height: 100vh; }
#appScreen.active { display: flex; flex-direction: column; }

/* ===== TOP BAR ===== */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,12,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; gap: 16px;
  height: 60px;
}
.topbar-logo { font-size: 24px; }
.topbar-title {
  font-family: var(--font-title);
  font-size: 18px; color: var(--gold);
  letter-spacing: 1px; flex: 1;
}
.topbar-user {
  font-size: 13px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 8px;
}
.topbar-user span { color: var(--gold); }

.btn-sm {
  padding: 6px 14px;
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-secondary);
  cursor: pointer; font-size: 13px; font-family: var(--font-body);
  transition: all 0.2s;
}
.btn-sm:hover { border-color: var(--gold); color: var(--gold); }
.btn-sm.gold { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }
.btn-sm.gold:hover { background: var(--gold-light); }
.btn-sm.danger { border-color: rgba(231,76,60,0.5); color: var(--red); }
.btn-sm.danger:hover { background: rgba(231,76,60,0.1); border-color: var(--red); }
.btn-sm.success { border-color: rgba(46,204,113,0.5); color: var(--green); }
.btn-sm.success:hover { background: rgba(46,204,113,0.1); border-color: var(--green); }

/* ===== NAV TABS ===== */
.nav-tabs {
  display: flex; gap: 0;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  overflow-x: auto;
}
.nav-tab {
  padding: 14px 20px;
  background: transparent; border: none; border-bottom: 2px solid transparent;
  color: var(--text-secondary); cursor: pointer;
  font-size: 14px; white-space: nowrap;
  font-family: var(--font-body);
  transition: all 0.2s;
}
.nav-tab:hover { color: var(--gold); }
.nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.badge {
  display: inline-block; background: var(--red);
  color: white; font-size: 10px; padding: 1px 5px;
  border-radius: 10px; margin-left: 4px; vertical-align: top;
}

/* ===== CONTENT AREA ===== */
.content-area { flex: 1; padding: 20px; }

/* ===== CLASS SELECTOR ===== */
.class-selector {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-bottom: 20px;
}
.class-btn {
  padding: 8px 18px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text-secondary);
  cursor: pointer; font-size: 13px; font-family: var(--font-body);
  transition: all 0.2s;
}
.class-btn:hover { border-color: var(--gold); color: var(--gold); }
.class-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }

/* ===== ROLL CALL TOOLBAR ===== */
.roll-toolbar {
  display: flex; gap: 10px; flex-wrap: wrap;
  align-items: center; margin-bottom: 16px;
}
.attendance-legend {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--text-secondary);
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%;
}

/* ===== STUDENT GRID ===== */
.student-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.student-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.student-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: var(--shadow-gold); }
.student-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.student-card:hover::before { opacity: 1; }

/* Status colors */
.student-card.status-出 { border-left: 3px solid var(--green); }
.student-card.status-遲 { border-left: 3px solid var(--yellow); }
.student-card.status-缺 { border-left: 3px solid var(--red); }
.student-card.status-假 { border-left: 3px solid var(--blue); }

.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.student-num { font-size: 11px; color: var(--text-muted); }
.status-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  font-weight: bold;
}
.status-badge.出 { background: rgba(46,204,113,0.2); color: var(--green); }
.status-badge.遲 { background: rgba(241,196,15,0.2); color: var(--yellow); }
.status-badge.缺 { background: rgba(231,76,60,0.2); color: var(--red); }
.status-badge.假 { background: rgba(52,152,219,0.2); color: var(--blue); }
.status-badge.未 { background: rgba(100,100,100,0.2); color: #666; }

.student-name { font-size: 18px; font-weight: bold; color: var(--text-primary); margin-bottom: 6px; }

.points-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.points-stars { font-size: 13px; color: var(--gold); letter-spacing: -1px; }
.medals-count { font-size: 12px; color: var(--text-secondary); }

/* ===== STUDENT DETAIL PANEL ===== */
#detailPanel {
  position: fixed; top: 0; right: -480px; width: 480px; height: 100vh;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  z-index: 500; transition: right 0.3s ease;
  overflow-y: auto; padding: 24px;
  box-shadow: -10px 0 40px rgba(0,0,0,0.5);
}
#detailPanel.open { right: 0; }

.detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.detail-name { font-size: 28px; font-weight: bold; color: var(--gold); }
.detail-close { background: none; border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; color: var(--text-secondary); cursor: pointer; font-size: 18px; transition: all 0.2s; }
.detail-close:hover { border-color: var(--gold); color: var(--gold); }

.detail-section { margin-bottom: 20px; }
.detail-section-title {
  font-size: 12px; color: var(--gold); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 10px;
  border-bottom: 1px solid var(--border); padding-bottom: 6px;
}

/* Points grid */
.points-grid { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.point-cell {
  width: 32px; height: 32px; border-radius: 6px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.point-cell.filled { background: rgba(212,175,55,0.1); border-color: var(--gold); }
.point-cell.empty { background: var(--bg-card); }

.action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

/* Medal display */
.medals-display { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.medal-icon { font-size: 24px; filter: drop-shadow(0 0 6px rgba(212,175,55,0.5)); }

/* Tasks */
.task-item {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  margin-bottom: 8px;
}
.task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.task-name { font-size: 14px; }
.task-progress-bar {
  height: 4px; background: var(--bg-deep); border-radius: 2px; overflow: hidden;
}
.task-progress-fill { height: 100%; background: var(--gold); transition: width 0.3s; }

/* Log */
.log-item {
  font-size: 12px; padding: 8px 10px;
  border-left: 2px solid var(--border);
  margin-bottom: 6px; color: var(--text-secondary);
}
.log-item.add { border-left-color: var(--green); }
.log-item.sub { border-left-color: var(--red); }
.log-item.medal { border-left-color: var(--gold); }
.log-item .log-time { color: var(--text-muted); font-size: 11px; }

/* Password display */
.password-display {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 14px;
  font-family: monospace; font-size: 16px;
  color: var(--gold); letter-spacing: 2px;
}

/* ===== APPLY LIST (出入申請) ===== */
.apply-item {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  margin-bottom: 12px; display: flex;
  align-items: center; justify-content: space-between; gap: 12px;
}
.apply-info { flex: 1; }
.apply-name { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
.apply-reason { font-size: 13px; color: var(--text-secondary); }
.apply-time { font-size: 11px; color: var(--text-muted); }

/* ===== EXIT PASS (全螢幕出示) ===== */
#exitPass {
  display: none;
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: #1a9e50; z-index: 9999;
  flex-direction: column; align-items: center; justify-content: center;
  color: white; text-align: center;
}
#exitPass.active { display: flex; }
.exit-pass-title { font-size: 72px; font-weight: bold; letter-spacing: 4px; margin-bottom: 20px; }
.exit-pass-name { font-size: 48px; margin-bottom: 12px; }
.exit-pass-info { font-size: 24px; opacity: 0.85; margin-bottom: 6px; }
.exit-pass-close {
  margin-top: 40px; padding: 14px 40px;
  background: white; color: #1a9e50;
  border: none; border-radius: 30px;
  font-size: 18px; font-weight: bold; cursor: pointer;
}

/* ===== TEACHER MANAGEMENT ===== */
.teacher-item {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px;
  margin-bottom: 10px; display: flex;
  align-items: center; justify-content: space-between;
}
.teacher-info { flex: 1; }
.teacher-name { font-size: 16px; font-weight: bold; margin-bottom: 2px; }
.teacher-classes { font-size: 12px; color: var(--text-secondary); }

/* ===== DIALOG (自訂遮罩) ===== */
#dialogOverlay {
  display: none; position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 10000;
  align-items: center; justify-content: center;
}
#dialogOverlay.active { display: flex; }
.dialog-box {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 32px;
  width: 380px; max-width: 90vw;
  box-shadow: var(--shadow-gold), var(--shadow-deep);
  position: relative;
}
.dialog-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 16px 16px 0 0;
}
.dialog-title { font-size: 18px; font-weight: bold; color: var(--gold); margin-bottom: 20px; }
.dialog-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 1px; }
.dialog-input {
  width: 100%; padding: 10px 14px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 14px; font-family: var(--font-body);
  margin-bottom: 14px; outline: none;
  transition: border-color 0.2s;
}
.dialog-input:focus { border-color: var(--gold); }
.dialog-message { font-size: 15px; color: var(--text-primary); margin-bottom: 20px; line-height: 1.6; }
.dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }
.dialog-btn {
  padding: 9px 22px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); cursor: pointer;
  font-size: 14px; font-family: var(--font-body);
  transition: all 0.2s;
}
.dialog-btn:hover { border-color: var(--gold); color: var(--gold); }
.dialog-btn.confirm { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }
.dialog-btn.confirm:hover { background: var(--gold-light); }
.dialog-btn.danger-confirm { background: var(--red); color: white; border-color: var(--red); font-weight: bold; }

/* ===== STATS ===== */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; text-align: center;
}
.stat-num { font-size: 32px; font-weight: bold; color: var(--gold); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* ===== STUDENT VIEW ===== */
#studentScreen { min-height: 100vh; }
#studentScreen.active { display: flex; flex-direction: column; }

.student-view-card {
  max-width: 600px; margin: 40px auto;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 20px; padding: 32px;
  box-shadow: var(--shadow-gold);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .student-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  #detailPanel { width: 100%; right: -100%; }
}
@media (max-width: 480px) {
  .student-grid { grid-template-columns: 1fr; }
}

/* ===== MISC ===== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 16px; }
.separator { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.text-gold { color: var(--gold); }
.text-muted { color: var(--text-muted); }
.text-success { color: var(--green); }
.text-danger { color: var(--red); }
.flex-row { display: flex; align-items: center; gap: 8px; }
.ml-auto { margin-left: auto; }
input[type="text"], input[type="password"], select, textarea {
  color-scheme: dark;
}
select {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  padding: 8px 12px; font-family: var(--font-body);
  font-size: 14px; outline: none; cursor: pointer;
}
select:focus { border-color: var(--gold); }
textarea {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  padding: 10px 14px; font-family: var(--font-body);
  font-size: 14px; outline: none; width: 100%; resize: vertical;
}
textarea:focus { border-color: var(--gold); }

.loading-spinner {
  display: inline-block; width: 20px; height: 20px;
  border: 2px solid var(--border); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: 30px; padding: 12px 24px;
  font-size: 14px; color: var(--text-primary);
  box-shadow: var(--shadow-deep); z-index: 99999;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-logo">🎼</div>
    <div class="login-title">莊敬高職音樂科</div>
    <div class="login-subtitle">教務管理系統 · Royal Edition</div>

    <div class="login-tabs">
      <button class="login-tab active" onclick="switchLoginTab('teacher')">教師登入</button>
      <button class="login-tab" onclick="switchLoginTab('student')">學生登入</button>
    </div>

    <div id="teacherLoginForm">

// ==============================

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.className='toast'; }, 2800);
}

function now() {
  const d = new Date();
  return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'});
}

function safeKey(name) {
  return name.replace(/[.#$\[\]]/g, '_');
}

function getStudentsByClass(cls) {
  return STUDENT_DATA.filter(s => s.cls === cls);
}

function getStudent(id) {
  return STUDENT_DATA.find(s => s.id === id);
}

function getStudentByName(name) {
  return STUDENT_DATA.find(s => s.name === name);
}

// ==============================
// FIREBASE HELPERS
// ==============================
function dbRef(path) {
  return db.ref(`${DB_ROOT}/${path}`);
}

function dbGet(path) {
  return dbRef(path).once('value').then(s => s.val());
}

function dbUpdate(path, data) {
  return dbRef(path).update(data);
}

function dbSet(path, data) {
  return dbRef(path).set(data);
}

// ==============================

function switchLoginTab(tab) {
  document.querySelectorAll('.login-tab').forEach((t,i) => t.classList.toggle('active', (tab==='teacher'&&i===0)||(tab==='student'&&i===1)));
  document.getElementById('teacherLoginForm').style.display = tab==='teacher'?'block':'none';
  document.getElementById('studentLoginForm').style.display = tab==='student'?'block':'none';
}

async function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  if (!name||!pass) { showToast('請填寫帳號和密碼','error'); return; }

  // Master check
  if (name === MASTER.name && pass === MASTER.pass) {
    currentUser = { name, role:'master', classes: CLASSES };
    enterApp();
    return;
  }

  // Teacher check via Firebase
  try {
    const teachers = await dbGet('teachers');
    if (teachers) {
      for (const key of Object.keys(teachers)) {
        const t = teachers[key];
        if (t.name === name && t.pass === pass) {
          currentUser = { name, role:'teacher', classes: t.classes||[] };
          enterApp();
          return;
        }
      }
    }
    showToast('帳號或密碼錯誤','error');
  } catch(e) {
    showToast('連線失敗，請檢查 Firebase 設定','error');
  }
}

  if (!stu) { showToast('查無此學生','error'); return; }

  try {
    const data = await dbGet(`students/${stu.id}`);
    const storedPass = data?.password || '0000';

    if (pass !== storedPass) { showToast('密碼錯誤','error'); return; }

    currentUser = { name, role:'student', studentId: stu.id };
    if (!data?.password || data.password === '0000') {
      // Force change password
      showChangePasswordDialog(stu.id, () => enterStudentView(stu));
    } else {
      enterStudentView(stu);
    }
  } catch(e) {
    showToast('連線失敗','error');
  }
}

// ==============================
// STUDENT GRID (ATTENDANCE)
// ==============================
async function renderStudentGrid() {
  if (!currentClass) return;
  const grid = document.getElementById('studentGrid');
  grid.innerHTML = '<div style="padding:20px;color:var(--text-muted);"><div class="loading-spinner"></div></div>';

  const students = getStudentsByClass(currentClass);
  const today = new Date().toLocaleDateString('zh-TW');

  // Fetch all student data for this class
  const promises = students.map(s => dbGet(`students/${s.id}`));
  const results = await Promise.all(promises);
  const dataMap = {};
  students.forEach((s,i) => { dataMap[s.id] = results[i] || {}; });

  grid.innerHTML = '';
  students.forEach(s => {
    const d = dataMap[s.id];
    const todayAtt = pendingAttendance[s.id] || d.attendance?.[today] || '未';
    const points = d.points || 0;
    const medals = d.medals || 0;
    const stars = Math.min(points, 10);

    const card = document.createElement('div');
    card.className = `student-card status-${todayAtt}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="student-num">${s.id}</div>
        <div class="status-badge ${todayAtt}" id="badge-${s.id}">${todayAtt}</div>
      </div>
      <div class="student-name">${s.name}</div>
      <div class="points-row">
        <div class="points-stars">${'★'.repeat(stars)}${'☆'.repeat(10-stars)}</div>
        <div class="medals-count">${medals>0?'🎖️'.repeat(Math.min(medals,5)):''}</div>
      </div>
    `;
    // Click to cycle attendance status
    card.onclick = (e) => {
      if (e.target.closest('.student-card') && !e.target.closest('.detail-btn')) {
        cycleAttendance(s, card);
      }
    };
    // Double click to open detail
    card.ondblclick = () => openDetail(s, dataMap[s.id]);
    // Long press for detail on mobile
    let pressTimer;
    card.ontouchstart = () => { pressTimer = setTimeout(()=>openDetail(s, dataMap[s.id]), 600); };
    card.ontouchend = () => clearTimeout(pressTimer);

    grid.appendChild(card);
  });
}

const STATUS_CYCLE = ['未','出','遲','缺','假'];
async function cycleAttendance(student, card) {
  const today = new Date().toLocaleDateString('zh-TW');
  const current = pendingAttendance[student.id] || '未';
  const idx = STATUS_CYCLE.indexOf(current);
  const next = STATUS_CYCLE[(idx+1) % STATUS_CYCLE.length];

  pendingAttendance[student.id] = next;

  // Update card UI
  card.className = `student-card status-${next}`;
  const badge = card.querySelector('.status-badge');
  badge.className = `status-badge ${next}`;
  badge.textContent = next;

  // Auto deduct 1 point on 遲
  if (next === '遲') {
    const data = await dbGet(`students/${student.id}`);
    const pts = Math.max(0, (data?.points||0) - 1);
    const logEntry = {
      time: now(),
      action: '遲到自動扣點',
      reason: '遲到自動扣除 1 點',
      teacher: currentUser.name,
      delta: -1
    };
    const logKey = Date.now().toString();
    await dbUpdate(`students/${student.id}`, {
      points: pts,
      [`log/${logKey}`]: logEntry
    });
    showToast(`${student.name} 遲到，已自動扣 1 點`);
  }
}

async function saveAttendance() {
  if (!currentClass) return;
  const today = new Date().toLocaleDateString('zh-TW');
  const updates = {};

  for (const [id, status] of Object.entries(pendingAttendance)) {
    const stu = getStudent(id);
    if (!stu || stu.cls !== currentClass) continue;
    updates[`${DB_ROOT}/students/${id}/attendance/${today}`] = status;
  }

  if (Object.keys(updates).length === 0) { showToast('無變更需儲存'); return; }

  try {
    await db.ref('/').update(updates);
    pendingAttendance = {};
    showToast('點名已儲存 ✓','success');
  } catch(e) {
    showToast('儲存失敗','error');
  }
}

function setAllStatus(status) {
  if (!currentClass) return;
  const students = getStudentsByClass(currentClass);
  students.forEach(s => { pendingAttendance[s.id] = status; });
  renderStudentGrid();
}

async function openDetail(student, data) {
  currentStudent = student;
  const d = data || (await dbGet(`students/${student.id}`)) || {};
  const today = new Date().toLocaleDateString('zh-TW');

  document.getElementById('detailName').textContent = student.name;
  document.getElementById('detailClass').textContent = student.cls + ' · ' + student.id;
  document.getElementById('detailPassword').textContent = d.password || '0000';
  document.getElementById('detailStatus').textContent = d.attendance?.[today] || '未點名';

  // Points grid
  const pts = d.points || 0;
  document.getElementById('detailPointsNum').textContent = pts;
  const grid = document.getElementById('detailPointsGrid');
  grid.innerHTML = '';
  for (let i=0; i<10; i++) {
    const cell = document.createElement('div');
    cell.className = 'point-cell ' + (i<pts?'filled':'empty');
    cell.textContent = i<pts ? '★' : '☆';
    grid.appendChild(cell);
  }
  document.getElementById('redeemBtn').disabled = pts < 5;

  // Medals
  const medals = d.medals || 0;
  document.getElementById('detailMedalsNum').textContent = medals;
  const medalsDiv = document.getElementById('detailMedals');
  medalsDiv.innerHTML = medals > 0
    ? Array(Math.min(medals,20)).fill('🎖️').join('')
    : '<span style="color:var(--text-muted);font-size:13px;">尚無金牌</span>';

  // Tasks
  renderDetailTasks(d.tasks || {});

  // Log
  renderDetailLog(d.log || {});

  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  currentStudent = null;
}

function renderDetailTasks(tasks) {
  const container = document.getElementById('detailTasks');
  container.innerHTML = '';
  const entries = Object.entries(tasks);
  if (entries.length === 0) {
    container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">暫無任務</div>';
    return;
  }
  entries.forEach(([key, task]) => {
    const pct = Math.min(100, Math.round((task.done/task.total)*100));
    const div = document.createElement('div');
    div.className = 'task-item';
    div.innerHTML = `
      <div class="task-header">
        <div class="task-name">${task.name}</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span style="font-size:12px;color:var(--text-secondary);">${task.done}/${task.total}</span>
          <button class="btn-sm" onclick="incrementTask('${key}')" style="padding:3px 8px;font-size:12px;">+1</button>
          <button class="btn-sm danger" onclick="deleteTask('${key}')" style="padding:3px 8px;font-size:12px;">✕</button>
        </div>
      </div>
      <div class="task-progress-bar">
        <div class="task-progress-fill" style="width:${pct}%"></div>
      </div>
    `;
    container.appendChild(div);
  });
}

function renderDetailLog(log) {
  const container = document.getElementById('detailLog');
  container.innerHTML = '';
  const entries = Object.entries(log).sort((a,b) => b[0]-a[0]).slice(0,30);
  if (entries.length === 0) {
    container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">尚無記錄</div>';
    return;
  }
  entries.forEach(([key, entry]) => {
    const div = document.createElement('div');
    const cls = entry.delta > 0 ? 'add' : entry.delta < 0 ? 'sub' : (entry.action.includes('牌')?'medal':'');
    div.className = `log-item ${cls}`;
    div.innerHTML = `
      <div class="log-time">${entry.time} · ${entry.teacher||''}</div>
      <div>${entry.action}${entry.reason?' — '+entry.reason:''}</div>
    `;
    container.appendChild(div);
  });
}

async function changePoints(delta) {
  if (!currentStudent) return;
  openDialog(delta>0?'＋ 加點':'－ 扣點',
    `<div class="dialog-label">原因</div>
     <input class="dialog-input" type="text" id="pointReason" placeholder="請輸入原因">`,

      const reason = document.getElementById('pointReason').value.trim();
      if (!reason) { showToast('請填寫原因','error'); return false; }
      const data = await dbGet(`students/${currentStudent.id}`);
      const pts = Math.max(0, (data?.points||0) + delta);
      const logKey = Date.now().toString();
      await dbUpdate(`students/${currentStudent.id}`, {
        points: pts,
        [`log/${logKey}`]: { time:now(), action: delta>0?'加點':'扣點', reason, teacher:currentUser.name, delta }

      return true;

async function redeemMedal() {

    [{label:'確認兌換', cls:'confirm', action: async ()=>{
      const pts = (data.points||0) - 5;
      const medals = (data.medals||0) + 1;
      const logKey = Date.now().toString();
      await dbUpdate(`students/${currentStudent.id}`, {
        points: pts, medals,
        [`log/${logKey}`]: { time:now(), action:'兌換金牌', reason:'集滿5點兌換', teacher:currentUser.name, delta:-5 }
      });
      showToast('金牌兌換成功 🎖️','success');
      openDetail(currentStudent);
      return true;
    }}, {label:'取消', cls:'', action:()=>true}]
  );

function openAddTask() {

async function incrementTask(taskKey) {
  if (!currentStudent) return;
  const data = await dbGet(`students/${currentStudent.id}/tasks/${taskKey}`);
  if (!data) return;
  const done = Math.min(data.total, (data.done||0) + 1);
  await dbUpdate(`students/${currentStudent.id}/tasks/${taskKey}`, { done });
  if (done >= data.total) showToast('任務完成！🎉','success');
  openDetail(currentStudent);
}

async function deleteTask(taskKey) {

      openDetail(currentStudent);
      return true;
    }}, {label:'取消', cls:'', action:()=>true}]

function startApplyListener() {
  db.ref(`${DB_ROOT}/exitApply`).on('value', snap => {
    const data = snap.val() || {};
    const pending = Object.values(data).filter(a => a.status === 'pending');
    const badge = document.getElementById('applyBadge');
    badge.textContent = pending.length;
    badge.style.display = pending.length > 0 ? '' : 'none';
    renderApplyList(data);
  });
}

function renderApplyList(data) {
  const container = document.getElementById('applyList');
  const pending = Object.entries(data).filter(([,a]) => a.status==='pending');
  if (pending.length === 0) {
    container.innerHTML = '<div class="empty-state">目前無待審核申請 ✓</div>';
    return;
  }
  container.innerHTML = '';
  pending.forEach(([key, apply]) => {
    const div = document.createElement('div');
    div.className = 'apply-item';
    div.innerHTML = `
      <div class="apply-info">
        <div class="apply-name">${apply.studentName} <span style="font-size:12px;color:var(--text-secondary);">${apply.studentClass}</span></div>
        <div class="apply-reason">原因：${apply.reason}</div>
        <div class="apply-time">${apply.time}</div>
      </div>
      <button class="btn-sm success" onclick="approveExit('${key}', '${apply.studentName}')">✅ 核可</button>
      <button class="btn-sm danger" onclick="rejectExit('${key}')">✕ 拒絕</button>
    `;
    container.appendChild(div);
  });
}

async function approveExit(key, studentName) {
  await dbUpdate(`exitApply/${key}`, {
    status: 'approved',
    approvedBy: currentUser.name,
    approvedTime: now()
  });
  showToast(`已核可 ${studentName} 外出`,'success');
}

async function rejectExit(key) {
  await dbUpdate(`exitApply/${key}`, { status:'rejected' });
  showToast('已拒絕申請');
}

// Student: apply exit
function openApplyExit() {
  openDialog('🚪 申請第八節外出',
    `<div class="dialog-label">外出原因</div>
     <textarea class="dialog-input" id="exitReason" rows="3" placeholder="請填寫外出原因"></textarea>`,
    [{label:'送出申請', cls:'confirm', action: async ()=>{
      const reason = document.getElementById('exitReason').value.trim();
      if (!reason) { showToast('請填寫原因','error'); return false; }
      const stu = getStudentByName(currentUser.name);
      const key = Date.now().toString();
      await dbSet(`exitApply/${key}`, {
        studentName: currentUser.name,
        studentId: stu?.id||'',
        studentClass: stu?.cls||'',
        reason, time: now(), status:'pending'
      });
      showToast('申請已送出，請等待老師審核');
      // Start listening for approval
      listenForApproval(key, currentUser.name);
      return true;
    }}, {label:'取消', cls:'', action:()=>true}]
  );
}

function listenForApproval(key, studentName) {
  const ref = db.ref(`${DB_ROOT}/exitApply/${key}`);
  const handler = ref.on('value', snap => {
    const data = snap.val();
    if (data?.status === 'approved') {
      ref.off('value', handler);
      showExitPass(studentName, data.approvedBy, data.approvedTime);
    }
  });
}

function showExitPass(name, teacher, time) {
  document.getElementById('exitPassName').textContent = name;
  document.getElementById('exitPassDate').textContent = time;
  document.getElementById('exitPassTeacher').textContent = '核可老師：' + teacher;
  document.getElementById('exitPass').classList.add('active');
}

function listenForMyApproval(studentName) {
  db.ref(`${DB_ROOT}/exitApply`).on('value', snap => {
    const data = snap.val() || {};
    const today = new Date().toLocaleDateString('zh-TW');
    const approved = Object.values(data).find(a =>
      a.studentName === studentName &&
      a.status === 'approved' &&
      a.approvedTime?.startsWith(today)
    );
    const area = document.getElementById('myExitPassArea');
    if (approved && area) {
      area.style.display = '';
      area.innerHTML = `<button class="btn-sm gold" style="width:100%;padding:14px;font-size:16px;" onclick="showExitPass('${studentName}','${approved.approvedBy}','${approved.approvedTime}')">📋 顯示外出憑證</button>`;
    }
  });
}

// ==============================
// TEACHER MANAGEMENT
// ==============================
async function renderTeacherList() {
  const container = document.getElementById('teacherList');
  container.innerHTML = '<div class="loading-spinner"></div>';
  const teachers = await dbGet('teachers') || {};
  container.innerHTML = '';

  // Show master
  const masterDiv = document.createElement('div');
  masterDiv.className = 'teacher-item';
  masterDiv.innerHTML = `
    <div class="teacher-info">
      <div class="teacher-name">${MASTER.name} <span style="background:var(--gold);color:#000;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;">最高權限</span></div>
      <div class="teacher-classes">管轄所有班級</div>
    </div>
  `;
  container.appendChild(masterDiv);

  Object.entries(teachers).forEach(([key, t]) => {
    const div = document.createElement('div');
    div.className = 'teacher-item';
    div.innerHTML = `
      <div class="teacher-info">
        <div class="teacher-name">${t.name}</div>
        <div class="teacher-classes">管轄：${(t.classes||[]).join('、') || '無'}</div>
        <div style="font-size:11px;color:var(--text-muted);">帳號：${t.name} | 密碼：${t.pass}</div>
      </div>
      <button class="btn-sm danger" onclick="deleteTeacher('${key}','${t.name}')">刪除</button>
    `;
    container.appendChild(div);
  });
}

function openAddTeacher() {
  openDialog('⚙️ 新增教師帳號',
    `<div class="dialog-label">教師姓名（即帳號）</div>
     <input class="dialog-input" type="text" id="tName" placeholder="例：王小明">
     <div class="dialog-label">密碼</div>
     <input class="dialog-input" type="password" id="tPass" placeholder="請設定密碼">
     <div class="dialog-label">管轄班級（可複選）</div>
     ${CLASSES.map(c=>`<label style="display:block;margin-bottom:6px;font-size:14px;cursor:pointer;"><input type="checkbox" value="${c}" style="margin-right:6px;"> ${c}</label>`).join('')}`,
    [{label:'新增', cls:'confirm', action: async ()=>{
      const name = document.getElementById('tName').value.trim();
      const pass = document.getElementById('tPass').value.trim();
      const classes = [...document.querySelectorAll('#dialogBody input[type=checkbox]:checked')].map(c=>c.value);
      if (!name||!pass) { showToast('請填寫完整','error'); return false; }
      const key = Date.now().toString();
      await dbSet(`teachers/${key}`, { name, pass, classes });
      showToast('教師帳號已新增','success');
      renderTeacherList();
      return true;
    }}, {label:'取消', cls:'', action:()=>true}]
  );
}

async function deleteTeacher(key, name) {
  openDialog('⚠️ 確認刪除', `<div class="dialog-message">確認要刪除教師「${name}」的帳號？</div>`,
    [{label:'刪除', cls:'danger-confirm', action: async ()=>{
      await db.ref(`${DB_ROOT}/teachers/${key}`).remove();
      showToast('已刪除教師帳號');
      renderTeacherList();
      return true;
    }}, {label:'取消', cls:'', action:()=>true}]
  );
}

// ==============================
// REPORT & STATS
// ==============================
async function renderStats() {
  const grid = document.getElementById('statsGrid');
  const today = new Date().toLocaleDateString('zh-TW');
  const students = currentUser.classes.flatMap(c => getStudentsByClass(c));

  // Count today's attendance
  let present=0, late=0, absent=0, leave=0;
  const promises = students.map(s => dbGet(`students/${s.id}/attendance/${today}`));
  const results = await Promise.all(promises);
  results.forEach(r => {
    if (r==='出') present++;
    else if (r==='遲') late++;
    else if (r==='缺') absent++;
    else if (r==='假') leave++;
  });

  grid.innerHTML = `
    <div class="stat-card"><div class="stat-num text-success">${present}</div><div class="stat-label">出席</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--yellow)">${late}</div><div class="stat-label">遲到</div></div>
    <div class="stat-card"><div class="stat-num text-danger">${absent}</div><div class="stat-label">缺席</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${leave}</div><div class="stat-label">請假</div></div>
  `;
}

async function renderReportGrid() {
  if (!currentClass) { currentClass = currentUser.classes[0]; }
  const grid = document.getElementById('reportGrid');
  grid.innerHTML = '<div style="padding:20px;"><div class="loading-spinner"></div></div>';

  const students = getStudentsByClass(currentClass);
  const promises = students.map(s => dbGet(`students/${s.id}`));
  const results = await Promise.all(promises);

  grid.innerHTML = '';
  students.forEach((s,i) => {
    const d = results[i] || {};
    const pts = d.points||0;
    const medals = d.medals||0;
    const card = document.createElement('div');
    card.className = 'student-card';
    card.style.cursor = 'pointer';
    card.innerHTML = `
      <div class="card-header">
        <div class="student-num">${s.id}</div>
        <div style="font-size:12px;color:var(--text-muted);">⭐${pts} 🎖️${medals}</div>
      </div>
      <div class="student-name">${s.name}</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">
        ${Object.keys(d.tasks||{}).length} 項任務 · ${Object.keys(d.log||{}).length} 筆記錄
      </div>
    `;
    card.onclick = () => openDetail(s, d);
    grid.appendChild(card);
  });
}

// ==============================
// EXPORT EXCEL
// ==============================
async function exportExcel() {
  showToast('正在生成 Excel...');
  const classes = currentUser.classes;
  const wb = XLSX.utils.book_new();
  const today = new Date().toLocaleDateString('zh-TW');

  for (const cls of classes) {
    const students = getStudentsByClass(cls);
    const promises = students.map(s => dbGet(`students/${s.id}`));
    const results = await Promise.all(promises);

    const rows = [['學號','姓名','班級','點數','金牌數','今日出勤','任務數','日誌筆數']];
    students.forEach((s,i) => {
      const d = results[i]||{};
      rows.push([
        s.id, s.name, s.cls,
        d.points||0, d.medals||0,
        d.attendance?.[today]||'未',
        Object.keys(d.tasks||{}).length,
        Object.keys(d.log||{}).length
      ]);
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, cls);
  }

  XLSX.writeFile(wb, `莊敬音樂科報表_${today}.xlsx`);
  showToast('Excel 已下載','success');
}

// ==============================
// EXPORT PDF
// ==============================
async function exportPDF() {
  showToast('正在生成 PDF...');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape' });
  const today = new Date().toLocaleDateString('zh-TW');

  doc.setFontSize(16);
  doc.text('莊敬高職音樂科 教務報表', 14, 15);
  doc.setFontSize(10);
  doc.text(`生成日期：${today}`, 14, 22);

  const classes = currentUser.classes;
  let y = 30;

  for (const cls of classes) {
    const students = getStudentsByClass(cls);
    const promises = students.map(s => dbGet(`students/${s.id}`));
    const results = await Promise.all(promises);

    const rows = students.map((s,i) => {
      const d = results[i]||{};
      return [s.id, s.name, d.points||0, d.medals||0, d.attendance?.[today]||'未'];
    });

    doc.autoTable({
      startY: y,
      head: [[cls,'姓名','點數','金牌','今日']],
      body: rows,
      styles: { fontSize:9 },
      headStyles: { fillColor:[180,145,30] }
    });
    y = doc.lastAutoTable.finalY + 10;
    if (y > 180) { doc.addPage(); y = 20; }
  }

  doc.save(`莊敬音樂科報表_${today}.pdf`);
  showToast('PDF 已下載','success');
}

// ==============================
// DIALOG SYSTEM
// ==============================
function openDialog(title, bodyHtml, actions) {
  document.getElementById('dialogTitle').textContent = title;
  document.getElementById('dialogBody').innerHTML = bodyHtml;

  const actionsEl = document.getElementById('dialogActions');
  actionsEl.innerHTML = '';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = `dialog-btn ${a.cls||''}`;
    btn.textContent = a.label;
    btn.onclick = async () => {
      const result = await a.action();
      if (result !== false) closeDialog();
    };
    actionsEl.appendChild(btn);
  });

  document.getElementById('dialogOverlay').classList.add('active');
}

function closeDialog() {
  document.getElementById('dialogOverlay').classList.remove('active');
}

document.getElementById('dialogOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('dialogOverlay')) closeDialog();
});
