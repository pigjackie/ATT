            {id:"1A01",name:"01任恩予",group:"音一莊"},{id:"1A02",name:"02李孟臻",group:"音一莊"},{id:"1A03",name:"03潘縈汐",group:"音一莊"},{id:"1A04",name:"04謝幸芙",group:"音一莊"},{id:"1A05",name:"05李昕柔",group:"音一莊"},{id:"1A06",name:"06盧丞菲",group:"音一莊"},{id:"1A07",name:"07林欣霈",group:"音一莊"},{id:"1A08",name:"08林耘瑄",group:"音一莊"},{id:"1A09",name:"09林詩翡",group:"音一莊"},{id:"1A10",name:"10姜妤捷",group:"音一莊"},{id:"1A11",name:"11張筑笹",group:"音一莊"},{id:"1A12",name:"12廖聿淓",group:"音一莊"},{id:"1A13",name:"13曾彥瑄",group:"音一莊"},{id:"1A14",name:"14盧瑗",group:"音一莊"},{id:"1A15",name:"15鍾欣庭",group:"音一莊"},{id:"1A16",name:"16黃郁晴",group:"音一莊"},{id:"1A17",name:"17詹中愷",group:"音一莊"},{id:"1A18",name:"18鄭誌浩",group:"音一莊"},{id:"1A19",name:"19謝松煇",group:"音一莊"},{id:"1A20",name:"20羅子超",group:"音一莊"},{id:"1A21",name:"21羅笠準",group:"音一莊"},{id:"1A22",name:"22蘇冠綸",group:"音一莊"},{id:"1A23",name:"23蘇祺翔",group:"音一莊"},{id:"1A24",name:"24劉軒豪",group:"音一莊"},{id:"1A25",name:"25吳泓毅",group:"音一莊"},{id:"1A26",name:"26李維璟",group:"音一莊"},{id:"1A27",name:"27林孝廷",group:"音一莊"},{id:"1A28",name:"28林紹謙",group:"音一莊"},{id:"1A29",name:"29胡宇哲",group:"音一莊"},{id:"1A30",name:"30楊順發",group:"音一莊"},{id:"1A31",name:"31張又禾",group:"音一莊"},{id:"1A32",name:"32張允磊",group:"音一莊"},{id:"1A33",name:"33黃靖勛",group:"音一莊"}
        ];

        let role = ''; let currentGrp = "音三莊"; let curStudent = null; let curDetailSid = null;
        let adminInfo = { n: '', cls: 'ALL' }; let localAtt = {};
        const statusColors = ['bg-present', 'bg-late', 'bg-absent', 'bg-leave'];
        const statusNames = { 'bg-present':'出', 'bg-late':'遲', 'bg-absent':'缺', 'bg-leave':'假' };

        function doAuth() {
            const acc = document.getElementById('login-acc').value.trim();
            const pw = document.getElementById('login-pw').value.trim();
            if(acc === MASTER_ADMIN && pw === MASTER_PASS) {
                role = 'admin'; adminInfo = { n: '蕭旭成', cls: 'ALL' };
                saveL('admin', null, '蕭旭成', 'ALL'); start(); return;
            }
            const h = CryptoJS.SHA256(pw).toString();
            db.ref(`jjvs_v26_admins/${acc}`).once('value', sn => {
                const d = sn.val();
                if(d && h === d.p) {
                    role = 'admin'; adminInfo = { n: d.n, cls: d.cls };
                    saveL('admin', null, d.n, d.cls); start();
                } else {
                    const f = students.find(s => s.name.includes(acc));
                    if(f) {
                        db.ref(`jjvs_v26_auth/${f.id}`).once('value', sn2 => {
                            const ad = sn2.val() || {p: '0000'};
                            if(pw === ad.p) {
                                if(pw === '0000') {
                                    const np = prompt("請修改預設密碼 0000：");
                                    if(np && np !== '0000') { db.ref(`jjvs_v26_auth/${f.id}`).set({p: np}); alert("改好了，請重新登入"); }
                                } else { curStudent = f; role = 'student'; saveL('student', f.id); start(); }
                            } else alert("密碼錯");
                        });
                    } else alert("查無此人");
                }
            });
        }
        function saveL(r, sid, n, cls) { localStorage.setItem('jjvs_r', r); localStorage.setItem('jjvs_id', sid); localStorage.setItem('jjvs_an', n); localStorage.setItem('jjvs_ac', cls); }
        window.onload = () => {
            const r = localStorage.getItem('jjvs_r');
            if(r === 'admin') { role = 'admin'; adminInfo = { n: localStorage.getItem('jjvs_an'), cls: localStorage.getItem('jjvs_ac') }; start(); }
            else if(r === 'student') { curStudent = students.find(s => s.id === localStorage.getItem('jjvs_id')); role = 'student'; start(); }
        };
        function logout() { localStorage.clear(); location.reload(); }
        function start() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('target-date').value = new Date().toISOString().split('T')[0];
            if(role === 'admin') { document.getElementById('admin-view').style.display = 'block'; if(adminInfo.n === '蕭旭成') document.getElementById('admin-setup-btn').style.display = 'inline-block'; initTabs(); }
            else { document.getElementById('student-view').style.display = 'block'; openDetail(curStudent.id); }
            loadCloud();
        }
        function initTabs() {
            const tb = document.getElementById('tabs'); tb.innerHTML = "";
            const grps = adminInfo.cls === 'ALL' ? ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"] : [adminInfo.cls];
            currentGrp = grps[0];
            grps.forEach(g => {
                const b = document.createElement('button'); b.innerText = g; b.className = `tab-btn ${g === currentGrp ? 'active' : ''}`;
                b.onclick = () => { currentGrp = g; Array.from(tb.children).forEach(c=>c.classList.remove('active')); b.classList.add('active'); renderGrid(); };
                tb.appendChild(b);
            });
        }
        function loadCloud() {
            db.ref('jjvs_v26_cloud').on('value', snap => {
                window.master = snap.val() || {};
                const sd = document.getElementById('target-date').value;
                localAtt = {...(window.master.attendance && window.master.attendance[sd])};
                renderGrid(); renderLeaves();
                if(curDetailSid) refreshModalUI(curDetailSid);
                document.getElementById('login-info').innerText = role === 'admin' ? `${adminInfo.n} 老師 (加密連線)` : "皇家學員："+curStudent.name;
            });
        }
        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid'); grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles?.[s.id]?.points) || 0;
                const div = document.createElement('div'); div.className = "s-box";
                div.innerHTML = `<div class="s-points">${pts}P</div><div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div><div class="s-name" onclick="openDetail('${s.id}')">${s.name}</div>`;
                grid.appendChild(div);
            });
        }
        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let next = statusColors[(statusColors.indexOf(cur) + 1) % statusColors.length]; localAtt[sid] = next;
            document.getElementById(`dot-${sid}`).className = `s-dot ${next}`;
            document.getElementById(`dot-${sid}`).innerText = statusNames[next];
            if(next === 'bg-late') {
                const cp = window.master.profiles?.[sid]?.points || 0;
                db.ref(`jjvs_v26_cloud/profiles/${sid}/points`).set(Math.max(0, cp - 1));
                addLog(sid, "💀 遲到自動扣點", `系統自動 (${adminInfo.n} 點名)`);
            }
        }
        function syncCloud() { db.ref(`jjvs_v26_cloud/attendance/${document.getElementById('target-date').value}`).set(localAtt).then(() => alert("已存檔")); }
        function openDetail(sid) { curDetailSid = sid; document.getElementById('overlay').style.display='block'; document.getElementById('modal').style.display='block'; if (window.master) refreshModalUI(sid); }
        function refreshModalUI(sid) {
            const s = students.find(x => x.id === sid);
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無", logs: [] };
            document.getElementById('m-name').innerText = s.name;
            document.getElementById('m-msg').innerText = prof.msg || "無師長訊息";
            const pts = prof.points || 0; const sb = document.getElementById('stamp-card'); sb.innerHTML = "";
            for(let i=0; i<10; i++) sb.innerHTML += `<div class="slot ${i < pts ? 'slot-active' : ''}">${i < pts ? '⭐' : ''}</div>`;
            const med = prof.medals || 0; const mb = document.getElementById('medal-card'); mb.innerHTML = "";
            for(let i=0; i<Math.max(med, 3); i++) mb.innerHTML += `<div class="slot ${i < med ? 'slot-active' : ''}">${i < med ? '🏅' : ''}</div>`;
            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            const combined = [...(prof.logs || [])];
            const att = window.master.attendance || {};
            Object.keys(att).forEach(d => { if(att[d][sid]) combined.push({ time: d+" 00:00", act: "出席: "+statusNames[att[d][sid]], reason: "點名記錄", admin: "系統" }); });
            combined.sort((a,b) => b.time.localeCompare(a.time)).forEach(l => {
                hBox.innerHTML += `<div class="log-row">🕒 ${l.time}<br><b>${l.act}</b><br>原因：${l.reason} <span style="float:right; color:#999;">by ${l.admin || ''}</span></div>`;
            });
            if(role === 'admin') {
                document.getElementById('admin-pts-tool').style.display = 'block'; document.getElementById('admin-med-tool').style.display = 'block';
                document.getElementById('admin-msg-zone').style.display = 'block'; document.getElementById('admin-only-info').style.display = 'block';
                db.ref(`jjvs_v26_auth/${sid}/p`).once('value', sn => document.getElementById('m-pw').innerText = sn.val() || '0000');
            }
            const leave = window.master.leaves?.[document.getElementById('target-date').value + "_" + sid];
            if(role === 'student' && leave === 'APPROVED') {
                document.getElementById('student-leave-status').innerHTML = `<button class="btn btn-gold" onclick="showPass('${s.name}')">🎟️ 出示准予外出通行證</button>`;
            }
        }
        function showPass(n) { document.getElementById('pass-name').innerText = n; document.getElementById('pass-date').innerText = document.getElementById('target-date').value; document.getElementById('pass-admin').innerText = adminInfo.n; document.getElementById('pass-screen').style.display = 'block'; }
        function applyLeave() { const r = prompt("原因："); if(!r) return; db.ref(`jjvs_v26_cloud/leaves/${document.getElementById('target-date').value + "_" + curStudent.id}`).set("PENDING"); alert("已送出"); }
        function renderLeaves() {
            const box = document.getElementById('leave-list'); box.innerHTML = "";
            const leaves = window.master.leaves || {}; const sd = document.getElementById('target-date').value;
            students.filter(s => s.group === currentGrp || adminInfo.cls === 'ALL').forEach(s => {
                if(leaves[sd+"_"+s.id] === 'PENDING') {
                    box.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>🚶 <b>${s.name}</b> 申請外出</span><button class="btn" style="width:70px; height:35px; padding:0; background:var(--present); color:#fff;" onclick="approveL('${s.id}')">核可</button></div>`;
                }
            });
        }
        function approveL(sid) { db.ref(`jjvs_v26_cloud/leaves/${document.getElementById('target-date').value+"_"+sid}`).set("APPROVED"); addLog(sid, "✅ 核可外出", adminInfo.n); }
        function adj(type, v) {
            const r = prompt("原因："); if(!r) return;
            const path = type === 'p' ? 'points' : 'medals';
            const cur = parseInt(window.master.profiles?.[curDetailSid]?.[path] || 0);
            db.ref(`jjvs_v26_cloud/profiles/${curDetailSid}/${path}`).set(Math.max(0, cur + v));
            addLog(curDetailSid, (type==='p'?'點數':'金牌')+(v>0?'➕':'➖')+Math.abs(v), r);
        }
        function addLog(sid, act, reason) {
            const t = new Date().toISOString().split('T')[0] + " " + new Date().toTimeString().slice(0,5);
            const logs = window.master.profiles?.[sid]?.logs || [];
            logs.push({ time: t, act, reason, admin: adminInfo.n });
            db.ref(`jjvs_v26_cloud/profiles/${sid}/logs`).set(logs);
        }
        function openSetup() { document.getElementById('overlay').style.display = 'block'; document.getElementById('setup-modal').style.display = 'block'; renderAdminList(); }
        function addTeacher() {
            const n = document.getElementById('new-t-name').value; const a = document.getElementById('new-t-acc').value; const p = document.getElementById('new-t-pw').value; const c = document.getElementById('new-t-class').value;
            if(!n || !a || !p) return alert("必填");
            db.ref(`jjvs_v26_admins/${a}`).set({ n: n, p: CryptoJS.SHA256(p).toString(), cls: c }).then(() => { alert("已開通"); renderAdminList(); });
        }
        function renderAdminList() {
            const box = document.getElementById('teacher-list'); box.innerHTML = "";
            db.ref('jjvs_v26_admins').once('value', sn => {
                const d = sn.val(); for(let acc in d) { box.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:8px;"><b>${d[acc].n}</b> (${acc})<br>管轄：${d[acc].cls} <button onclick="delA('${acc}')" style="float:right; color:red; border:none; background:none;">[刪除]</button></div>`; }
            });
        }
        function delA(acc) { if(confirm("刪除？")) db.ref(`jjvs_v26_admins/${acc}`).remove().then(renderAdminList); }
        function redeem() {
            const p = window.master.profiles?.[curDetailSid]?.points || 0;
            if(p >= 5) {
                db.ref(`jjvs_v26_cloud/profiles/${curDetailSid}`).update({ points: p-5, medals: (window.master.profiles?.[curDetailSid]?.medals || 0)+1 });
                addLog(curDetailSid, "🎟️ 星星換金牌", "自動兌換");
            } else alert("不足 5 點");
        }
        function updateMsg() { db.ref(`jjvs_v26_cloud/profiles/${curDetailSid}/msg`).set(document.getElementById('t-msg').value); alert("送出"); }
        function closeModal() { curDetailSid = null; document.getElementById('overlay').style.display='none'; document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    </script>
