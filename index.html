<style>

  --r:12px;--r2:8px;
}

/* 主題配色 */
[data-theme="navy"] { --bg:#141824; --bg1:#1B202D; --bg2:#252B3A; --tx:#E2E8F0; --tx2:#94A3B8; --tx3:#64748B; --gold:#C2A064; --gold-l:#E0C18A; --gold-d:#997A42; --bdr:rgba(194,160,100,.2); --bdr2:rgba(194,160,100,.5); }

[data-theme="tiffany"] { --bg:#F0FAF9; --bg1:#FFFFFF; --bg2:#E0F5F3; --tx:#1B302F; --tx2:#456361; --tx3:#7B9E9C; --gold:#0ABAB5; --gold-l:#4EDBD7; --gold-d:#088C88; --bdr:rgba(10,186,181,.3); --bdr2:rgba(10,186,181,.6); }
[data-theme="milktea"] { --bg:#F4EBE1; --bg1:#FCF7F1; --bg2:#EAE0D4; --tx:#4A3F35; --tx2:#7A6859; --tx3:#A08C7A; --gold:#C49A6C; --gold-l:#DEBA92; --gold-d:#9E754B; --bdr:rgba(196,154,108,.3); --bdr2:rgba(196,154,108,.6); }
[data-theme="pink"] { --bg:#FFF0F3; --bg1:#FFF5F7; --bg2:#FFE3E8; --tx:#5C3A41; --tx2:#8A5A65; --tx3:#B37D89; --gold:#D88C9A; --gold-l:#F4AABC; --gold-d:#B56977; --bdr:rgba(216,140,154,.3); --bdr2:rgba(216,140,154,.6); }

html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--tx);font-family:'Noto Serif TC',Georgia,serif;overflow-x:hidden;margin:0;padding:0;}
.screen{display:none;min-height:100vh;flex-direction:column}

/* UI 層級優化：嚴格 Z-index 分層 */
#dlgOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:10010 !important;align-items:center;justify-content:center}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bdr);border-radius:30px;padding:10px 22px;z-index:10020 !important;opacity:0;transition:opacity .3s;pointer-events:none}
#bagOverlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.9);z-index:10000;flex-direction:column;align-items:center;padding:20px 16px;overflow-y:auto;}
#cardDetailOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 10015; flex-direction: column; align-items: center; justify-content: center; }

/* 抽卡與卡簿樣式 */
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;width:100%;}
.card-thumb{border-radius:10px;overflow:hidden;border:2px solid var(--bdr);position:relative;background:var(--bg2);aspect-ratio:.714;transition:.2s;cursor:pointer;}
.card-thumb:hover{border-color:var(--gold);transform:translateY(-2px)}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.new-badge{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;font-size:10px;font-weight:bold;padding:2px 6px;border-radius:8px;box-shadow:0 0 10px rgba(231,76,60,0.6);animation:pulse 1.5s infinite;z-index:5;}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes popIn { 0% {transform: scale(0.8); opacity:0;} 100% {transform: scale(1); opacity:1;} }

.detail-card { width: 300px; max-width: 85vw; border-radius: 20px; border: 4px solid var(--gold); background: var(--bg2); position: relative; overflow: hidden; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.detail-card img { width: 100%; display: block; }
.detail-info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 25px 15px 15px; text-align: center; }

/* 其他通用元件 */
.btn{padding:8px 16px;background:transparent;border:1px solid var(--bdr);border-radius:8px;color:var(--tx2);cursor:pointer;font-family:inherit;transition:.2s}
.btn.g{background:var(--gold);color:#000;font-weight:bold;border-color:var(--gold)}
.pack-box{width:200px;height:280px;background:linear-gradient(135deg,#2a1f00,#ffd700,#2a1f00);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:80px;cursor:pointer;box-shadow:0 0 30px rgba(212,175,55,0.4);}
.pack-box.shaking{animation:shake 0.5s infinite}
@keyframes shake { 0%{transform:rotate(0)} 25%{transform:rotate(-5deg)} 75%{transform:rotate(5deg)} 100%{transform:rotate(0)} }
</style>
</head>
<body>

<div id="studentScreen" class="screen">
  <div class="stu-quick-bar" style="display:flex;gap:8px;padding:10px;background:var(--bg1);">
    <button class="btn g" onclick="openCardPack()" style="flex:1">🌟 抽卡包</button>
    <button class="btn" onclick="openBag()" style="flex:1">🎒 我的卡簿</button>
  </div>

<div id="cardOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10005;flex-direction:column;align-items:center;justify-content:center;">
  <div id="pityCounter" style="color:var(--gold);font-size:14px;margin-bottom:15px;letter-spacing:1px;font-weight:bold;"></div>

</div>

</div>

<div id="cardDetailOverlay" onclick="this.style.display='none'">
  <div class="detail-card" id="detailCard">
    <img id="detailImg" src="">

      <div id="detailName" style="font-size:24px;font-weight:bold;color:#fff;margin-bottom:4px;"></div>
      <div id="detailTitle" style="font-size:14px;color:rgba(255,255,255,0.7);margin-bottom:8px;"></div>
      <div id="detailRarity" style="font-size:12px;font-weight:bold;display:inline-block;padding:2px 10px;border-radius:10px;background:rgba(255,255,255,0.1);"></div>
    </div>
  </div>
</div>

<script>
// Firebase 初始化與基本變數（請替換為你的 API Key）
const FBC = { /* ... 保持原樣 ... */ };
firebase.initializeApp(FBC);
const db = firebase.database();
const ROOT = "jjvs_v2";
const dbUpd = (p,v) => db.ref(`${ROOT}/${p}`).update(v);
const dbGet = p => db.ref(`${ROOT}/${p}`).once('value').then(s=>s.val());

let _currentStuId = "M3-01"; // 測試用，實際應從登入 Session 取得
const CARD_DB = [
  {id:'C01',name:'旭成',rarity:'SR', img:'CARDS/旭成SR_結果_結果.jpg', title:'三重金城武'},
  {id:'C04',name:'倩宇',rarity:'SSR',img:'CARDS/倩宇SSR_結果.jpg',     title:'法國號女神'},
  {id:'C07',name:'校長',rarity:'UR', img:'CARDS/校長UR_結果.jpg',      title:'莊敬大家長'},
  // ... 其他卡片
];

// 1. 抽卡邏輯 (保底機制)
async function triggerPackOpen() {
  const box = document.getElementById('packBox');
  if (box.classList.contains('shaking')) return;

  const d = await dbGet(`students/${_currentStuId}`);
  const pts = Number(d?.points || 0);
  if (pts < 1) { alert("⭐ 點數不足，快去練習集點吧！"); return; }

  box.classList.add('shaking');
  
  // 保底計數
  let pityCount = Number(d?.pityCount || 0) + 1;
  let rarity = 'R';
  const roll = Math.random() * 100;

  // 判定機率：UR 2%, SSR 13%, SR 40%, R 45%
  if (pityCount >= 10) { 
    rarity = Math.random() > 0.1 ? 'SSR' : 'UR'; // 第10抽觸發保底
    pityCount = 0; 
  } else {
    if (roll < 2) { rarity = 'UR'; pityCount = 0; }
    else if (roll < 15) { rarity = 'SSR'; pityCount = 0; }
    else if (roll < 55) rarity = 'SR';
  }

  const pool = CARD_DB.filter(c => c.rarity === rarity);
  const card = pool[Math.floor(Math.random() * pool.length)] || CARD_DB[0];

  // 儲存至資料庫
  const lk = Date.now();
  await dbUpd(`students/${_currentStuId}`, {
    points: pts - 1,
    pityCount: pityCount,
    [`inventory/${card.id}`]: (d?.inventory?.[card.id] || 0) + 1,
    [`newFlags/${card.id}`]: true // 標記為新卡
  });

  setTimeout(() => {
    box.classList.remove('shaking');
    showCardDetail(card, true); // 抽到卡時直接顯示細節
    updatePityUI(pityCount);
  }, 1000);
}

// 2. 渲染卡簿 (含 NEW 標籤)
async function renderBag() {
  const d = await dbGet(`students/${_currentStuId}`);
  const inv = d?.inventory || {};
  const newFlags = d?.newFlags || {};
  const grid = document.getElementById('bagCardGrid');
  grid.innerHTML = '';

  CARD_DB.forEach(card => {
    const count = inv[card.id] || 0;
    if (count > 0) {
      const isNew = newFlags[card.id] === true;
      const div = document.createElement('div');
      div.className = 'card-thumb';
      div.innerHTML = `
        ${isNew ? '<div class="new-badge">NEW!</div>' : ''}
        <img src="${card.img}">
        <div class="ct-rarity ct-rarity-${card.rarity}">${card.rarity}</div>
        <div class="ct-name">${card.name}</div>
        <div class="ct-count">x${count}</div>
      `;
      div.onclick = () => showCardDetail(card);
      grid.appendChild(div);
    }
  });
}

// 3. 顯示卡片放大檢視 (消除 NEW)
async function showCardDetail(card, isFromDraw = false) {
  const overlay = document.getElementById('cardDetailOverlay');
  document.getElementById('detailImg').src = card.img;
  document.getElementById('detailName').textContent = card.name;
  document.getElementById('detailTitle').textContent = card.title;
  document.getElementById('detailRarity').textContent = card.rarity;
  document.getElementById('detailRarity').style.color = getRarityColor(card.rarity);
  
  overlay.style.display = 'flex';

  // 點開細節後，非抽卡狀態下消除資料庫中的 NEW 標記
  if (!isFromDraw) {
    await dbUpd(`students/${_currentStuId}/newFlags`, { [card.id]: null });
    renderBag(); 
  }
}

function updatePityUI(count) {
  document.getElementById('pityCounter').textContent = `SSR 保底進度：${count}/10`;
}

function getRarityColor(r) {
  return { R: '#3498DB', SR: '#9B59B6', SSR: '#D4AF37', UR: '#FF6B6B' }[r] || '#fff';
}

function openCardPack() {
  document.getElementById('cardOverlay').style.display = 'flex';
  dbGet(`students/${_currentStuId}/pityCount`).then(c => updatePityUI(c || 0));
}

function closeCardOverlay() { document.getElementById('cardOverlay').style.display = 'none'; }
function openBag() { document.getElementById('bagOverlay').style.display = 'flex'; renderBag(); }
function closeBag() { document.getElementById('bagOverlay').style.display = 'none'; }

</script>
</body>
</html>
