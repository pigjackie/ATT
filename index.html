<!DOCTYPE html>

    <style>
        :root { --primary: #FFD700; --bg: #FFF9C4; --text: #333; --glass: rgba(255, 255, 255, 0.9); }
        body { background: var(--bg); color: var(--text); font-family: "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; }
        
        /* 門禁畫面 */
        #gate-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, var(--primary), #FFB300); }
        .gate-card { background: #fff; padding: 35px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 85%; max-width: 380px; text-align: center; }

        /* 主程式畫面 */
        #app-screen { display: none; padding: 10px; }
        header { text-align: center; background: var(--primary); padding: 20px; border-radius: 0 0 40px 40px; margin: -10px -10px 15px -10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* 功能說明 */
        .manual-box { background: #fff; padding: 15px; border-radius: 15px; border: 2px dashed #FFD700; margin-bottom: 15px; font-size: 0.9rem; line-height: 1.6; display: none; }

        /* 網格系統 */
        .student-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; }
        .s-box { background: #fff; border-radius: 18px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .s-dot { width: 55px; height: 55px; border-radius: 15px; margin: 0 auto 10px; border: 3px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .s-name { font-size: 1.1rem; font-weight: bold; }

        /* 按鈕風格 */
        .btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-save { background: #000; color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: sticky; bottom: 20px; z-index: 100; border: 2px solid var(--primary); }
        .btn-gold { background: var(--primary); color: #000; }

        /* 詳細面板 */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 450px; background: #fff; border-radius: 30px; padding: 25px; z-index: 1001; box-shadow: 0 25px 70px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; }

        /* 專業數據卡 */
        .stat-card { display: flex; justify-content: space-around; background: #f8f9fa; padding: 15px; border-radius: 15px; margin-top: 15px; }
        .stat-item { text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: bold; color: #d48806; }

        /* 罰抄樣式 */
        .task-row { background: #eee; padding: 10px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .progress-bar { height: 10px; background: #ddd; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: 0.3s; }

        .bg-present { background:#2ecc71; } .bg-late { background:#f1c40f; } .bg-late-1 { background:#e67e22; } .bg-absent { background:#e74c3c; } .bg-leave { background:#3498db; }
    </style>
</head>

        function authGate(type) {
            if (type === 'admin') {

                if (btoa(p) === "MDkwMg==") { // 0902

                if (!found) return alert("名單中無此學生");
                db.ref(`jjvs_v7_auth/${found.id}`).once('value', snap => {
                    const data = snap.val();
                    if (!data) {
                        const np = prompt("第一次登入，請設定密碼：");
                        db.ref(`jjvs_v7_auth/${found.id}`).set({ p: btoa(np) });
                        curStudent = found; role = 'student'; startApp();
                    } else {
                        const cp = prompt("輸入您的密碼：");
                        if (btoa(cp) === data.p) { curStudent = found; role = 'student'; startApp(); }
                        else { alert("密碼錯誤"); }
                    }
                });
            }

        }

        function initTabs() {
            const grps = ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"];
            const tabBox = document.getElementById('tab-bar');
            tabBox.innerHTML = "";
            grps.forEach(g => {
                const b = document.createElement('button');
                b.style.cssText = "white-space:nowrap; padding:10px 20px; border-radius:20px; border:2px solid #FFD700; background:#fff; font-weight:bold;";
                if(g === currentGrp) b.style.background = "#FFD700";
                b.innerText = g;
                b.onclick = () => { currentGrp = g; initTabs(); renderGrid(); };
                tabBox.appendChild(b);
            });
        }

        function loadCloudData() {
            selDate = document.getElementById('target-date').value;
            db.ref('jjvs_v7_cloud').on('value', snap => {
                window.master = snap.val() || {};
                localAttendance = {...(window.master.attendance && window.master.attendance[selDate])};
                renderGrid();
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid');
            grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAttendance[s.id] || 'bg-present';
                const div = document.createElement('div');
                div.className = "s-box";
                div.innerHTML = `
                    <div class="s-dot ${st}" id="dot-${s.id}" onclick="localCycle('${s.id}')"></div>
                    <div class="s-name" onclick="openDetail('${s.id}')">${s.name}</div>
                `;
                grid.appendChild(div);
            });
        }

        function localCycle(sid) {
            const dot = document.getElementById(`dot-${sid}`);
            let cur = localAttendance[sid] || 'bg-present';
            let next = statusColors[(statusColors.indexOf(cur) + 1) % statusColors.length];
            localAttendance[sid] = next;
            dot.className = `s-dot ${next}`;
            document.getElementById('save-btn').innerText = "💾 內容已變更，請按此儲存";
            document.getElementById('save-btn').style.background = "#FF4500"; // 變更顏色提示要儲存
        }

        function syncToCloud() {
            db.ref(`jjvs_v7_cloud/attendance/${selDate}`).set(localAttendance).then(() => {
                alert("今日出缺勤紀錄已同步至雲端！");
                document.getElementById('save-btn').innerText = "✅ 已存至雲端";
                document.getElementById('save-btn').style.background = "#000";
            });
        }

        function openDetail(sid) {
            const s = students.find(x => x.id === sid);
            document.getElementById('m-name').innerText = s.name;
            const prof = (window.master.profiles && window.master.profiles[sid]) || { msg: "尚未留言", tasks: [] };
            
            // 1. 計算到課率
            const att = window.master.attendance || {};
            let total = 0, present = 0;
            Object.keys(att).forEach(d => {
                if(att[d][sid]) {
                    total++;
                    if(att[d][sid] === 'bg-present') present++;
                }
            });
            document.getElementById('stat-attendance').innerText = total === 0 ? "0%" : Math.round((present/total)*100) + "%";
            
            // 2. 罰抄進度與訊息
            document.getElementById('m-msg').innerText = prof.msg || "無訊息";
            renderTasks(sid, prof.tasks || []);

            document.getElementById('admin-editor').style.display = (role === 'admin') ? 'block' : 'none';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('detail-modal').style.display = 'block';
        }

        function renderTasks(sid, tasks) {
            const box = document.getElementById('m-task-list');
            box.innerHTML = "";
            let totalDone = 0, totalNeed = 0;
            tasks.forEach((t, i) => {
                totalDone += parseInt(t.cur);
                totalNeed += parseInt(t.max);
                const percent = Math.round((t.cur/t.max)*100);
                box.innerHTML += `
                    <div class="task-row" onclick="incrementTask('${sid}', ${i})">
                        <div style="flex:1">
                            <strong>${t.name}</strong><br>
                            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                        </div>
                        <div style="margin-left:10px; font-weight:bold;">${t.cur} / ${t.max}</div>
                    </div>`;
            });
            document.getElementById('stat-tasks').innerText = `${totalDone} / ${totalNeed}`;
        }

        function addTask() {
            const name = document.getElementById('task-name').value;
            const max = document.getElementById('task-count').value;
            if(!name || !max) return;
            const sid = students.find(x => x.name === document.getElementById('m-name').innerText).id;
            const tasks = (window.master.profiles && window.master.profiles[sid] && window.master.profiles[sid].tasks) || [];
            tasks.push({ name, max, cur: 0 });
            db.ref(`jjvs_v7_cloud/profiles/${sid}/tasks`).set(tasks);
        }

        function incrementTask(sid, idx) {
            if(role !== 'admin') return;
            const tasks = window.master.profiles[sid].tasks;
            if(tasks[idx].cur < tasks[idx].max) {
                tasks[idx].cur = parseInt(tasks[idx].cur) + 1;
                db.ref(`jjvs_v7_cloud/profiles/${sid}/tasks`).set(tasks);
            }
        }

        function updateMsg() {
            const msg = document.getElementById('admin-msg').value;
            const sid = students.find(x => x.name === document.getElementById('m-name').innerText).id;
            db.ref(`jjvs_v7_cloud/profiles/${sid}/msg`).set(msg);
            alert("私訊已更新");
        }

        function toggleManual() {
            const m = document.getElementById('manual');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }

        function closeModal() {
            if(role === 'student') return;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('detail-modal').style.display = 'none';
        }

        function exportProReport() {
            const exp = [];
            const att = window.master.attendance || {};
            Object.keys(att).sort().forEach(date => {
                students.forEach(s => {
                    if (att[date][s.id]) {
                        exp.push({ "日期": date, "班級": s.group, "姓名": s.name, "出缺勤": statusNames[att[date][s.id]] });
                    }
                });
            });
            const ws = XLSX.utils.json_to_sheet(exp);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "莊敬音樂科專業報表");
            XLSX.writeFile(wb, `學習紀錄總表_${new Date().toLocaleDateString()}.xlsx`);
        }
    </script>
</body>
</html>
