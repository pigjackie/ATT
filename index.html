<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary-yellow: #FFD700;
            --bg-yellow: #FFF9C4;
            --dark-gray: #333;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            background-color: var(--bg-yellow);
            /* 加入音符浮水印 */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='40' font-family='Arial' font-size='25' opacity='0.08'%3E𝄞%3C/text%3E%3Ctext x='40' y='20' font-family='Arial' font-size='15' opacity='0.08'%3E♪%3C/text%3E%3C/svg%3E");
            color: var(--dark-gray);
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 25px 0;
            background: var(--primary-yellow);
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: -15px -15px 20px -15px;
        }

        h1 { margin: 0; font-size: 2.2rem; color: #000; text-shadow: 1px 1px 2px #fff; }
        .music-icons { font-size: 1.5rem; margin-top: 10px; }

        /* 導覽列：班級切換 */
        .nav-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 15px;
            margin-bottom: 10px;
            scrollbar-width: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }

        .nav-btn {
            white-space: nowrap;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #fff;
            border: 2px solid var(--primary-yellow);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-btn.active { background: var(--primary-yellow); color: #000; border-color: #000; }

        /* 功能按鈕 */
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .action-btn {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 15px;
            border: none;
            background: #fff;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* 學生卡片 */
        .student-card {
            background: var(--glass);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .status-box {
            width: 65px;
            height: 65px;
            border-radius: 15px;
            border: 3px solid #fff;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .student-info { font-size: 1.6rem; font-weight: bold; flex-grow: 1; }

        /* 顏色狀態 */
        .bg-present { background-color: #2ecc71; } /* 綠 */
        .bg-late { background-color: #f1c40f; }    /* 黃 */
        .bg-late-1 { background-color: #e67e22; }  /* 橘 */
        .bg-absent { background-color: #e74c3c; }  /* 紅 */
        .bg-leave { background-color: #3498db; }   /* 藍 */

        /* 罰抄區域 */
        .task-list { margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 10px; }
        .task-item { font-size: 1.3rem; padding: 5px 0; display: flex; align-items: center; gap: 8px; }
        .completed { text-decoration: line-through; color: #aaa; }

        /* 管理輸入框 */
        .admin-controls { display: none; margin-top: 10px; }
        input[type="text"] {
            width: 70%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 1.1rem;
        }
    </style>
</head>

            {id: "2P02", name: "02簡佳嫻", group: "演二樸"},{id: "2P03", name: "03黃品妤", group: "演二樸"},
            // 音一莊
            {id: "1A01", name: "01任恩予", group: "音一莊"},{id: "1A02", name: "02李孟臻", group: "音一莊"},{id: "1A03", name: "03潘縈汐", group: "音一莊"},{id: "1A04", name: "04謝幸芙", group: "音一莊"},{id: "1A05", name: "05李昕柔", group: "音一莊"},{id: "1A06", name: "06盧丞菲", group: "音一莊"},{id: "1A07", name: "07林欣霈", group: "音一莊"},{id: "1A08", name: "08林耘瑄", group: "音一莊"},{id: "1A09", name: "09林詩翡", group: "音一莊"},{id: "1A10", name: "10姜妤捷", group: "音一莊"},{id: "1A11", name: "11張筑笹", group: "音一莊"},{id: "1A12", name: "12廖聿淓", group: "音一莊"},{id: "1A13", name: "13曾彥瑄", group: "音一莊"},{id: "1A14", name: "14盧瑗", group: "音一莊"},{id: "1A15", name: "15鍾欣庭", group: "音一莊"},{id: "1A16", name: "16黃郁晴", group: "音一莊"},{id: "1A17", name: "17詹中愷", group: "音一莊"},{id: "1A18", name: "18鄭誌浩", group: "音一莊"},{id: "1A19", name: "19謝松煇", group: "音一莊"},{id: "1A20", name: "20羅子超", group: "音一莊"},{id: "1A21", name: "21羅笠準", group: "音一莊"},{id: "1A22", name: "22蘇冠綸", group: "音一莊"},{id: "1A23", name: "23蘇祺翔", group: "音一莊"},{id: "1A24", name: "24劉軒豪", group: "音一莊"},{id: "1A25", name: "25吳泓毅", group: "音一莊"},{id: "1A26", name: "26李維璟", group: "音一莊"},{id: "1A27", name: "27林孝廷", group: "音一莊"},{id: "1A28", name: "28林紹謙", group: "音一莊"},{id: "1A29", name: "29胡宇哲", group: "音一莊"},{id: "1A30", name: "30楊順發", group: "音一莊"},{id: "1A31", name: "31張又禾", group: "音一莊"},{id: "1A32", name: "32張允磊", group: "音一莊"},{id: "1A33", name: "33黃靖勛", group: "音一莊"},
            // 老師
            {id: "TEA", name: "蕭旭成", group: "老師專區"}
        ];

        let currentGroup = "音三莊";
        let isAdmin = false;
        const states = ['bg-present', 'bg-late', 'bg-late-1', 'bg-absent', 'bg-leave'];

        // 3. 初始化導覽列
        const nav = document.getElementById('nav-tabs');
        classNames.forEach(name => {
            const btn = document.createElement('button');
            btn.className = `nav-btn ${name === currentGroup ? 'active' : ''}`;
            btn.innerText = name;
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentGroup = name;
                refreshList();
            };
            nav.appendChild(btn);
        });

        // 4. 資料庫監聽與刷新
        db.ref('class_system_data').on('value', (snapshot) => {
            window.allData = snapshot.val() || {};
            refreshList();
        });

        function refreshList() {
            const listDiv = document.getElementById('student-list');
            listDiv.innerHTML = "";
            const filtered = students.filter(s => s.group === currentGroup);

            filtered.forEach(s => {
                const sData = window.allData[s.id] || { status: 'bg-present', tasks: [] };
                const card = document.createElement('div');
                card.className = "student-card";
                
                let taskHtml = "";
                if (sData.tasks) {
                    sData.tasks.forEach((t, i) => {
                        taskHtml += `<div class="task-item ${t.done ? 'completed' : ''}" onclick="toggleTask('${s.id}', ${i})">✎ ${t.content}</div>`;
                    });
                }

                card.innerHTML = `
                    <div class="status-box ${sData.status}" onclick="cycleStatus('${s.id}', '${sData.status}')"></div>
                    <div class="student-info">${s.name}</div>
                    <div id="tasks-container-${s.id}">${taskHtml}</div>
                    <div class="admin-controls" id="admin-${s.id}">
                        <input type="text" id="input-${s.id}" placeholder="新罰抄任務...">
                        <button onclick="addTask('${s.id}')" style="padding:10px; background:#FFD700; border:none; border-radius:5px;">新增</button>
                    </div>
                `;
                listDiv.appendChild(card);
                if(isAdmin) document.getElementById(`admin-${s.id}`).style.display = "block";
            });
        }

        // 5. 功能控制
        function cycleStatus(id, current) {
            if (!isAdmin) return;
            let next = states[(states.indexOf(current) + 1) % states.length];
            db.ref(`class_system_data/${id}/status`).set(next);
        }

        function toggleAdmin() {
            if (!isAdmin) {
                if (prompt("請輸入管理密碼") === "0902") {
                    isAdmin = true;
                    refreshList();
                }
            } else {
                isAdmin = false;
                refreshList();
            }
        }

        function addTask(id) {
            const val = document.getElementById(`input-${id}`).value;
            if (!val) return;
            const tasks = (window.allData[id] && window.allData[id].tasks) || [];
            tasks.push({ content: val, done: false });
            db.ref(`class_system_data/${id}/tasks`).set(tasks);
        }

        function toggleTask(id, idx) {
            if (!isAdmin) return;
            const tasks = window.allData[id].tasks;
            tasks[idx].done = !tasks[idx].done;
            db.ref(`class_system_data/${id}/tasks`).set(tasks);
        }

        // 6. Excel 匯出
        function exportExcel() {
            const statusMap = { 'bg-present': '出席', 'bg-late': '遲到', 'bg-late-1': '一節遲', 'bg-absent': '缺席', 'bg-leave': '請假' };
            const exportData = students.map(s => {
                const sData = window.allData[s.id] || { status: 'bg-present', tasks: [] };
                return {
                    "班級": s.group,
                    "座號姓名": s.name,
                    "今日出缺勤": statusMap[sData.status],
                    "罰抄紀錄": sData.tasks ? sData.tasks.map(t => `${t.content}${t.done?'(已交)':'(未交)'}`).join('; ') : "無"
                };
            });

            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "學生表現總表");
            XLSX.writeFile(wb, `音演三莊學習紀錄_${new Date().toLocaleDateString()}.xlsx`);
        }
    </script>
</body>
</html>
