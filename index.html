<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音樂科管理 V42</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --black: #080808; --safe: #27AE60; --danger: #E74C3C; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black); color: #fff; margin: 0; font-family: "PingFang TC", sans-serif; }
        header { background: #000; color: var(--gold); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        
        #loginScreen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: #fff; padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; color: #333; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .s-box { background: #fff; border-radius: 20px; padding: 15px 5px; text-align: center; position: relative; color: #333; }
        .s-dot { aspect-ratio: 1/1; width: 55px; margin: 0 auto 10px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 900; color: #fff; cursor: pointer; }
        .s-name { font-weight: 900; font-size: 1rem; color: #000; }
        .s-points { position: absolute; top: -5px; right: -5px; background: #FF4500; color: #fff; font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; font-weight: bold; border: 1.5px solid #fff; }
        
        .batch-check { position: absolute; top: 10px; left: 10px; width: 22px; height: 22px; z-index: 10; display: none; }
        #batchBar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; padding: 20px; border-top: 2px solid var(--gold); display: none; z-index: 5000; text-align: center; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: #fff; border-radius: 30px; padding: 20px; z-index: 10005; color: #333; max-height: 80vh; overflow-y: auto; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10001; }
        
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-red { background: var(--danger); color: #fff; }
        .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; border: 1px solid var(--gold); background: transparent; color: var(--gold); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ccc; }
        .tab-btn { padding: 8px 15px; border-radius: 15px; border: none; background: #eee; margin-right: 5px; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: #fff; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h2 style="margin:0;">莊敬音樂科</h2>
        <p style="color:var(--gold); font-weight:bold;">雲端行政系統 V42</p>
        <input type="text" id="lAcc" placeholder="姓名 或 帳號">
        <input type="password" id="lPw" placeholder="密碼">
        <button class="btn btn-gold" onclick="doAuth()">登入管理</button>
    </div>
</div>

<div id="appScreen" style="display:none;">
    <header>
        <h3 id="lUser">載入中...</h3>
        <div style="display:flex; justify-content:center; gap:8px; margin-top:10px;">
            <button class="btn-sm" onclick="toggleBatch()">批次模式</button>
            <button id="resetAllBtn" class="btn-sm" style="display:none; color:red; border-color:red;" onclick="resetAll()">🚨 全校重置</button>
            <button class="btn-sm" onclick="location.reload()">登出</button>
        </div>
    </header>
    <div id="tabs" style="display:flex; overflow-x:auto; padding: 15px 10px 5px;"></div>
    <div id="sGrid" class="grid"></div>
    <div id="batchBar">
        <span style="color:var(--gold); font-weight:bold; margin-bottom:10px; display:block;">已選中學生</span>
        <button class="btn btn-gold" onclick="batchAdd(1)">✨ 全員加 1 星</button>
        <button class="btn" style="background:#444; color:#fff;" onclick="toggleBatch()">取消</button>
    </div>
</div>

<div id="studentScreen" style="display:none; padding: 40px 20px; text-align:center;">
    <div style="font-size:4rem;">🎼</div>
    <div id="sCard" style="background:#fff; border-radius:25px; padding:30px; color:#333; margin: 20px 0;">載入中...</div>
    <button class="btn btn-gold" onclick="location.reload()">重新整理</button>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
    <h2 id="mName" style="text-align:center;">姓名</h2>
    <div id="mStats" style="text-align:center; font-size:1.2rem; margin-bottom:20px;"></div>
    <div id="adminTools" style="display:none; border-top:1px solid #eee; padding-top:15px;">
        <button class="btn btn-gold" onclick="adj(1)">＋1 點</button>
        <button class="btn" style="background:#eee;" onclick="adj(-1)">－1 點</button>
        <button class="btn btn-red" onclick="resetOne()">🚨 重置此生</button>
    </div>
    <button class="btn" style="background:#000; color:#fff;" onclick="closeModal()">關閉</button>
</div>

<script>
    const M_N = "蕭旭成", M_P = "0902", DB = "jjvs_v_final_cloud";
    const config = { 
        apiKey: "AIzaSyC-_lE6oDtZMqGK_JQOx7StGTkzjqU1LQw", 
        databaseURL: "https://jjvs-att-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    let students = [], role = '', adm = {n:'', cls:'ALL'}, curSid = null, curGrp = '音三莊', isBatch = false;

    function doAuth() {
        const acc = document.getElementById('lAcc').value.trim();
        const pw = document.getElementById('lPw').value.trim();

        if(acc === M_N && pw === M_P) {
            role = 'admin'; adm = {n:M_N, cls:'ALL'}; startApp(); return;
        }

        // 學生或其它老師登入邏輯
        db.ref(`${DB}/students`).once('value', sn => {
            students = sn.val() || [];
            const f = students.find(s => s.name === acc);
            if(f) {
                db.ref(`${DB}/auth/${f.id}`).once('value', aSn => {
                    const auth = aSn.val() || {p:'0000'};
                    if(pw === auth.p) { role='student'; curSid = f.id; startApp(); }
                    else alert("密碼錯誤");
                });
            } else alert("查無此人");
        });
    }

    function startApp() {
        document.getElementById('loginScreen').remove(); // 物理移除登入框
        if(role === 'admin') {
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('lUser').innerText = `🏛️ 行政中心 - ${adm.n}`;
            if(adm.n === M_N) document.getElementById('resetAllBtn').style.display = 'inline-block';
            loadData();
        } else {
            document.getElementById('studentScreen').style.display = 'block';
            loadStudentView();
        }
    }

    function loadData() {
        db.ref(`${DB}/students`).once('value', sn => {
            students = sn.val() || [];
            renderTabs();
            syncUpdates();
        });
    }

    function syncUpdates() {
        db.ref(`${DB}/profiles`).on('value', sn => {
            window.profiles = sn.val() || {};
            renderGrid();
        });
    }

    function renderTabs() {
        const grps = ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"];
        const t = document.getElementById('tabs');
        t.innerHTML = '';
        grps.forEach(g => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${g === curGrp ? 'active' : ''}`;
            btn.innerText = g;
            btn.onclick = () => { curGrp = g; renderTabs(); renderGrid(); };
            t.appendChild(btn);
        });
    }

    function renderGrid() {
        const g = document.getElementById('sGrid');
        g.innerHTML = '';
        students.filter(s => s.cls === curGrp).forEach(s => {
            const p = window.profiles[s.id] || {points:0};
            g.innerHTML += `
                <div class="s-box">
                    <input type="checkbox" class="batch-check" value="${s.id}" style="display:${isBatch?'block':'none'}">
                    <div class="s-points">${p.points}P</div>
                    <div class="s-dot" style="background:var(--gold)" onclick="openD('${s.id}')">${s.name[0]}</div>
                    <div class="s-name">${s.name}</div>
                </div>`;
        });
    }

    function toggleBatch() {
        isBatch = !isBatch;
        document.getElementById('batchBar').style.display = isBatch ? 'block' : 'none';
        renderGrid();
    }

    function batchAdd(val) {
        const checks = document.querySelectorAll('.batch-check:checked');
        if(checks.length === 0) return alert("請先勾選學生");
        const updates = {};
        checks.forEach(c => {
            const sid = c.value;
            const curP = (window.profiles[sid] ? window.profiles[sid].points : 0);
            updates[`${DB}/profiles/${sid}/points`] = curP + val;
        });
        db.ref().update(updates).then(() => {
            alert(`成功為 ${checks.length} 位學生加點`);
            toggleBatch();
        });
    }

    function openD(id) {
        curSid = id;
        const s = students.find(x => x.id === id);
        const p = window.profiles[id] || {points:0};
        document.getElementById('mName').innerText = s.name;
        document.getElementById('mStats').innerText = `目前星等：${p.points} ⭐`;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
        if(role === 'admin') document.getElementById('adminTools').style.display = 'block';
    }

    function adj(v) {
        const cur = (window.profiles[curSid] ? window.profiles[curSid].points : 0);
        db.ref(`${DB}/profiles/${curSid}/points`).set(Math.max(0, cur + v));
    }

    function resetOne() {
        if(confirm("確定要重置這位學生的所有點數嗎？")) {
            db.ref(`${DB}/profiles/${curSid}`).remove().then(() => closeModal());
        }
    }

    function resetAll() {
        if(confirm("🚨 警告：這將會清空全校學生的獎懲點數與紀錄！確定執行？")) {
            db.ref(`${DB}/profiles`).remove().then(() => alert("全校數據已歸零"));
        }
    }

    function loadStudentView() {
        db.ref(`${DB}/profiles/${curSid}`).on('value', sn => {
            const p = sn.val() || {points:0};
            const s = students.find(x => x.id === curSid);
            document.getElementById('sCard').innerHTML = `
                <h2 style="margin:0; color:var(--gold);">${s.name}</h2>
                <p>${s.cls}</p>
                <hr>
                <div style="font-size:2.5rem; font-weight:bold;">${p.points} <small style="font-size:1rem;">⭐</small></div>
                <p>個人榮譽點數</p>
            `;
        });
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('modal').style.display = 'none';
    }
</script>

</body>
</html>
