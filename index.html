            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;

        /* 滿版質感門禁 */
        #gate-screen { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
            width: 100%; position: fixed; top: 0; left: 0; z-index: 10000;
        }
        .gate-card { 
            background: #fff; padding: 50px 30px; border-radius: 40px;
            width: 85%; max-width: 380px; text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            border: 4px solid var(--royal-gold);
        }

        /* 主導航欄 */
        header { 
            background: linear-gradient(180deg, #1A1A1A 0%, #000 100%);
            color: var(--royal-gold); padding: 30px 15px; text-align: center;
            border-radius: 0 0 40px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: sticky; top: 0; z-index: 1000;
        }

        /* 絕對對齊 1x3 網格 */
        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 12px; padding: 15px; width: 100%; box-sizing: border-box;
        }
        .s-box { 
            background: #fff; border-radius: 20px; padding: 15px 5px; 
            text-align: center; box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
            border: 1.5px solid rgba(212,175,55,0.2); position: relative;
        }
        .s-dot { 
            aspect-ratio: 1/1; width: 80%; max-width: 60px; margin: 0 auto 8px;
            border-radius: 18px; border: 4px solid #fff; box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 900; color: #fff;
        }
        .s-name { font-weight: bold; font-size: 0.9rem; color: #111; }
        .s-points { position: absolute; top: -5px; right: -5px; background: #FF4500; color: #fff; font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; font-weight: bold; border: 1.5px solid #fff; }

        /* 警衛查驗畫面 */

            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;

        .btn-gold { background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); color: #fff; }
        .btn-dark { background: #111; color: #fff; border: 1.5px solid var(--royal-gold); }
        
        .section-title { font-size: 1.1rem; font-weight: bold; color: #000; border-left: 6px solid var(--royal-gold); padding-left: 12px; margin: 20px 0 10px 0; text-align: left; }

        .slot-active { background: #fff; border: 2px solid var(--royal-gold); box-shadow: 0 0 10px rgba(212,175,55,0.4); }

            {id: "1A01", name: "01任恩予", group: "音一莊"},{id: "1A02", name: "02李孟臻", group: "音一莊"},{id: "1A03", name: "03潘縈汐", group: "音一莊"},{id: "1A04", name: "04謝幸芙", group: "音一莊"},{id: "1A05", name: "05李昕柔", group: "音一莊"},{id: "1A06", name: "06盧丞菲", group: "音一莊"},{id: "1A07", name: "07林欣霈", group: "音一莊"},{id: "1A08", name: "08林耘瑄", group: "音一莊"},{id: "1A09", name: "09林詩翡", group: "音一莊"},{id: "1A10", name: "10姜妤捷", group: "音一莊"},{id: "1A11", name: "11張筑笹", group: "音一莊"},{id: "1A12", name: "12廖聿淓", group: "音一莊"},{id: "1A13", name: "13曾彥瑄", group: "音一莊"},{id: "1A14", name: "14盧瑗", group: "音一莊"},{id: "1A15", name: "15鍾欣庭", group: "音一莊"},{id: "1A16", name: "16黃郁晴", group: "音一莊"},{id: "1A17", name: "17詹中愷", group: "音一莊"},{id: "1A18", name: "18鄭誌浩", group: "音一莊"},{id: "1A19", name: "19謝松煇", group: "音一莊"},{id: "1A20", name: "20羅子超", group: "音一莊"},{id: "1A21", name: "21羅笠準", group: "音一莊"},{id: "1A22", name: "22蘇冠綸", group: "音一莊"},{id: "1A23", name: "23蘇祺翔", group: "音一莊"},{id: "1A24", name: "24劉軒豪", group: "音一莊"},{id: "1A25", name: "25吳泓毅", group: "音一莊"},{id: "1A26", name: "26李維璟", group: "音一莊"},{id: "1A27", name: "27林孝廷", group: "音一莊"},{id: "1A28", name: "28林紹謙", group: "音一莊"},{id: "1A29", name: "29胡宇哲", group: "音一莊"},{id: "1A30", name: "30楊順發", group: "音一莊"},{id: "1A31", name: "31張又禾", group: "音一莊"},{id: "1A32", name: "32張允磊", group: "音一莊"},{id: "1A33", name: "33黃靖勛", group: "音一莊"}
        ];

        // 🟢 登入優先邏輯
        function doAuth() {
            const acc = document.getElementById('login-acc').value.trim();
            const pw = document.getElementById('login-pw').value.trim();

            // 🔴 修正：蕭旭成 0902 直接通過，不查庫
            if(acc === MASTER_ADMIN && pw === MASTER_PASS) {
                role = 'admin'; adminInfo = { n: '蕭旭成', cls: 'ALL' };
                saveSess('admin', null, '蕭旭成', 'ALL'); start();
                return;
            }

            // 2. 教師庫
            const pwH = CryptoJS.SHA256(pw).toString();
            db.ref(`jjvs_v24_admins/${acc}`).once('value', sn => {
                const d = sn.val();
                if(d && pwH === d.p) {
                    role = 'admin'; adminInfo = { n: d.n, cls: d.cls };
                    saveSess('admin', null, d.n, d.cls); start();
                } else {
                    // 3. 學生庫
                    const f = students.find(s => s.name.includes(acc));
                    if(f) {
                        db.ref(`jjvs_v24_auth/${f.id}`).once('value', sn2 => {
                            const authData = sn2.val() || {p: '0000'};
                            if(pw === authData.p) {
                                if(pw === '0000') {
                                    const np = prompt("請修改預設密碼 0000 為新密碼：");
                                    if(!np || np === '0000') return alert("修改失敗");
                                    db.ref(`jjvs_v24_auth/${f.id}`).set({p: np});
                                    alert("修改成功，請重新登入");
                                } else {
                                    curStudent = f; role = 'student'; saveSess('student', f.id); start();
                                }
                            } else alert("密碼錯誤");
                        });
                    } else alert("查無此帳號或學生");
                }
            });
        }

        function saveSess(r, sid, n, cls) {
            localStorage.setItem('jjvs_role', r); localStorage.setItem('jjvs_sid', sid);
            localStorage.setItem('jjvs_admin_name', n); localStorage.setItem('jjvs_admin_cls', cls);
        }

        window.onload = () => {
            const r = localStorage.getItem('jjvs_role');
            if(r === 'admin') {
                role = 'admin'; adminInfo = { n: localStorage.getItem('jjvs_admin_name'), cls: localStorage.getItem('jjvs_admin_cls') };
                start();
            } else if(r === 'student') {
                curStudent = students.find(s => s.id === localStorage.getItem('jjvs_sid'));
                role = 'student'; start();
            }
        };

        function logout() { localStorage.clear(); location.reload(); }

        function start() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('target-date').value = new Date().toISOString().split('T')[0];
            if(role === 'admin') {
                document.getElementById('admin-view').style.display = 'block';
                if(adminInfo.n === '蕭旭成') document.getElementById('admin-setup-btn').style.display = 'inline-block';
                initTabs();
            } else {
                document.getElementById('student-view').style.display = 'block';
                document.getElementById('welcome-name').innerText = curStudent.name + " 同學";
                openDetail(curStudent.id);
            }
            loadCloud();
        }

        function initTabs() {
            const tb = document.getElementById('tabs'); tb.innerHTML = "";
            const grps = adminInfo.cls === 'ALL' ? ["音三莊", "演三莊", "音二莊", "演二樸", "音一莊"] : [adminInfo.cls];
            currentGrp = grps[0];
            grps.forEach(g => {
                const b = document.createElement('button'); b.innerText = g;
                b.className = `tab-btn ${g === currentGrp ? 'active' : ''}`;
                b.onclick = () => { currentGrp = g; Array.from(tb.children).forEach(c=>c.classList.remove('active')); b.classList.add('active'); renderGrid(); };
                tb.appendChild(b);
            });
        }

        function loadCloud() {
            db.ref('jjvs_v24_cloud').on('value', snap => {
                window.master = snap.val() || {};
                const sd = document.getElementById('target-date').value;
                localAtt = {...(window.master.attendance && window.master.attendance[sd])};
                renderGrid(); renderLeaves();
                if(curDetailSid) refreshModalUI(curDetailSid);
                document.getElementById('login-info').innerText = role === 'admin' ? `${adminInfo.n} 老師 (皇家加密同步)` : "皇家學員："+curStudent.name;
            });
        }

        function renderGrid() {
            if (role !== 'admin') return;
            const grid = document.getElementById('student-grid'); grid.innerHTML = "";
            students.filter(s => s.group === currentGrp).forEach(s => {
                const st = localAtt[s.id] || 'bg-present';
                const pts = (window.master.profiles?.[s.id]?.points) || 0;
                const div = document.createElement('div'); div.className = "s-box";
                div.innerHTML = `<div class="s-points">${pts}P</div><div class="s-dot ${st}" id="dot-${s.id}" onclick="localToggle('${s.id}')">${statusNames[st]}</div><div class="s-name" onclick="openDetail('${s.id}')">${s.name}</div>`;
                grid.appendChild(div);
            });
        }

        function localToggle(sid) {
            let cur = localAtt[sid] || 'bg-present';
            let nextIdx = (statusColors.indexOf(cur) + 1) % statusColors.length;
            let next = statusColors[nextIdx]; localAtt[sid] = next;
            document.getElementById(`dot-${sid}`).className = `s-dot ${next}`;
            document.getElementById(`dot-${sid}`).innerText = statusNames[next];
            if(next === 'bg-late') {
                const curP = window.master.profiles?.[sid]?.points || 0;
                db.ref(`jjvs_v24_cloud/profiles/${sid}/points`).set(Math.max(0, curP - 1));
                addLog(sid, "💀 遲到自動扣點", `[系統處分 - ${adminInfo.n} 點名]`);
            }
        }

        function syncCloud() {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v24_cloud/attendance/${sd}`).set(localAtt).then(() => alert("點名數據同步成功"));
        }

        function openDetail(sid) {
            curDetailSid = sid; document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            if (window.master) refreshModalUI(sid);
        }

        function refreshModalUI(sid) {
            const s = students.find(x => x.id === sid);
            const prof = (window.master.profiles && window.master.profiles[sid]) || { points: 0, medals: 0, msg: "無", logs: [] };
            document.getElementById('m-name').innerText = s.name;
            document.getElementById('m-msg').innerText = prof.msg || "無師長訊息";
            
            // 10格星星
            const pts = prof.points || 0; const sb = document.getElementById('stamp-card'); sb.innerHTML = "";
            for(let i=0; i<10; i++) sb.innerHTML += `<div class="slot ${i < pts ? 'slot-active' : ''}">${i < pts ? '⭐' : ''}</div>`;
            
            // 金牌
            const med = prof.medals || 0; const mb = document.getElementById('medal-card'); mb.innerHTML = "";
            for(let i=0; i<Math.max(med, 5); i++) mb.innerHTML += `<div class="slot ${i < med ? 'slot-active' : ''}">${i < med ? '🏅' : ''}</div>`;
            
            // 日誌
            const hBox = document.getElementById('m-history'); hBox.innerHTML = "";
            const combinedLogs = [...(prof.logs || [])];
            const att = window.master.attendance || {};
            Object.keys(att).forEach(d => { if(att[d][sid]) combinedLogs.push({ time: d+" 00:00", act: "狀態: "+statusNames[att[d][sid]], reason: "點名登記", admin: "系統" }); });
            combinedLogs.sort((a,b) => b.time.localeCompare(a.time)).forEach(l => {
                hBox.innerHTML += `<div class="log-row">🕒 ${l.time}<br><b>${l.act}</b><br>原因：${l.reason} <span style="float:right; color:#999;">by ${l.admin || ''}</span></div>`;
            });

            if(role === 'admin') {
                document.getElementById('admin-pts-tool').style.display = 'block';
                document.getElementById('admin-med-tool').style.display = 'block';
                document.getElementById('admin-msg-zone').style.display = 'block';
                document.getElementById('admin-only-info').style.display = 'block';
                db.ref(`jjvs_v24_auth/${sid}/p`).once('value', sn => document.getElementById('m-pw').innerText = sn.val() || '0000');
            }
            
            const sd = document.getElementById('target-date').value;
            if(role === 'student' && window.master.leaves?.[sd + "_" + sid] === 'APPROVED') {
                document.getElementById('student-leave-status').innerHTML = `<button class="btn btn-gold" onclick="showPass('${s.name}', '${sd}')">🎟️ 點此出示准予外出通行證</button>`;
            }
        }

        function showPass(n, d) {
            document.getElementById('pass-name').innerText = n;
            document.getElementById('pass-date').innerText = d;
            document.getElementById('pass-admin').innerText = adminInfo.n;
            document.getElementById('pass-screen').style.display = 'block';
        }

        function applyLeave() {
            const r = prompt("請說明外出原因："); if(!r) return;
            const lKey = document.getElementById('target-date').value + "_" + curStudent.id;
            db.ref(`jjvs_v24_cloud/leaves/${lKey}`).set("PENDING");
            alert("申請已送出");
        }

        function renderLeaves() {
            const box = document.getElementById('leave-list'); box.innerHTML = "";
            const leaves = window.master.leaves || {};
            const sd = document.getElementById('target-date').value;
            let count = 0;
            students.filter(s => s.group === currentGrp || adminInfo.cls === 'ALL').forEach(s => {
                if(leaves[sd+"_"+s.id] === 'PENDING') {
                    count++;
                    box.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>🚶 <b>${s.name}</b> 申請外出</span><button class="btn" style="width:70px; height:35px; padding:0; background:var(--present); color:#fff; border-radius:10px;" onclick="approveLeave('${s.id}')">核可</button></div>`;
                }
            });
            if(count === 0) box.innerText = "今日無外出申請";
        }

        function approveLeave(sid) {
            const sd = document.getElementById('target-date').value;
            db.ref(`jjvs_v24_cloud/leaves/${sd+"_"+sid}`).set("APPROVED");
            addLog(sid, "✅ 核可第八節外出", `核可人：${adminInfo.n}`);
        }

        function adj(type, v) {
            const r = prompt("請註明變更原因："); if(!r) return;
            const path = type === 'p' ? 'points' : 'medals';
            const cur = parseInt(window.master.profiles?.[curDetailSid]?.[path] || 0);
            db.ref(`jjvs_v24_cloud/profiles/${curDetailSid}/${path}`).set(Math.max(0, cur + v));
            addLog(curDetailSid, (type==='p'?'點數':'金牌')+(v>0?'➕加':'➖扣')+Math.abs(v), r);
        }

        function addLog(sid, act, reason) {
            const time = new Date().toISOString().split('T')[0] + " " + new Date().toTimeString().slice(0,5);
            const logs = window.master.profiles?.[sid]?.logs || [];
            logs.push({ time, act, reason, admin: adminInfo.n });
            db.ref(`jjvs_v24_cloud/profiles/${sid}/logs`).set(logs);
        }

        function openSetup() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('setup-modal').style.display = 'block';
            renderAdminList();
        }

        function addTeacher() {
            const n = document.getElementById('new-t-name').value;
            const a = document.getElementById('new-t-acc').value;
            const p = document.getElementById('new-t-pw').value;
            const c = document.getElementById('new-t-class').value;
            if(!n || !a || !p) return alert("請填寫完整");
            db.ref(`jjvs_v24_admins/${a}`).set({ n: n, p: CryptoJS.SHA256(p).toString(), cls: c }).then(() => {
                alert("教師帳號開通成功"); renderAdminList();
            });
        }

        function renderAdminList() {
            const box = document.getElementById('teacher-list'); box.innerHTML = "";
            db.ref('jjvs_v24_admins').once('value', sn => {
                const data = sn.val();
                for(let acc in data) {
                    box.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px;"><b>${data[acc].n}</b><br>管轄：${data[acc].cls} <button onclick="delAdmin('${acc}')" style="float:right; color:red;">[註銷]</button></div>`;
                }
            });
        }
        function delAdmin(acc) { if(confirm("確定刪除此帳號？")) db.ref(`jjvs_v24_admins/${acc}`).remove().then(renderAdminList); }

        function redeem() {
            const p = window.master.profiles?.[curDetailSid]?.points || 0;
            if(p >= 5) {
                const m = window.master.profiles?.[curDetailSid]?.medals || 0;
                db.ref(`jjvs_v24_cloud/profiles/${curDetailSid}`).update({ points: p-5, medals: m+1 });
                addLog(curDetailSid, "🎟️ 星星換金牌", "自動兌換 (消耗5星)");
            } else alert("星星不足 5 點");
        }

        function updateMsg() { db.ref(`jjvs_v24_cloud/profiles/${curDetailSid}/msg`).set(document.getElementById('t-msg').value); alert("訊息已送出"); }
        function closeModal() { curDetailSid = null; document.getElementById('overlay').style.display='none'; document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    </script>
</body>
</html>
